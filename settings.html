// Wire every custom dropdown — open/close, select, search-filter.
function wireCmapDropdowns(){
  document.querySelectorAll('[data-cmap-dd="1"]').forEach(dd => {
    if (dd.dataset.wired) return; dd.dataset.wired = '1';
    const btn    = dd.querySelector('.cmap-dd-trigger');
    const panel  = dd.querySelector('.cmap-dd-panel');
    const search = dd.querySelector('.cmap-dd-search');
    const list   = dd.querySelector('.cmap-dd-list');
    const hidden = dd.querySelector('input[type="hidden"]');
    const valEl  = dd.querySelector('.cmap-dd-val');
    btn.addEventListener('click', e => {
      e.stopPropagation();
      // Close any other open panel
      document.querySelectorAll('.cmap-dd-panel').forEach(p => { if (p !== panel) p.style.display = 'none'; });
      const willOpen = panel.style.display === 'none';
      panel.style.display = willOpen ? 'flex' : 'none';
      if (willOpen) { search.value = ''; filterRows(list, ''); setTimeout(() => search.focus(), 30); }
    });
    list.addEventListener('click', e => {
      const row = e.target.closest('.cmap-dd-row');
      if (!row) return;
      const v = row.dataset.val || '';
      hidden.value = v;
      valEl.textContent = v || '— pick a column —';
      btn.title = v || '';
      list.querySelectorAll('.cmap-dd-row.selected').forEach(r => r.classList.remove('selected'));
      if (v) row.classList.add('selected');
      panel.style.display = 'none';
      hidden.dispatchEvent(new Event('change', { bubbles: true }));
    });
    search.addEventListener('input', () => filterRows(list, search.value));
  });
  // Click-outside to close
  if (!window._cmapClickWired) {
    window._cmapClickWired = true;
    document.addEventListener('click', () => {
      document.querySelectorAll('.cmap-dd-panel').forEach(p => p.style.display = 'none');
    });
  }
}
function filterRows(list, q){
  const lc = String(q || '').toLowerCase().trim();
  list.querySelectorAll('.cmap-dd-row').forEach(r => {
    const t = (r.textContent || '').toLowerCase();
    r.style.display = (!lc || t.indexOf(lc) !== -1) ? '' : 'none';
  });
}

async function onSampleFile(f){
  if (!f) return;
  const hint = $('cmapDropHint');
  hint.textContent = 'Reading ' + f.name + '…';
  try {
    const xlsx = await loadSheetJs();
    const buf = await f.arrayBuffer();
    const wb = xlsx.read(buf, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = xlsx.utils.sheet_to_json(sheet, { defval: '' });
    if (!rows.length) throw new Error('Empty sheet');
    const headers = Object.keys(rows[0] || {});
    if (!headers.length) throw new Error('No columns detected');
    // Extend every custom dropdown with newly discovered headers — keep
    // the currently-selected value (from defaults or saved mapping).
    document.querySelectorAll('[data-cmap-dd="1"]').forEach(dd => {
      const list = dd.querySelector('.cmap-dd-list');
      const hidden = dd.querySelector('input[type="hidden"]');
      const cur = hidden.value;
      const have = new Set(Array.from(list.querySelectorAll('.cmap-dd-row')).map(r => r.dataset.val));
      headers.forEach(h => {
        if (have.has(h)) return;
        list.insertAdjacentHTML('beforeend',
          `<div class="cmap-dd-row${h === cur ? ' selected' : ''}" data-val="${escape(h)}" title="${escape(h)}">${escape(h)}</div>`);
      });
    });
    // Persist headers (only — never row data) so the next time the modal
    // opens these options are pre-listed without re-uploading a sample.
    modalCtx._discoveredColumns = modalCtx._discoveredColumns || [];
    headers.forEach(h => {
      if (h && !modalCtx._discoveredColumns.includes(h)) modalCtx._discoveredColumns.push(h);
    });
    // Preview distinct status values from the chosen status column (if set).
    const renderStatusValues = (col) => {
      const distinct = Array.from(new Set(rows.map(r => String(r[col] || '').trim()).filter(Boolean)));
      $('cmapStatusList').innerHTML = distinct.slice(0, 50).map(s =>
        `<code style="background:#FFFFFF;padding:2px 6px;border-radius:4px;border:1px solid #E1E3E5;display:inline-block;margin:2px 4px 2px 0;cursor:pointer;" data-status-val="${escape(s)}">${escape(s)}</code>`
      ).join('');
      $('cmapStatusValues').style.display = 'block';
    };
    const statusCol = $('cmap_status').value;
    if (statusCol) renderStatusValues(statusCol);
    $('cmap_status').addEventListener('change', () => {
      const col = $('cmap_status').value;
      if (col) renderStatusValues(col);
    });
    hint.textContent = '✓ ' + f.name + ' — ' + headers.length + ' columns, ' + rows.length + ' rows';
  } catch (e) {
    hint.textContent = '⚠ ' + e.message;
    hint.style.color = '#D72C0D';
  }
}

// ── FACEBOOK OAUTH FLOW ──────────────────────────────────────────────
// Opens FB OAuth in a popup → fb-callback.php exchanges code for long-lived
// token + saves connector → posts back via window.postMessage. We then
// auto-fill the token field, run verify, and refresh the connector list.
async function startFacebookLogin() {
  const status = $('fbLoginStatus');
  status.textContent = 'Opening Facebook…';
  status.style.color = '#6D7175';
  let cfg;
  try {
    cfg = await api('/fb-config.php');
  } catch (e) {
    status.textContent = 'Failed to load Facebook config: ' + e.message;
    status.style.color = '#D72C0D';
    return;
  }
  const state = Math.random().toString(36).slice(2);
  const url = 'https://www.facebook.com/v21.0/dialog/oauth'
    + '?client_id='     + encodeURIComponent(cfg.app_id)
    + '&redirect_uri='  + encodeURIComponent(cfg.redirect_uri)
    + '&scope='         + encodeURIComponent(cfg.scope)
    + '&response_type=code'
    + '&state='         + encodeURIComponent(state);
  const w = 600, h = 720;
  const left = (window.screen.width  - w) / 2;
  const top  = (window.screen.height - h) / 2;
  const popup = window.open(url, 'fbLogin', `width=${w},height=${h},left=${left},top=${top}`);
  if (!popup) {
    status.textContent = 'Popup blocked — allow popups for this site and try again.';
    status.style.color = '#D72C0D';
    return;
  }
  // Listen for the callback page's postMessage
  const onMessage = async (event) => {
    if (!event.data || event.data.type !== 'fb-oauth') return;
    window.removeEventListener('message', onMessage);
    const p = event.data.payload;
    if (!p || !p.ok) {
      status.textContent = 'Login failed.';
      status.style.color = '#D72C0D';
      return;
    }
    status.innerHTML = '✓ Connected as <strong>' + escape(p.user_name) + '</strong> · ' + p.ad_account_count + ' ad account(s).';
    status.style.color = '#0E8345';
    toast('Connected to Facebook');
    closeModal();
    renderContent();
  };
  window.addEventListener('message', onMessage);
}

// Holds the list of accounts fetched during Verify so we can save the selection on Save.
let metaFetchedAccounts = [];

async function verifyMetaToken() {
  const tokenEl = $('f_token');
  const result  = $('metaVerifyResult');
  const btn     = $('btnVerifyMeta');
  const token = (tokenEl?.value || '').trim();
  if (!token) { result.innerHTML = '<span style="color:#D72C0D;">Enter the access token first.</span>'; return; }
  btn.disabled = true;
  result.innerHTML = 'Checking…';
  try {
    const data = await api('/meta.php?action=accounts&token=' + encodeURIComponent(token));
    const rows = data.rows || [];
    metaFetchedAccounts = rows;
    if (!rows.length) {
      result.innerHTML = '<span style="color:#D72C0D;">Token works but returned 0 ad accounts.</span>';
      return;
    }
    // Pre-select either the previously saved selection (when editing) or all by default.
    // Important: keep IDs that are saved but NOT visible under the new token
    // (e.g. user rotated the token and the new one can't see some old accounts) —
    // they stay in the persisted whitelist, hidden from the UI but preserved on Save.
    const visibleIds = new Set(rows.map(r => r.account_id));
    const savedList = (modalCtx.editing?.meta?.allowed_accounts) || rows.map(r => r.account_id);
    const selected = new Set(savedList);
    const hiddenSaved = [...selected].filter(id => !visibleIds.has(id));
    const allCount = rows.length;
    const selCount = () => rows.filter(r => selected.has(r.account_id)).length;
    function repaint() {
      const list = result.querySelector('.meta-acc-list');
      if (!list) return;
      list.querySelectorAll('input[type="checkbox"][data-acc]').forEach(cb => {
        cb.checked = selected.has(cb.dataset.acc);
      });
      const cnt = result.querySelector('.meta-acc-count');
      if (cnt) cnt.textContent = selCount() + ' of ' + allCount + ' selected';
      const all = result.querySelector('input[data-allcheck]');
      if (all) all.checked = selCount() === allCount && allCount > 0;
      const hidEl = result.querySelector('.meta-acc-hidden');
      if (hidEl) hidEl.textContent = hiddenSaved.length
        ? '+ ' + hiddenSaved.length + ' previously saved ' + (hiddenSaved.length===1?'account is':'accounts are') + ' kept (not visible to this token)'
        : '';
    }
    function row(r) {
      const cur = r.currency || '';
      const status = r.account_status === 1 ? '' : '<span style="color:#9CA3AF;font-size:11px;margin-left:6px;">(inactive)</span>';
      return `<label style="display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:6px;cursor:pointer;" class="meta-acc-row">
        <input type="checkbox" data-acc="${escape(r.account_id)}" style="margin:0;flex-shrink:0;">
        <span style="flex:1;min-width:0;font-size:13px;color:#1A1A1A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escape(r.name)}${status}</span>
        <span style="font-size:11px;color:#9CA3AF;flex-shrink:0;">${escape(r.account_id)}${cur ? ' · ' + escape(cur) : ''}</span>
      </label>`;
    }
    result.innerHTML = `
      <div style="color:#0A6E2E;font-weight:600;margin-bottom:8px;">✓ Token valid — ${allCount} ad account${allCount===1?'':'s'} accessible.</div>
      <div style="border:1px solid #E1E3E5;border-radius:8px;background:#FFFFFF;overflow:hidden;margin-top:6px;">
        <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#F7F7F7;border-bottom:1px solid #E1E3E5;">
          <input type="search" placeholder="Filter accounts…" data-filter style="flex:1;min-width:0;height:28px;border:1px solid #DCDCDC;border-radius:6px;padding:0 8px;font-size:12px;font-family:inherit;outline:none;">
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#1A1A1A;cursor:pointer;white-space:nowrap;">
            <input type="checkbox" data-allcheck style="margin:0;"> Select all
          </label>
        </div>
        <div class="meta-acc-list" style="max-height:240px;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:1px;">
          ${rows.map(row).join('')}
        </div>
        <div style="padding:6px 10px;border-top:1px solid #E1E3E5;background:#F7F7F7;font-size:12px;color:#6D7175;">
          <span class="meta-acc-count">0 of ${allCount} selected</span>
          — only ticked accounts will appear in <strong>Ads Analysis</strong>.
          <div class="meta-acc-hidden" style="font-size:11px;color:#0A6E2E;margin-top:3px;font-weight:600;"></div>
        </div>
      </div>`;
    repaint();
    // Wire events
    result.querySelectorAll('input[data-acc]').forEach(cb => {
      cb.addEventListener('change', () => {
        if (cb.checked) selected.add(cb.dataset.acc); else selected.delete(cb.dataset.acc);
        // expose via closure
        modalCtx._allowedAccounts = [...selected];
        repaint();
      });
    });
    result.querySelector('input[data-allcheck]').addEventListener('change', e => {
      // Toggle only the VISIBLE accounts — IDs saved under another token stay in `selected`.
      if (e.target.checked) rows.forEach(r => selected.add(r.account_id));
      else rows.forEach(r => selected.delete(r.account_id));
      modalCtx._allowedAccounts = [...selected];
      repaint();
    });
    result.querySelector('input[data-filter]').addEventListener('input', e => {
      const q = e.target.value.trim().toLowerCase();
      result.querySelectorAll('.meta-acc-row').forEach(lab => {
        const cb = lab.querySelector('input[data-acc]');
        const id = cb.dataset.acc;
        const name = (lab.textContent || '').toLowerCase();
        lab.style.display = (!q || name.includes(q) || id.includes(q)) ? 'flex' : 'none';
      });
    });
    modalCtx._allowedAccounts = [...selected];
  } catch (err) {
    result.innerHTML = `<span style="color:#D72C0D;">${escape(err.message)}</span>`;
  } finally {
    btn.disabled = false;
  }
}

async function saveConnector() {
  const { section, editing, provider } = modalCtx;
  const fields = PROVIDER_FIELDS[provider] || PROVIDER_FIELDS._default;
  const obj = { type: section, provider, id: editing?.id };
  // Preserve any existing meta from prior save (so unrelated keys survive).
  const meta = (editing?.meta && typeof editing.meta === 'object') ? { ...editing.meta } : {};
  for (const f of fields) {
    if (f._custom) continue; // skip pseudo-fields like verify buttons
    const v = $('f_' + f.key)?.value.trim() || '';
    if (f.required && !v) { toast(f.label + ' is required', true); return; }
    if (f.meta) meta[f.key] = v;
    else obj[f.key] = v;
  }
  // Column mapping (shipping carriers + confirmation systems) — read every
  // cmap_* field and persist as meta.column_map so the shipping parser /
  // confirmation parser can use it.
  if ((section === 'shipping' || section === 'confirmation') && document.getElementById('shippingMapperPanel')) {
    const cmap = {};
    (typeof ALL_MAPPING_KEYS !== 'undefined' ? ALL_MAPPING_KEYS
      : ['product','status','delivered_values','returned_values','confirmed_values','canceled_values','city','date','cod','fees','employee']
    ).forEach(k => {
      const el = document.getElementById('cmap_' + k);
      if (el && el.value && String(el.value).trim()) cmap[k] = String(el.value).trim();
    });
    if (Object.keys(cmap).length) meta.column_map = cmap;
    // Persist the discovered column names so opening the modal again
    // doesn't require re-uploading a sample. Headers only — never the
    // row data — so meta JSON stays small. Capped at 200 to avoid runaway
    // bloat on weird sheets.
    if (Array.isArray(modalCtx._discoveredColumns) && modalCtx._discoveredColumns.length) {
      meta.column_list = modalCtx._discoveredColumns.slice(0, 200);
    }
  }
  if (Object.keys(meta).length) obj.meta = meta;
  // AI providers don't expose a "name" field (one key per workspace), but the
  // backend connectors row requires a name — synthesize a sensible default.
  if (section === 'ai' && !obj.name) {
    obj.name = provider === 'claude'     ? 'Claude (Anthropic)'
            : provider === 'chatgpt'    ? 'ChatGPT (OpenAI)'
            : provider === 'openrouter' ? 'OpenRouter (unified)'
            : provider;
  }
  // Meta connector: persist the user-selected account whitelist (if Verify was used).
  if (provider === 'meta') {
    const allowed = modalCtx._allowedAccounts || (editing?.meta?.allowed_accounts) || null;
    obj.meta = Object.assign({}, obj.meta || {}, { allowed_accounts: allowed && allowed.length ? allowed : null });
  }
  try {
    $('modalSave').disabled = true;
    await api('/connectors.php', {method: 'POST', body: JSON.stringify(obj)});
    // For AI providers, also mirror the key to localStorage so the in-browser
    // tools (Copywriting / Landing page / Headlines) can use it directly.
    if (section === 'ai' && obj.token) {
      try {
        if (provider === 'claude')     localStorage.setItem('app.anthropicApiKey',  obj.token);
        if (provider === 'chatgpt')    localStorage.setItem('app.openaiApiKey',     obj.token);
        if (provider === 'openrouter') localStorage.setItem('app.openrouterApiKey', obj.token);
      } catch (e) { /* ignore */ }
    }
    toast(editing ? 'Updated' : 'Added');
    closeModal();
    renderContent();
  } catch (err) {
    toast(err.message, true);
  } finally {
    $('modalSave').disabled = false;
  }
}

  if (!cache.ads)      try { ads    = (await api('/connectors.php?type=ads')).rows;      cache.ads = ads;    } catch {}
  if (!cache.shipping) try { ship   = (await api('/connectors.php?type=shipping')).rows; cache.shipping = ship; } catch {}

    { id: 'copywriting', name: 'Copywriting' },
    { id: 'landing',     name: 'Landing page content' },
    { id: 'headlines',   name: 'Headlines Generator' },

    { section: 'ai',           provider: 'openrouter',   name: 'OpenRouter',              icon: 'logos/openrouter.svg' },
  ];

  c.innerHTML = `
    <div class="settings-bread"><a href="/">Home</a> › Connectors</div>
    <h1 class="settings-title">Connectors</h1>
    <div class="settings-subtitle">Allow the dashboard to reference other apps and services for more context.</div>
    <div class="panel" style="padding:6px 0;">
      <div id="hubList"><div class="loading-state" style="padding:30px;">Loading…</div></div>
    </div>
    <div style="margin-top:14px;">
      <button class="btn" id="addCustomConnectorBtn" style="background:#1A1A1A;color:#fff;">+ Add custom connector</button>
    </div>
  `;
  // Fetch all connectors in parallel and bucket by (type, provider)
  const types = ['cms','shipping','ads','confirmation','ai','storage'];
  const counts = {};
  await Promise.all(types.map(async t => {
    try {
      const data = await api('/connectors.php?type=' + t);
      (data.rows || []).forEach(r => {
        const k = t + ':' + r.provider;
        counts[k] = (counts[k] || 0) + 1;
      });
    } catch (e) { /* ignore — show 0 */ }
  }));

  // Bucket the actual connector rows by (type:provider) so we can list
  // individual instances inside the dropdown menu.
  const rowsByKey = {};
  await Promise.all(types.map(async t => {
    try {
      const data = await api('/connectors.php?type=' + t);
      (data.rows || []).forEach(r => {
        const k = t + ':' + r.provider;
        (rowsByKey[k] = rowsByKey[k] || []).push(r);
      });
    } catch (e) { /* ignore */ }
  }));

  // Connected first, not-connected after — keep original order within each group
  const sortedProviders = HUB_PROVIDERS
    .map((p, i) => ({ p, i, n: counts[p.section + ':' + p.provider] || 0 }))
    .sort((a, b) => (b.n > 0) - (a.n > 0))
    .map(x => x.p);
  $('hubList').innerHTML = sortedProviders.map((p, i) => {
    const k = p.section + ':' + p.provider;
    const n = counts[k] || 0;
    const status = n > 0
      ? `<span style="color:#0E8345;font-size:12px;font-weight:600;">Connected${n>1?' ('+n+')':''}</span>`
      : `<span style="color:#6D7175;font-size:12px;">Not connected</span>`;
    const iconHtml = p.icon
      ? `<img src="${p.icon}" alt="" style="width:24px;height:24px;border-radius:6px;background:#fff;object-fit:contain;padding:2px;border:1px solid #E1E3E5;">`
      : `<div style="width:24px;height:24px;border-radius:6px;background:#F1F1F1;display:flex;align-items:center;justify-content:center;font-size:14px;">${p.emoji||'🔌'}</div>`;
    const btnLabel = n > 0 ? 'Configure' : 'Connect';
    const chevron = n > 0
      ? `<button class="btn" data-hub-menu="${i}" title="More" style="padding:0 8px;height:32px;border-left:1px solid #E1E3E5;border-radius:0 6px 6px 0;margin-left:-1px;">▾</button>`
      : '';
    const groupBtn = n > 0
      ? `<div style="display:flex;align-items:center;position:relative;">
          <button class="btn" data-hub-section="${p.section}" data-hub-provider="${p.provider}" style="border-radius:6px 0 0 6px;">${btnLabel}</button>
          ${chevron}
          <div id="hubMenu_${i}" style="display:none;position:absolute;top:36px;right:0;background:#fff;border:1px solid #DCDCDC;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.08);min-width:180px;z-index:50;overflow:hidden;font-size:12.5px;">
            <button data-hub-action="view"     data-hub-idx="${i}" style="display:block;width:100%;text-align:left;padding:9px 14px;background:#fff;border:none;cursor:pointer;color:#1A1A1A;">View instances</button>
            <button data-hub-action="refresh"  data-hub-idx="${i}" style="display:block;width:100%;text-align:left;padding:9px 14px;background:#fff;border:none;cursor:pointer;color:#1A1A1A;border-top:1px solid #F1F1F1;">Refresh list</button>
            <button data-hub-action="disconnect" data-hub-idx="${i}" style="display:block;width:100%;text-align:left;padding:9px 14px;background:#fff;border:none;cursor:pointer;color:#D72C0D;border-top:1px solid #F1F1F1;">Disconnect all</button>
          </div>
        </div>`
      : `<button class="btn" data-hub-section="${p.section}" data-hub-provider="${p.provider}">${btnLabel}</button>`;
    return `<div class="hub-row" style="display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid #F1F1F1;">
      ${iconHtml}
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:13px;color:#1A1A1A;">${escape(p.name)}</div>
        <div style="margin-top:2px;">${status}</div>
      </div>
      ${groupBtn}
    </div>`;
  }).join('');

  // Wire main Connect/Configure button → opens add/edit modal directly
  // (or kicks off OAuth for providers that use it)
  document.querySelectorAll('[data-hub-section]').forEach(b => {
    b.addEventListener('click', () => {
      const section  = b.dataset.hubSection;
      const provider = b.dataset.hubProvider;
      const meta     = HUB_PROVIDERS.find(p => p.section === section && p.provider === provider);
      const list     = rowsByKey[section + ':' + provider] || [];
      // OAuth providers (Google Drive, future Facebook flow): pop a window
      // to start the consent flow. The callback page closes itself + posts
      // a message back so we refresh this list.
      if (meta && meta.oauth && list.length === 0) {
        const w = window.open(meta.oauth, 'oauth_popup', 'width=520,height=620');
        const onMsg = (e) => {
          if (typeof e.data === 'string' && e.data.startsWith('google-connected')) {
            window.removeEventListener('message', onMsg);
            renderConnectorsHub(c);
          }
        };
        window.addEventListener('message', onMsg);
        return;
      }
      activeSection = section;
      // Single instance → edit it directly. Multiple → open Add modal.
      if (list.length === 1) openConnectorModal(section, list[0], provider);
      else openConnectorModal(section, null, provider);
    });
  });

  // Toggle dropdown menu open/close (only one open at a time)
  document.querySelectorAll('[data-hub-menu]').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const i = b.dataset.hubMenu;
      document.querySelectorAll('[id^="hubMenu_"]').forEach(m => {
        if (m.id !== 'hubMenu_' + i) m.style.display = 'none';
      });
      const menu = document.getElementById('hubMenu_' + i);
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    });
  });
  // Click anywhere else closes any open menu
  document.addEventListener('click', () => {
    document.querySelectorAll('[id^="hubMenu_"]').forEach(m => m.style.display = 'none');
  });

  // Wire dropdown actions
  document.querySelectorAll('[data-hub-action]').forEach(b => {
    b.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = b.dataset.hubAction;
      const idx    = parseInt(b.dataset.hubIdx, 10);
      const p      = sortedProviders[idx];
      const k      = p.section + ':' + p.provider;
      const list   = rowsByKey[k] || [];
      document.querySelectorAll('[id^="hubMenu_"]').forEach(m => m.style.display = 'none');
      if (action === 'view') {
        // Jump to the per-type page so the user sees all instances
        switchSection(p.section);
      } else if (action === 'refresh') {
        renderConnectorsHub(c);
      } else if (action === 'disconnect') {
        if (!confirm('Disconnect ' + list.length + ' ' + p.name + ' connection(s)?')) return;
        for (const r of list) {
          try { await api('/connectors.php?id=' + r.id, { method: 'DELETE' }); } catch (e) {}
        }
        toast('Disconnected');
        renderConnectorsHub(c);
      }
    });
  });

  $('addCustomConnectorBtn').addEventListener('click', () => openCustomConnectorChooser());

  // Append any custom MCP connectors saved in the backend to the hub list
  try {
    const mcp = await api('/connectors.php?type=mcp');
    const rows = (mcp.rows || []);
    if (rows.length) {
      const mcpHtml = rows.map((r, i) => `
        <div class="hub-row" style="display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid #F1F1F1;">
          <div style="width:24px;height:24px;border-radius:6px;background:#F1F1F1;display:flex;align-items:center;justify-content:center;font-size:14px;">🧩</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:13px;color:#1A1A1A;display:flex;align-items:center;gap:8px;">
              ${escape(r.name)}
              <span style="font-size:10px;font-weight:700;background:#F1F1F1;color:#6D7175;padding:2px 6px;border-radius:4px;letter-spacing:0.4px;">CUSTOM</span>
            </div>
            <div style="margin-top:2px;font-size:12px;color:#6D7175;">${escape(r.url || '')}</div>
          </div>
          <button class="btn" data-mcp-edit="${r.id}">Configure</button>
          <button class="btn btn-danger" data-mcp-del="${r.id}">Remove</button>
        </div>
      `).join('');
      $('hubList').insertAdjacentHTML('beforeend', '<div style="padding:14px 18px 6px;font-size:11px;font-weight:600;color:#6D7175;text-transform:uppercase;letter-spacing:0.4px;border-top:1px solid #F1F1F1;">Custom MCP connectors</div>' + mcpHtml);

      document.querySelectorAll('[data-mcp-edit]').forEach(b => b.addEventListener('click', () => {
        const row = rows.find(x => String(x.id) === b.dataset.mcpEdit);
        if (row) openMcpModal(row);
      }));
      document.querySelectorAll('[data-mcp-del]').forEach(b => b.addEventListener('click', async () => {
        if (!confirm('Remove this custom connector?')) return;
        try { await api('/connectors.php?id=' + b.dataset.mcpDel, { method: 'DELETE' }); toast('Removed'); renderConnectorsHub(c); }
        catch (e) { toast(e.message, true); }
      }));
    }
  } catch (e) { /* hub still works without MCP rows */ }
}

async function saveMcpConnector() {
  const editing = modalCtx.editing;
  const name = $('mcp_name').value.trim();
  const url  = $('mcp_url').value.trim();
  if (!name) { toast('Name is required',  true); return; }
  if (!url || !/^https?:\/\//i.test(url)) { toast('Valid Remote MCP server URL is required (https://…)', true); return; }
  try {
    $('modalSave').disabled = true;
    const body = { type: 'mcp', provider: 'custom', name, url };
    if (editing && editing.id) body.id = editing.id;
    await api('/connectors.php', { method: 'POST', body: JSON.stringify(body) });
    toast(editing ? 'Updated' : 'Added');
    closeModal();
    renderConnectorsHub($('content'));
  } catch (err) { toast(err.message, true); }
  finally       { $('modalSave').disabled = false; }
}

// ── AUTO LAND PLUGIN DOWNLOAD ────────────────────────────────────────
// Pulls the live plugin version from /wp-plugin/auto-land/readme.txt and
// names the saved file accordingly (e.g. "Auto Land Wp Funnels v1.0.6.zip"),
// + cache-busts the URL so each click serves the latest deploy.
async function wireAutoLandDownload() {
  const link = document.getElementById('dlAutoLandZip');
  if (!link) return;
  // Always use a RELATIVE href so the link resolves against whatever origin
  // the Settings page is served from (Hostinger production OR localhost dev).
  // Some preview environments block cross-origin links to hostingersite.com.
  let version = '', tag = String(Date.now());
  try {
    const r = await fetch(API_BASE + '/plugin-version.php', { cache: 'no-store' });
    if (r.ok) {
      const j = await r.json();
      if (j.version)       version = j.version;
      if (j.last_modified) tag = encodeURIComponent(j.last_modified).replace(/[^A-Za-z0-9]/g, '').slice(0, 16);
    }
  } catch (e) { /* keep defaults */ }
  link.href = 'wp-plugin/auto-land.zip?v=' + tag;
  link.setAttribute('download', 'Auto Land Wp Funnels' + (version ? ' v' + version : '') + '.zip');
}

    </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div>
          <div class="panel-title">Saved skills</div>

function renderSkillList(rows) {
  $('skillCount').textContent = `${rows.length} ${rows.length===1?'skill':'skills'} saved.`;

    $('skillList').innerHTML = `<div class="empty-state">No skills yet. Click <strong>Add skill</strong> to write your first one.</div>`;

  $('skillList').innerHTML = `<div class="item-list">${rows.map(it => `
    <div class="item-row">
      <div class="item-ico" style="background:#F1F1F1;color:#1A1A1A;font-weight:700;font-size:13px;">/</div>

      <div class="item-actions">
        <button class="btn" data-edit-skill="${it.id}">Edit</button>

    const it = (cache.skills || []).find(r => String(r.id) === b.dataset.editSkill);

}

async function saveSkill() {
  const editing = modalCtx.editing;
  const name         = $('sk_name').value.trim();

$('modalClose').addEventListener('click', closeModal);
$('modalBackdrop').addEventListener('click', e => { if (e.target.id === 'modalBackdrop') closeModal(); });

// ── TOAST ────────────────────────────────────────────────────────────
function toast(msg, isError = false) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast' + (isError ? ' error' : ''), 2400);
}

// ── INIT ─────────────────────────────────────────────────────────────
// (activeSection was already resolved from hash > localStorage > default at top)
renderStoreHeader();
renderUserBox();
const userBoxEl = $('userBox');
if (userBoxEl) userBoxEl.addEventListener('click', () => switchSection('__account'));
// React to back/forward navigation between sections
window.addEventListener('hashchange', () => {
  const h = (location.hash || '').replace(/^#/, '');
  const next = h === 'account' ? '__account' : (h || 'general');
  if (next !== activeSection) switchSection(next);
});
renderNav();
renderContent();
if (activeSection === '__account') {
  const ub = $('userBox'); if (ub) ub.classList.add('active');
}
</script>

</body>
</html>
