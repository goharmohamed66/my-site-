<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100vh;background:#F1F1F1;font-family:'Inter','Almarai',system-ui,sans-serif;color:#1A1A1A;font-size:14px;}

  .settings-shell{display:flex;justify-content:center;padding:24px 16px;gap:16px;align-items:flex-start;}
  .settings-card{background:#FFFFFF;border:1px solid #E1E3E5;border-radius:12px;box-shadow:0 1px 0 rgba(0,0,0,0.05);}

  .settings-sidebar{width:260px;flex-shrink:0;padding:8px;display:flex;flex-direction:column;}
  .settings-store{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;}
  .settings-store .avatar-pill{width:32px;height:32px;border-radius:8px;background:#FF3B8F;color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;overflow:hidden;}
  .settings-store .avatar-pill img{width:100%;height:100%;object-fit:cover;display:block;}
  .settings-store .name{font-weight:600;font-size:14px;color:#1A1A1A;line-height:18px;}
  .logo-uploader{display:flex;align-items:center;gap:14px;}
  .logo-preview{width:64px;height:64px;border-radius:12px;background:#FF3B8F;color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;overflow:hidden;flex-shrink:0;border:1px solid #E1E3E5;}
  .logo-preview img{width:100%;height:100%;object-fit:cover;display:block;}
  .logo-actions{display:flex;flex-direction:column;gap:6px;}

  /* Shopify-style two-column section layout */
  .gen-section{display:grid;grid-template-columns:220px 1fr;gap:24px;padding:24px 0;border-bottom:1px solid #E1E3E5;}
  .gen-section:last-of-type{border-bottom:none;}
  .gen-section-label{font-size:14px;font-weight:600;color:#1A1A1A;padding-top:4px;}
  .gen-section-help{font-size:12px;color:#6D7175;margin-top:4px;}
  .gen-card{background:#FFFFFF;border:1px solid #E1E3E5;border-radius:12px;overflow:hidden;}
  .gen-card-block{padding:16px;border-bottom:1px solid #F1F1F1;}
  .gen-card-block:last-child{border-bottom:none;}
  .gen-photo-row{display:flex;align-items:center;gap:12px;}
  .gen-photo{width:40px;height:40px;border-radius:50%;background:#5BC986;color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;overflow:hidden;flex-shrink:0;}
  .gen-photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .gen-fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .gen-field-label{display:block;font-size:13px;color:#1A1A1A;font-weight:500;margin-bottom:6px;}
  .gen-input-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .gen-input-row .left{flex:1;min-width:0;}
  .gen-input-row .label{font-size:11px;color:#6D7175;font-weight:500;}
  .gen-input-row .value{font-size:14px;color:#1A1A1A;margin-top:2px;}
  .gen-link{color:#005BD3;font-size:13px;font-weight:500;cursor:pointer;background:none;border:none;padding:0;font-family:inherit;}
  .gen-link:hover{text-decoration:underline;}
  .verified-badge{display:inline-flex;align-items:center;gap:6px;color:#0E8345;font-size:13px;font-weight:500;}
  .verified-badge svg{width:18px;height:18px;}
  .settings-search{padding:0 8px 8px;}
  .settings-search input{width:100%;height:32px;border:1px solid #DCDCDC;border-radius:8px;padding:0 10px 0 30px;font-size:13px;background:#F7F7F7 url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%236D7175'><path d='M11.5 6.5a5 5 0 11-10 0 5 5 0 0110 0zm-1 0a4 4 0 10-8 0 4 4 0 008 0zM10.5 9.5l4 4-1 1-4-4 1-1z'/></svg>") 10px center/14px no-repeat;}
  .settings-search input:focus{outline:none;border-color:#1A1A1A;}
  .settings-nav{flex:1;overflow-y:auto;padding:4px 0;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:8px;cursor:pointer;color:#1A1A1A;font-size:13px;font-weight:500;}
  .nav-item:hover{background:#F1F1F1;}
  .nav-item.active{background:#F1F1F1;font-weight:600;}
  .nav-item .nav-ico{width:18px;height:18px;color:#1A1A1A;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .nav-item .nav-ico svg{width:18px;height:18px;display:block;}
  .nav-section-label{padding:14px 12px 6px;font-size:11px;font-weight:600;color:#6D7175;text-transform:uppercase;letter-spacing:0.4px;}
  .settings-user{padding:10px 12px;border-top:1px solid #F1F1F1;display:flex;align-items:center;gap:10px;cursor:pointer;border-radius:8px;transition:background .12s;}
  .settings-user:hover{background:#F1F1F1;}
  .settings-user.active{background:#F1F1F1;}
  .settings-user .avatar-pill{width:28px;height:28px;border-radius:6px;background:#7E36CC;color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;overflow:hidden;}
  .settings-user .avatar-pill img{width:100%;height:100%;object-fit:cover;display:block;}
  .settings-user .name{font-size:13px;font-weight:600;color:#1A1A1A;line-height:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .settings-user .email{font-size:12px;color:#6D7175;line-height:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .role-badge{flex-shrink:0;font-size:10px;font-weight:600;color:#0A4275;background:#E7F0FD;padding:2px 7px;border-radius:10px;letter-spacing:0.2px;}

  .settings-content{flex:1;max-width:880px;min-width:0;padding:28px 32px;min-height:600px;}
  .settings-bread{display:flex;align-items:center;gap:6px;color:#6D7175;font-size:13px;margin-bottom:8px;}
  .settings-bread a{color:#6D7175;text-decoration:none;}
  .settings-title{font-size:22px;font-weight:700;color:#1A1A1A;letter-spacing:-0.3px;margin-bottom:4px;}
  .settings-subtitle{font-size:13px;color:#6D7175;margin-bottom:20px;}

  .info-banner{background:#EBF3FF;border:1px solid #B4D5FE;border-radius:10px;padding:12px 16px;display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;font-size:13px;color:#0A4275;}
  .info-banner .ico{flex-shrink:0;color:#1877F2;font-size:14px;line-height:20px;}
  .info-banner.error{background:#FFEFEF;border-color:#FFB4B4;color:#7A1818;}
  .info-banner.error .ico{color:#D72C0D;}

  .panel{background:#FFFFFF;border:1px solid #E1E3E5;border-radius:12px;padding:20px;margin-bottom:16px;}
  .panel-title{font-size:15px;font-weight:600;margin-bottom:4px;}
  .panel-desc{font-size:13px;color:#6D7175;margin-bottom:16px;}

  .form-row{display:grid;grid-template-columns:160px 1fr;gap:16px;margin-bottom:14px;align-items:start;}
  .form-label{font-size:13px;color:#1A1A1A;font-weight:500;padding-top:8px;}
  .form-input,.form-select,.form-textarea{width:100%;padding:8px 12px;border:1px solid #DCDCDC;border-radius:8px;font-size:13px;font-family:inherit;color:#1A1A1A;background:#FFFFFF;}
  .form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:#1A1A1A;box-shadow:0 0 0 1px #1A1A1A;}
  .form-textarea{min-height:60px;resize:vertical;font-family:'SF Mono','Monaco',monospace;font-size:12px;}
  .form-help{font-size:12px;color:#6D7175;margin-top:4px;}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:0 14px;height:32px;border-radius:8px;border:1px solid #DCDCDC;background:#FFFFFF;color:#1A1A1A;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 1px 0 rgba(0,0,0,0.04);}
  .btn:hover{background:#F7F7F7;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .btn-primary{background:#1A1A1A;color:#FFFFFF;border-color:#1A1A1A;}
  .btn-primary:hover{background:#303030;}
  .btn-danger{color:#D72C0D;border-color:#FFA396;}
  .btn-danger:hover{background:#FFF1ED;}

  .item-list{display:flex;flex-direction:column;gap:8px;}
  .item-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid #E1E3E5;border-radius:10px;background:#FFFFFF;}
  .item-row .item-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:#F1F1F1;}
  .item-row .item-main{flex:1;min-width:0;}
  .item-row .item-title{font-size:14px;font-weight:600;color:#1A1A1A;}
  .item-row .item-meta{font-size:12px;color:#6D7175;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .item-row .item-actions{display:flex;gap:6px;}
  .empty-state{text-align:center;padding:40px 20px;color:#6D7175;font-size:13px;}
  .loading-state{text-align:center;padding:40px 20px;color:#6D7175;font-size:13px;}

  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .modal-backdrop.open{display:flex;}
  .modal{background:#FFFFFF;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow:auto;}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #F1F1F1;}
  .modal-title{font-size:16px;font-weight:700;}
  .modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:#6D7175;padding:4px;border-radius:6px;}
  .modal-close:hover{background:#F1F1F1;}
  .modal-body{padding:20px;}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid #F1F1F1;}

  /* Connection guide — WhatsApp-style numbered steps with vertical line */
  .guide-card{background:#FFFFFF;border:1px solid #E1E3E5;border-radius:12px;padding:18px 20px;margin-bottom:18px;}
  .guide-title{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:14px;font-weight:700;color:#1A1A1A;}
  .guide-title-icon{width:18px;height:18px;color:#1A1A1A;}
  .guide-step{display:grid;grid-template-columns:28px 1fr;gap:14px;align-items:flex-start;margin-bottom:16px;position:relative;}
  .guide-step:last-child{margin-bottom:0;}
  .guide-step-num{width:28px;height:28px;border-radius:50%;border:1.5px solid #1A1A1A;background:#FFFFFF;color:#1A1A1A;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;position:relative;z-index:1;flex-shrink:0;font-variant-numeric:tabular-nums;}
  .guide-step:not(:last-child)::before{content:"";position:absolute;left:13px;top:28px;width:2px;height:calc(100% + 4px - 28px);background:#1A1A1A;opacity:0.18;z-index:0;}
  .guide-step-text{padding-top:5px;font-size:13px;color:#1A1A1A;line-height:1.55;}
  .guide-step-text a{color:#005BD3;}
  .guide-step-text code{background:#F1F1F1;padding:1px 5px;border-radius:4px;font-size:12px;}
  .guide-note{margin-top:14px;padding:10px 12px;background:#FFF8E1;border:1px solid #F5E6A6;border-radius:8px;font-size:12px;color:#7A5500;line-height:1.5;}

  .provider-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
  .provider-chip{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:14px 8px;border:1px solid #E1E3E5;border-radius:10px;cursor:pointer;background:#FFFFFF;text-align:center;}
  .provider-chip:hover{border-color:#1A1A1A;}
  .provider-chip.selected{border-color:#1A1A1A;box-shadow:0 0 0 1px #1A1A1A;}
  .provider-chip .ico{font-size:22px;}
  .provider-chip .name{font-size:12px;font-weight:600;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#FFFFFF;padding:10px 18px;border-radius:8px;font-size:13px;z-index:300;opacity:0;transition:opacity .2s;}
  .toast.show{opacity:1;}
  .toast.error{background:#D72C0D;}

  @media (max-width: 900px) {
    .settings-shell{flex-direction:column;align-items:stretch;}
    .settings-sidebar{width:100%;}
    .form-row{grid-template-columns:1fr;}
    .form-label{padding-top:0;}
  }
</style>

async function api(path, opts = {}) {
  const headers = Object.assign({"Authorization": "Bearer " + API_TOKEN}, opts.headers || {});
  if (opts.method && opts.method !== 'GET') headers['Content-Type'] = 'application/json';
  const r = await fetch(API_BASE + path, {...opts, headers});
  const text = await r.text();
  let data; try { data = JSON.parse(text); } catch { data = {raw: text}; }
  if (!r.ok) throw new Error(data.error || ('HTTP ' + r.status));
  return data;
}

// ── USER PROFILE (sidebar bottom: name, email, photo, role) ──────────
const USER_KEY = 'app.userProfile.v1';
const DEFAULT_USER = { firstName: 'Tech', lastName: 'Operation', email: 'techopration72@gmail.com', photo: '', role: 'Admin' };
function loadUserProfile() {
  try {
    const s = localStorage.getItem(USER_KEY);
    if (!s) return { ...DEFAULT_USER, name: DEFAULT_USER.firstName + ' ' + DEFAULT_USER.lastName };
    const o = JSON.parse(s);
    // Backwards compat: if old shape with `name`, split it.
    if (o.name && !o.firstName) {
      const parts = o.name.trim().split(/\s+/);
      o.firstName = parts[0] || '';
      o.lastName = parts.slice(1).join(' ');
    }
    const merged = { ...DEFAULT_USER, ...o };
    merged.name = ((merged.firstName || '') + ' ' + (merged.lastName || '')).trim() || 'User';
    return merged;
  } catch (e) { return { ...DEFAULT_USER, name: DEFAULT_USER.firstName + ' ' + DEFAULT_USER.lastName }; }
}
function saveUserProfile(p) { try { localStorage.setItem(USER_KEY, JSON.stringify(p)); } catch (e) {} }
function userInitials(name) { return (name||'').trim().split(/\s+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase() || 'U'; }
function renderUserBox() {
  const u = loadUserProfile();
  const pill = $('userPill'); const nameEl = $('userName'); const emailEl = $('userEmail'); const roleEl = $('userRoleBadge');
  if (pill) { if (u.photo) pill.innerHTML = '<img src="'+u.photo+'" alt="user">'; else pill.textContent = userInitials(u.name); }

  if (emailEl) emailEl.textContent = u.email || '';

}

// Restore the last-viewed section on refresh (URL hash > localStorage > default).
const ACTIVE_SECTION_LS = 'app.settings.activeSection';
let activeSection = (function () {
  const fromHash = (location.hash || '').replace(/^#/, '');
  if (fromHash === 'account') return '__account';
  if (fromHash) return fromHash;
  try { return localStorage.getItem(ACTIVE_SECTION_LS) || 'general'; }
  catch (e) { return 'general'; }
})();
let cache = { cms: null, shipping: null, ads: null, confirmation: null, ai: null, users: null };

// ── NAV ──────────────────────────────────────────────────────────────
function renderNav() {
  $('navList').innerHTML = NAV.map(n => {
    if (n._section) return `<div class="nav-section-label">${n._section}</div>`;
    return `<div class="nav-item ${n.id===activeSection?'active':''}" data-id="${n.id}">
      <span class="nav-ico">${NAV_SVGS[n.id]||''}</span><span>${n.label}</span></div>`;
  }).join('');
  $('navList').querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => switchSection(el.dataset.id));
  });
}

function switchSection(id) {
  activeSection = id;
  // Persist so a page refresh lands the user back on this same section.
  try { localStorage.setItem(ACTIVE_SECTION_LS, id); } catch (e) {}
  // Mirror to URL hash so the back button + shareable links work too.
  history.replaceState(null, '', '#' + (id === '__account' ? 'account' : id));
  renderNav();
  const ub = $('userBox');
  if (ub) ub.classList.toggle('active', id === '__account');
  renderContent();
}

// ── CONTENT ──────────────────────────────────────────────────────────
async function renderContent() {
  const c = $('content');
  if (activeSection === 'general') return renderGeneral(c);
  if (activeSection === '__account') return renderAccount(c);
  if (activeSection === 'users') return await renderUsers(c);
  if (activeSection === 'skills') return await renderSkills(c);
  if (activeSection === 'connectors-hub') return await renderConnectorsHub(c);
  if (activeSection === 'brands') return await renderBrandAssets(c);
  return await renderConnectorSection(c, activeSection);
}

      <h1 class="settings-title" style="margin:0;">Brands &amp; Assets</h1>
      <button class="btn btn-primary" id="newBrandBtn">+ New brand</button>
    </div>
    <div class="settings-subtitle">Create brand profiles and link the ad accounts, shipping accounts and stores that belong to each. The active brand in the topbar filters orders, ads and shipping by these mappings.</div>
    <div class="conn-card" id="brandsListCard" style="padding:0;overflow:hidden;">
      <div id="brandsList" style="padding:8px;"><div style="padding:30px;text-align:center;color:#6D7175;font-size:13px;"><span class="spinner"></span> Loading brands…</div></div>
    </div>`;

  await reloadBrandsList();
  $('newBrandBtn').addEventListener('click', openNewBrandModal);

  // Auto-open Configure modal if URL hash includes ?configure=N
  const m = (location.hash || '').match(/configure=(\d+)/);
  if (m) {
    const bid = parseInt(m[1], 10);
    const found = __brandsState.brands.find(b => b.id === bid);
    if (found) openConfigureBrand(found);
    history.replaceState(null, '', '#brands');
  }
}

async function reloadBrandsList() {
  try {
    const [b, cl, ads, ship, cms] = await Promise.all([
      api('/brands.php'),
      api('/clients.php'),
      api('/connectors.php?type=ads'),
      api('/connectors.php?type=shipping'),
      api('/connectors.php?type=cms'),
    ]);
    __brandsState.brands  = (b.rows || []).filter(x => x && x.id);
    __brandsState.clients = (cl.rows || []).filter(x => x && x.id);
    __brandsState.conns.ads      = ads.rows  || [];
    __brandsState.conns.shipping = ship.rows || [];
    __brandsState.conns.cms      = cms.rows  || [];
  } catch (e) {
    $('brandsList').innerHTML = '<div style="padding:24px;color:#991B1B;font-size:13px;">' + escapeHtml(e.message) + '</div>';
    return;
  }
  paintBrandsList();
}

function paintBrandsList() {
  const list = $('brandsList');
  if (!__brandsState.brands.length) {
    list.innerHTML = `
      <div style="padding:48px 24px;text-align:center;">
        <div style="font-size:14px;color:#1A1A1A;font-weight:600;margin-bottom:6px;">No brands yet</div>
        <div style="font-size:12px;color:#6D7175;margin-bottom:18px;">Create your first brand profile to organize products, ads and shipping by store.</div>
        <button class="btn btn-primary" onclick="openNewBrandModal()">+ New brand</button>
      </div>`;
    return;
  }
  list.innerHTML = __brandsState.brands.map((b, i) => {
    const assets = (b.meta && b.meta.assets) || {};
    const counts = [];
    if ((assets.ads||[]).length)      counts.push((assets.ads||[]).length      + ' ads');
    if ((assets.shipping||[]).length) counts.push((assets.shipping||[]).length + ' shipping');
    if ((assets.cms||[]).length)      counts.push((assets.cms||[]).length      + ' store' + ((assets.cms||[]).length>1?'s':''));
    const prefixes = (b.meta && b.meta.sku_prefixes) || [];
    if (prefixes.length) counts.push(prefixes.map(p => '<code style="background:#F1F1F1;padding:1px 5px;border-radius:3px;font-size:10px;">' + escapeHtml(p) + '</code>').join(' '));
    const status = counts.length ? counts.join(' · ') : '<span style="color:#9CA3AF;">Not configured</span>';
    const sep = i === 0 ? '' : 'border-top:1px solid #F1F1F1;';
    const logo = b.meta && b.meta.logo;
    const avatar = logo
      ? `<div style="width:32px;height:32px;border-radius:8px;flex-shrink:0;overflow:hidden;background:#F1F1F1;"><img src="${logo}" style="width:100%;height:100%;object-fit:cover;display:block;"></div>`
      : `<div style="width:32px;height:32px;border-radius:8px;background:${brandColor(b.id)};color:#FFF;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;">${escapeHtml(brandInitials(b.name))}</div>`;
    return `
      <div data-brand-row="${b.id}" style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;${sep}">
        <div style="display:flex;align-items:center;gap:12px;min-width:0;flex:1;">
          ${avatar}
          <div style="min-width:0;">
            <div style="font-size:14px;font-weight:700;color:#1A1A1A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(b.name)}</div>
            <div style="font-size:11px;color:#6D7175;margin-top:2px;">${status}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button class="btn btn-ghost" data-configure="${b.id}">Configure</button>
          <button class="btn btn-ghost" data-delete="${b.id}" title="Delete brand" style="padding:0 10px;">⋯</button>
        </div>
      </div>`;
  }).join('');
  list.querySelectorAll('button[data-configure]').forEach(btn => {
    btn.addEventListener('click', () => {
      const bid = parseInt(btn.dataset.configure, 10);
      const brand = __brandsState.brands.find(x => x.id === bid);
      if (brand) openConfigureBrand(brand);
    });
  });
  list.querySelectorAll('button[data-delete]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const bid = parseInt(btn.dataset.delete, 10);
      const brand = __brandsState.brands.find(x => x.id === bid);
      if (!brand) return;
      // Close any other open menu first
      document.querySelectorAll('.br-row-menu').forEach(m => m.remove());
      // Render anchored dropdown right under the ⋯ button
      const rect = btn.getBoundingClientRect();
      const menu = document.createElement('div');
      menu.className = 'br-row-menu';
      menu.style.cssText = 'position:fixed;top:' + (rect.bottom + 4) + 'px;left:' + (rect.right - 180) + 'px;width:180px;background:#FFFFFF;border:1px solid #E1E3E5;border-radius:8px;box-shadow:0 8px 20px rgba(0,0,0,0.12);z-index:9000;padding:6px;font-family:inherit;';
      menu.innerHTML = `
        <button type="button" data-act="rename" style="display:block;width:100%;text-align:left;padding:8px 10px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#1A1A1A;border-radius:6px;font-family:inherit;">✎ Rename</button>
        <div style="height:1px;background:#F1F1F1;margin:4px 0;"></div>
        <button type="button" data-act="delete" style="display:block;width:100%;text-align:left;padding:8px 10px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#D72C0D;border-radius:6px;font-weight:600;font-family:inherit;">🗑 Delete connection</button>`;
      menu.querySelectorAll('button').forEach(b => {
        b.addEventListener('mouseenter', () => { b.style.background = '#F5F5F5'; });
        b.addEventListener('mouseleave', () => { b.style.background = 'transparent'; });
      });
      document.body.appendChild(menu);
      const close = () => { menu.remove(); document.removeEventListener('click', closeOnOutside, true); };
      const closeOnOutside = (ev) => { if (!menu.contains(ev.target)) close(); };
      setTimeout(() => document.addEventListener('click', closeOnOutside, true), 0);

      menu.querySelector('[data-act="rename"]').addEventListener('click', async () => {
        close();
        const newName = await appPrompt(null, {
          title: 'Rename brand',
          defaultValue: brand.name,
          placeholder: 'Brand name',
          okText: 'Rename'
        });
        if (!newName || newName === brand.name) return;
        try {
          await api('/brands.php', { method: 'PATCH', body: JSON.stringify({ id: bid, name: newName }) });
          reloadBrandsList();
          if (window.refreshTopbarProfile) window.refreshTopbarProfile();
          appToast('Brand renamed.', { type: 'success' });
        } catch (e) { appToast(e.message, { type: 'error', title: 'Rename failed' }); }
      });
      menu.querySelector('[data-act="delete"]').addEventListener('click', async () => {
        close();
        // In-app confirm — removes brand+products AND trashes the Drive folder.
        const okDel = await appConfirm(
          'The Drive folder will also be moved to Trash (recoverable for 30 days).',
          { title: 'Delete brand "' + brand.name + '"?', okText: 'Delete', danger: true }
        );
        if (!okDel) return;
        try {
          const res = await api('/brands.php?id=' + bid + '&drive=1', { method: 'DELETE' });
          reloadBrandsList();
          if (window.refreshTopbarProfile) window.refreshTopbarProfile();
          if (window.getActiveBrandId && window.getActiveBrandId() === bid && window.setActiveBrandId) {
            window.setActiveBrandId(0);
          }
          if (res && res.drive === 'trashed') {
            appToast('Brand deleted from dashboard and Drive.', { type: 'success' });
          } else if (res && res.drive === 'failed') {
            appToast('Removed from dashboard, but Drive trash failed: ' + (res.drive_error || 'unknown'), { type: 'warn', title: 'Drive sync failed', duration: 8000 });
          } else {
            appToast('Brand deleted.', { type: 'success' });
          }
        } catch (e) { appToast(e.message, { type: 'error', title: 'Delete failed' }); }
      });
    });
  });
}

// ── New brand wizard (3 steps) ─────────────────────────────────────
// Step 1 → pick a connected Store (CMS). Brand inherits its name.
// Step 2 → pick Ad accounts (multi).
// Step 3 → pick Shipping accounts (multi) + Create.
window.openNewBrandModal = function openNewBrandModal() {
  // Multi-store + actual-ad-account model:
  //   stores       = chosen CMS connectors (multi)  → meta.assets.cms (ids)
  //   adAccountIds = actual Meta ad account ids     → meta.ad_account_ids (strings)
  //   adConnIds    = the ad connectors those accounts belong to → meta.assets.ads (ids)
  //   shipping     = chosen shipping connectors     → meta.assets.shipping (ids)
  const wState = {
    step: 1,
    stores: [],          // [{id, name, provider}]
    adAccountIds: [],    // ['act_...']
    adConnIds: new Set(),// derived: connector ids whose accounts the user picked
    shipping: [],        // [shipping_connector_id]
    prefixes: [],
    folder: null,        // {id, name} — picked from Drive (where this brand lives)
  };
  // Loaded once when Step 2 first renders
  let __adAccountsLoading = false;
  let __adAccounts = null; // [{id (act_…), name, currency, _connId, _connName}]

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop open" id="brModal">
      <div class="modal" style="max-width:560px;">
        <div class="modal-head">
          <div class="modal-title" id="brTitle">New brand</div>
          <button class="modal-close" id="brClose">✕</button>
        </div>
        <div style="padding:14px 20px 0;">
          <div id="brSteps" style="display:flex;gap:6px;margin-bottom:6px;">
            <div class="brStep" data-i="1" style="flex:1;height:4px;border-radius:2px;background:#1A1A1A;"></div>
            <div class="brStep" data-i="2" style="flex:1;height:4px;border-radius:2px;background:#E1E3E5;"></div>
            <div class="brStep" data-i="3" style="flex:1;height:4px;border-radius:2px;background:#E1E3E5;"></div>
            <div class="brStep" data-i="4" style="flex:1;height:4px;border-radius:2px;background:#E1E3E5;"></div>
          </div>
          <div style="font-size:11px;color:#6D7175;margin-bottom:10px;" id="brStepLabel">Step 1 of 4 · Choose stores</div>
        </div>
        <div class="modal-body" id="brBody"></div>
        <div class="modal-foot" id="brFoot"></div>
      </div>
    </div>`);
  const modal = document.getElementById('brModal');
  const close = () => modal.remove();
  $('brClose').addEventListener('click', close);
  modal.addEventListener('click', e => { if (e.target.id === 'brModal') close(); });

  function defaultBrandName(){
    if (!wState.stores.length) return 'New brand';
    if (wState.stores.length === 1) return wState.stores[0].name;
    return wState.stores.map(s => s.name).join(' + ');
  }

  function setStepBar(){
    document.querySelectorAll('.brStep').forEach(el => {
      el.style.background = parseInt(el.dataset.i,10) <= wState.step ? '#1A1A1A' : '#E1E3E5';
    });
    const labels = ['', 'Step 1 of 4 · Choose stores', 'Step 2 of 4 · Link ad accounts', 'Step 3 of 4 · Link shipping accounts', 'Step 4 of 4 · Product code & create'];
    $('brStepLabel').textContent = labels[wState.step];
    const titles = ['', 'Choose stores', 'Link ad accounts', 'Link shipping accounts', 'Product code'];
    $('brTitle').textContent = titles[wState.step] + ' · ' + defaultBrandName();
  }

  // ── Step 1: pick stores (multi-select) ─────────────────────────
  function renderStep1(){
    const stores = __brandsState.conns.cms || [];
    const linked = new Set();
    __brandsState.brands.forEach(b => ((b.meta && b.meta.assets && b.meta.assets.cms)||[]).forEach(id => linked.add(id)));
    const available = stores.filter(s => !linked.has(s.id));
    const intro = `<div style="font-size:12px;color:#6D7175;margin-bottom:12px;">Pick one or more stores for this brand. The brand name comes from the first store (you can rename later).</div>`;
    const html = available.length
      ? intro + available.map(s => `
          <label class="store-pick" data-sid="${s.id}" style="display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid #E1E3E5;border-radius:10px;margin-bottom:6px;cursor:pointer;">
            <input type="checkbox" value="${s.id}" ${wState.stores.find(x=>x.id===s.id)?'checked':''} style="width:16px;height:16px;cursor:pointer;flex-shrink:0;">
            <div style="width:32px;height:32px;border-radius:8px;background:${brandColor(s.id+100)};color:#FFF;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;">${escapeHtml(brandInitials(s.name||s.provider))}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:700;color:#1A1A1A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(s.name||s.provider)}</div>
              <div style="font-size:11px;color:#6D7175;text-transform:capitalize;">${escapeHtml(s.provider||'')}</div>
            </div>
          </label>`).join('')
      : `<div style="padding:30px 20px;text-align:center;color:#6D7175;font-size:13px;background:#FAFAFA;border:1px dashed #DCDCDC;border-radius:10px;">
          ${stores.length ? 'All connected stores already belong to a brand. Add another store in <a href="#cms" style="color:#005BD3;">Settings → CMS</a> first.'
                          : 'No stores connected yet. Open <a href="#cms" style="color:#005BD3;">Settings → CMS</a> to connect your first store.'}
         </div>`;
    $('brBody').innerHTML = html + '<div id="brErr"></div>';
    $('brFoot').innerHTML = `
      <button class="btn btn-ghost" id="brSkipStore" style="font-size:12px;">Empty brand</button>
      <button class="btn btn-primary" id="brNext" ${wState.stores.length?'':'disabled'}>Next</button>`;
    $('brBody').querySelectorAll('.store-pick input').forEach(cb => {
      cb.addEventListener('change', () => {
        const sid = parseInt(cb.value, 10);
        const s = (__brandsState.conns.cms||[]).find(x => x.id === sid);
        if (!s) return;
        if (cb.checked) { if (!wState.stores.find(x=>x.id===sid)) wState.stores.push({id:s.id, name:s.name||s.provider, provider:s.provider}); }
        else wState.stores = wState.stores.filter(x => x.id !== sid);
        $('brNext').disabled = !wState.stores.length;
        setStepBar();
      });
    });
    $('brNext').addEventListener('click', () => { wState.step = 2; render(); });
    $('brSkipStore').addEventListener('click', () => {
      const name = prompt('Brand name?');
      if (!name || !name.trim()) return;
      wState.stores = [{ id: null, name: name.trim() }];
      wState.step = 2; render();
    });
  }

  // ── Step 2: pick ACTUAL ad accounts (live from Meta) ──────────
  async function loadAdAccounts(){
    if (__adAccounts) return __adAccounts;
    const adConns = (__brandsState.conns.ads || []).filter(c => c.provider === 'meta');
    if (!adConns.length) { __adAccounts = []; return __adAccounts; }
    __adAccountsLoading = true;
    try {
      const results = await Promise.all(adConns.map(c =>
        api('/meta.php?action=accounts&connector_id=' + c.id)
          .then(d => ({ ok:true, c, rows: d.rows || [] }))
          .catch(e => ({ ok:false, c, error: e.message, rows: [] }))
      ));
      const merged = [], seen = new Set();
      results.forEach(r => {
        r.rows.forEach(a => {
          const id = a.account_id || a.id; // 'act_…'
          if (seen.has(id)) return;
          seen.add(id);
          merged.push({
            id,
            name:     a.name || id,
            currency: a.currency || '',
            _connId:  r.c.id,
            _connName: r.c.name || r.c.provider,
          });
        });
      });
      __adAccounts = merged;
    } finally { __adAccountsLoading = false; }
    return __adAccounts;
  }

  async function renderStep2(){
    $('brBody').innerHTML = `<div style="padding:30px 20px;text-align:center;color:#6D7175;font-size:13px;"><span class="spinner"></span> Loading ad accounts from Meta…</div>`;
    $('brFoot').innerHTML = `
      <button class="btn btn-ghost" id="brBack">Back</button>
      <button class="btn btn-primary" id="brNext">Next</button>`;
    $('brBack').addEventListener('click', () => { wState.step = 1; render(); });
    $('brNext').addEventListener('click', () => { wState.step = 3; render(); });

    const accounts = await loadAdAccounts();
    if (!accounts.length) {
      $('brBody').innerHTML = `<div style="padding:30px 20px;text-align:center;color:#6D7175;font-size:13px;background:#FAFAFA;border:1px dashed #DCDCDC;border-radius:10px;">No Meta ad accounts found. Connect a Meta account in <a href="#ads" style="color:#005BD3;">Settings → Ads</a> or skip this step.</div>`;
      $('brNext').textContent = 'Skip';
      return;
    }
    const html = `<div style="font-size:12px;color:#6D7175;margin-bottom:12px;">Pick every ad account that belongs to <b>${escapeHtml(defaultBrandName())}</b>. Multi-select supported.</div>`
      + accounts.map(a => `
          <label class="ad-acct-pick" style="display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid #E1E3E5;border-radius:10px;margin-bottom:6px;cursor:pointer;">
            <input type="checkbox" value="${escapeHtml(a.id)}" data-conn="${a._connId}" ${wState.adAccountIds.includes(a.id)?'checked':''} style="width:16px;height:16px;cursor:pointer;flex-shrink:0;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:700;color:#1A1A1A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(a.name)}</div>
              <div style="font-size:11px;color:#6D7175;font-family:'JetBrains Mono','Courier New',monospace;">${escapeHtml(a.id)} · ${escapeHtml(a._connName)}${a.currency?' · '+escapeHtml(a.currency):''}</div>
            </div>
          </label>`).join('');
    $('brBody').innerHTML = html;
    $('brBody').querySelectorAll('.ad-acct-pick input').forEach(cb => {
      cb.addEventListener('change', () => {
        const id = cb.value;
        const connId = parseInt(cb.dataset.conn, 10);
        if (cb.checked) {
          if (!wState.adAccountIds.includes(id)) wState.adAccountIds.push(id);
          wState.adConnIds.add(connId);
        } else {
          wState.adAccountIds = wState.adAccountIds.filter(x => x !== id);
          // Drop the connector only if no remaining account from it stays selected
          const stillUses = wState.adAccountIds.some(aid => {
            const a = accounts.find(x => x.id === aid);
            return a && a._connId === connId;
          });
          if (!stillUses) wState.adConnIds.delete(connId);
        }
      });
    });
  }

  // ── Step 3: pick shipping (multi) ───────────────────────────────
  function renderStep3(){
    const ship = __brandsState.conns.shipping || [];
    const html = ship.length
      ? `<div style="font-size:12px;color:#6D7175;margin-bottom:12px;">Pick the shipping accounts used by <b>${escapeHtml(defaultBrandName())}</b>.</div>
         ${ship.map(s => `
           <label class="ship-pick" data-sid="${s.id}" style="display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid #E1E3E5;border-radius:10px;margin-bottom:6px;cursor:pointer;">
             <input type="checkbox" value="${s.id}" ${wState.shipping.includes(s.id)?'checked':''} style="width:16px;height:16px;cursor:pointer;flex-shrink:0;">
             <div style="flex:1;min-width:0;">
               <div style="font-size:13px;font-weight:700;color:#1A1A1A;">${escapeHtml(s.name||s.provider)}</div>
               <div style="font-size:11px;color:#6D7175;text-transform:capitalize;">${escapeHtml(s.provider||'')}</div>
             </div>
           </label>`).join('')}`
      : `<div style="padding:30px 20px;text-align:center;color:#6D7175;font-size:13px;background:#FAFAFA;border:1px dashed #DCDCDC;border-radius:10px;">No shipping accounts connected. <a href="#shipping" style="color:#005BD3;">Add one</a> or skip.</div>`;
    $('brBody').innerHTML = html;
    $('brFoot').innerHTML = `
      <button class="btn btn-ghost" id="brBack">Back</button>
      <button class="btn btn-primary" id="brNext">Next</button>`;
    $('brBack').addEventListener('click', () => { wState.step = 2; render(); });
    $('brBody').querySelectorAll('.ship-pick input').forEach(cb => {
      cb.addEventListener('change', () => {
        const id = parseInt(cb.value, 10);
        if (cb.checked) { if (!wState.shipping.includes(id)) wState.shipping.push(id); }
        else wState.shipping = wState.shipping.filter(x => x !== id);
      });
    });
    $('brNext').addEventListener('click', () => { wState.step = 4; render(); });
  }

  // ── Step 4: SKU prefix + create ─────────────────────────────────
  // The prefix (e.g. "re" for Rehla) tags products that belong to this
  // brand. Whenever the user imports a shipping sheet or pulls orders,
  // only items whose SKU starts with one of these prefixes show up.
  function renderStep4(){
    const firstStoreName = (wState.stores[0] && wState.stores[0].name) || '';
    const suggested = firstStoreName.trim().slice(0, 2).toLowerCase();
    const csv = wState.prefixes.length ? wState.prefixes.join(', ') : suggested;
    const storeCount = wState.stores.filter(s => s.id).length;
    const folderText = wState.folder ? wState.folder.name : 'No folder picked yet';
    $('brBody').innerHTML = `
      <div class="field">
        <div class="field-label">Drive folder for this brand</div>
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid #DCDCDC;border-radius:8px;background:#FAFAFA;">
          <span style="font-size:18px;">📁</span>
          <div style="flex:1;min-width:0;">
            <div id="brFolderName" style="font-size:13px;font-weight:600;color:${wState.folder?'#1A1A1A':'#9CA3AF'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(folderText)}</div>
            <div id="brFolderId" style="font-size:10px;color:#6D7175;font-family:'JetBrains Mono',monospace;">${escapeHtml(wState.folder?wState.folder.id:'')}</div>
          </div>
          <button type="button" class="btn btn-ghost" id="brPickFolder" style="height:30px;padding:0 12px;font-size:12px;">${wState.folder?'Change':'Pick from Drive'}</button>
        </div>
        <div class="field-help">Sheets and Products subfolders will be created inside this folder. Pick an existing brand folder or create one in Drive first.</div>
      </div>

      <div style="font-size:12px;color:#6D7175;margin:18px 0 14px;line-height:1.7;">
        Every product on your store is coded with a 2-letter prefix that identifies the brand.
        For example, <code style="background:#F1F1F1;padding:1px 5px;border-radius:3px;">re</code> tags products like <code style="background:#F1F1F1;padding:1px 5px;border-radius:3px;">re-gm-001</code> as <b>Rehla</b>'s.
      </div>
      <div class="field">
        <div class="field-label">Product code (2-letter prefix)</div>
        <input type="text" id="brPrefix" value="${escapeHtml(csv)}" placeholder="e.g. re" maxlength="40" style="width:100%;padding:10px 12px;border:1px solid #DCDCDC;border-radius:8px;font-size:14px;font-family:'JetBrains Mono','Courier New',monospace;letter-spacing:1px;text-transform:lowercase;">
        <div class="field-help">Comma-separate to support multiple codes (e.g. <code>re, gm</code>).</div>
      </div>
      <div style="margin-top:14px;padding:12px 14px;background:#F8FAFC;border:1px solid #E1E3E5;border-radius:8px;font-size:12px;color:#1A1A1A;line-height:1.7;">
        <div style="font-weight:600;margin-bottom:4px;">Will create:</div>
        · Brand <b>${escapeHtml(defaultBrandName())}</b> in <b>${escapeHtml(folderText)}</b><br>
        · Sheets/ subfolder · 7 sheet templates copied · Products/ subfolder<br>
        · Linked: ${storeCount} store${storeCount===1?'':'s'} · ${wState.adAccountIds.length} ad account${wState.adAccountIds.length===1?'':'s'} · ${wState.shipping.length} shipping
      </div>
      <div id="brErr"></div>`;
    $('brFoot').innerHTML = `
      <button class="btn btn-ghost" id="brBack">Back</button>
      <button class="btn btn-primary" id="brCreate" ${wState.folder?'':'disabled'}>Create brand</button>`;
    $('brBack').addEventListener('click', () => { wState.step = 3; render(); });
    $('brPickFolder').addEventListener('click', () => {
      if (!window.pickGoogleDriveFolderId) { alert('Drive picker not loaded yet — refresh the page.'); return; }
      window.pickGoogleDriveFolderId((folder) => {
        wState.folder = { id: folder.id, name: folder.name };
        renderStep4(); // re-render to show picked folder + enable Create
      });
    });
    $('brCreate').addEventListener('click', () => {
      if (!wState.folder) { $('brErr').innerHTML = '<div style="color:#991B1B;font-size:12px;margin-top:10px;">Pick a Drive folder first.</div>'; return; }
      const raw = $('brPrefix').value || '';
      wState.prefixes = raw.split(/[,\s]+/).map(s => s.trim().toLowerCase()).filter(Boolean);
      createBrand();
    });
  }

  async function createBrand(){
    const btn = $('brCreate');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating…';
    try {
      const body = {
        name: defaultBrandName(),
        drive_folder_id: wState.folder.id, // user-picked Drive folder
        assets: {
          cms:      wState.stores.filter(s => s.id).map(s => s.id),
          ads:      Array.from(wState.adConnIds),  // connector ids whose accounts were picked
          shipping: wState.shipping,
        },
        ad_account_ids: wState.adAccountIds,       // actual Meta act_… ids
        sku_prefixes:   wState.prefixes,
      };
      const r = await api('/brands.php', { method: 'POST', body: JSON.stringify(body) });
      close();
      await reloadBrandsList();
      if (window.refreshTopbarProfile) window.refreshTopbarProfile();
      if (window.setActiveBrandId) window.setActiveBrandId(r.id);
      // Open Configure modal for fine-tuning (logo upload etc.)
      const created = __brandsState.brands.find(b => b.id === r.id);
      if (created) openConfigureBrand(created);
    } catch (e) {
      $('brErr').innerHTML = '<div style="color:#991B1B;font-size:12px;margin-top:10px;">⚠ ' + escapeHtml(e.message) + '</div>';
      btn.disabled = false; btn.textContent = 'Create brand';
    }
  }

  function render(){
    setStepBar();
    if      (wState.step === 1) renderStep1();
    else if (wState.step === 2) renderStep2();   // async — fires the spinner first
    else if (wState.step === 3) renderStep3();
    else                         renderStep4();
  }
  render();
};

    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        // Aggressive: 96x96 JPEG quality 0.7 → typically <5KB. Stays well
        // under PHP post_max_size and any edge proxy body limits ("Failed to
        // fetch" symptom comes from oversized payloads being rejected).
        const max = 96;
        const scale = Math.min(1, max / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        workingLogo = canvas.toDataURL('image/jpeg', 0.7);
        console.log('Brand logo data URL size:', Math.round(workingLogo.length / 1024) + 'KB');

        $('cfgLogoRemove').style.display = '';

      img.src = ev.target.result;

    const idEl = $('cfgSheetsFolderId');
    const open = $('cfgSheetsFolderOpen');
    if (workingSheetsFolder) {
      nm.textContent = workingSheetsFolder.name;
      nm.style.color = '#1A1A1A';
      idEl.textContent = workingSheetsFolder.id;
      open.dataset.folderId = workingSheetsFolder.id;
      open.dataset.folderName = workingSheetsFolder.name || 'Folder';
      open.style.pointerEvents = '';
      open.style.opacity = '';
    } else {
      nm.textContent = 'Not picked — falls back to Products folder';
      nm.style.color = '#9CA3AF';
      idEl.textContent = '';
      open.dataset.folderId = '';
      open.style.pointerEvents = 'none';
      open.style.opacity = '0.4';
    }
  }
  $('cfgPickSheetsFolder').addEventListener('click', () => {
    if (!window.pickGoogleDriveFolderId) { alert('Drive picker not loaded — refresh the page.'); return; }
    window.pickGoogleDriveFolderId((folder) => {
      workingSheetsFolder = { id: folder.id, name: folder.name };
      refreshSheetsFolderUI();
    });
  });
  // Optional clear button (only present when a sheets folder is set)
  if ($('cfgClearSheetsFolder')) {
    $('cfgClearSheetsFolder').addEventListener('click', () => {
      workingSheetsFolder = null;
      refreshSheetsFolderUI();
    });
  }

  $('cfgSave').addEventListener('click', async () => {
    const newName = $('cfgName').value.trim() || brand.name;
    const prefixesCsv = $('cfgPrefixes').value || '';
    const prefList = prefixesCsv.split(/[,\s]+/).map(s => s.trim().toLowerCase()).filter(Boolean);
    // Translate the picked actual ad-account IDs back into their owning
    // connector IDs so meta.assets.ads stays in sync (used by Reports/Ads).
    const adConnIdsForPicked = new Set();
    if (__adAccts) {
      sel.adAccts.forEach(actId => {
        const a = __adAccts.find(x => String(x.id) === String(actId));
        if (a && a._connId != null) adConnIdsForPicked.add(Number(a._connId));
      });
    } else if (Array.isArray(assets.ads)) {
      assets.ads.forEach(id => adConnIdsForPicked.add(Number(id)));
    }
    const meta = Object.assign({}, brand.meta || {}, {
      assets: {
        ads:      Array.from(adConnIdsForPicked),
        shipping: Array.from(sel.shipping),
        cms:      Array.from(sel.cms),
      },
      ad_account_ids: Array.from(sel.adAccts),
      sku_prefixes: prefList,
      logo: workingLogo || null,
      // Persist the picked folder names so the Configure modal shows
      // them next time the user opens it (not just the raw IDs).
      drive_folder_name:  workingDriveFolder  ? workingDriveFolder.name  : null,
      sheets_folder_id:   workingSheetsFolder ? workingSheetsFolder.id   : null,
      sheets_folder_name: workingSheetsFolder ? workingSheetsFolder.name : null,
    });
    const body = { id: brand.id, name: newName, meta };
    if (workingDriveFolder && workingDriveFolder.id !== brand.drive_folder_id) {
      body.drive_folder_id = workingDriveFolder.id;
    }
    const btn = $('cfgSave'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
    // ── Step 0: persist the client (create new / update folder) ──
    try {
      if (workingClientCreate) {
        if (!workingClientCreate.name) throw new Error('Enter a client name (or pick an existing client).');
        const created = await api('/clients.php', { method: 'POST', body: JSON.stringify({
          name: workingClientCreate.name,
          drive_folder_id: workingClientCreate.drive_folder_id || ''
        }) });
        workingClientId = Number(created.id);
        workingClientCreate = null;
      } else if (workingClientId) {
        const c = findClient(workingClientId);
        if (c && c.__pendingFolderChange) {
          await api('/clients.php', { method: 'PATCH', body: JSON.stringify({ id: c.id, drive_folder_id: c.drive_folder_id || '' }) });
          delete c.__pendingFolderChange; delete c.__newFolderName;
        }
      }
      if (workingClientId && Number(brand.client_id) !== workingClientId) {
        body.client_id = workingClientId;
      }
    } catch (eClient) {
      $('cfgErr').innerHTML = '<div style="color:#991B1B;font-size:12px;margin:8px 0;">⚠ Client save failed: ' + escapeHtml(eClient.message || String(eClient)) + '</div>';
      btn.disabled = false; btn.textContent = 'Save';
      return;
    }
    const payload = JSON.stringify(body);
    console.log('Save brand payload size:', Math.round(payload.length / 1024) + 'KB');
    try {
      // Hostinger sometimes blocks JSON bodies > 64KB at the edge. If the
      // payload is too big (tons of selected accounts + a logo), strip the
      // logo to a separate save to keep the main save small.
      if (payload.length > 60000 && workingLogo) {
        // First save without logo
        const lite = Object.assign({}, body);
        const liteMeta = Object.assign({}, meta); liteMeta.logo = null;
        lite.meta = liteMeta;
        await api('/brands.php', { method: 'PATCH', body: JSON.stringify(lite) });
        // Then save just the logo
        await api('/brands.php', { method: 'PATCH', body: JSON.stringify({ id: brand.id, meta: { ...brand.meta, logo: workingLogo } }) });
      } else {
        await api('/brands.php', { method: 'PATCH', body: payload });
      }
      brand.name = newName; brand.meta = meta;
      if (body.drive_folder_id) brand.drive_folder_id = body.drive_folder_id;
      if (body.client_id) brand.client_id = body.client_id;
      close();
      // Re-fetch brands + clients so the UI reflects new associations
      // (especially needed when a brand-new client was created on Save).
      reloadBrandsList();
      if (window.refreshTopbarProfile) window.refreshTopbarProfile();
    } catch (e) {
      const msg = (e && e.message) || String(e);
      const detail = msg === 'Failed to fetch'
        ? 'Network blocked the request (' + Math.round(payload.length/1024) + 'KB). Try removing the logo and saving the assets first, then re-add the logo.'
        : msg;
      $('cfgErr').innerHTML = '<div style="color:#991B1B;font-size:12px;margin:8px 0;">⚠ ' + escapeHtml(detail) + '</div>';
      btn.disabled = false; btn.textContent = 'Save';
    }
  });
}

};

  // CMS section also surfaces the WP Funnels bridge plugin download (used by

  // the user wires up everything for a new store in one place.
  const pluginCard = section === 'cms' ? `
    <div class="panel" style="margin-bottom:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
      <div style="font-size:22px;line-height:1;">🔌</div>

        <div style="font-size:12px;color:#6D7175;line-height:1.5;">Required on every WordPress store you want Landing Page Auto to publish to. Install once via <strong>WP Admin → Plugins → Add New → Upload Plugin</strong>.</div>
      </div>
      <a class="btn btn-primary" id="dlAutoLandZip" href="wp-plugin/auto-land.zip" download>
        ⬇ Download .zip
      </a>
    </div>
  ` : '';
  c.innerHTML = `
    <div class="settings-bread"><a href="/">Home</a> › Connectors › ${title}</div>
    <h1 class="settings-title">${title}</h1>
    <div class="settings-subtitle">${desc}</div>
    <div class="info-banner">
      <span class="ico">ⓘ</span>
      <div>Add credentials for each account. Once saved, the tool loads data from this account automatically.</div>
    </div>
    ${pluginCard}
    <div class="panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div>
          <div class="panel-title">Connected accounts</div>
          <div class="panel-desc" style="margin-bottom:0;" id="countLine">Loading…</div>
        </div>
        <button class="btn btn-primary" id="addBtn">+ Add account</button>
      </div>
      <div id="connectorList"><div class="loading-state">Loading…</div></div>
    </div>
  `;
  // Auto-version the plugin filename (reads readme.txt Stable tag) + cache-bust the URL
  if (section === 'cms') wireAutoLandDownload();
  $('addBtn').addEventListener('click', () => openConnectorModal(section));
  try {
    const data = await api('/connectors.php?type=' + section);
    cache[section] = data.rows;

    $('connectorList').innerHTML = `<div class="info-banner error"><span class="ico">⚠</span><div>Failed to load: ${escape(err.message)}</div></div>`;

function renderConnectorList(section, rows) {
  $('countLine').textContent = `${rows.length} ${rows.length===1?'account':'accounts'} connected.`;
  if (rows.length === 0) {
    $('connectorList').innerHTML = `<div class="empty-state">No accounts yet. Click <strong>Add account</strong> to connect.</div>`;
    return;
  }
  $('connectorList').innerHTML = `<div class="item-list">${rows.map(it => `
    <div class="item-row">
      <div class="item-ico">${providerIcon(section, it.provider)}</div>
      <div class="item-main">
        <div class="item-title">${escape(it.name)}</div>
        <div class="item-meta">${escape(providerName(section, it.provider))}${it.url?' · '+escape(it.url):''}${it.consumer_key?' · '+maskToken(it.consumer_key):it.token?' · '+maskToken(it.token):''}</div>
      </div>
      <div class="item-actions">
        <button class="btn" data-edit="${it.id}">Edit</button>
        <button class="btn btn-danger" data-del="${it.id}">Delete</button>
      </div>
    </div>`).join('')}</div>`;
  document.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
    if (!confirm('Delete this account?')) return;
    try {
      await api('/connectors.php?id=' + b.dataset.del, {method: 'DELETE'});
      toast('Deleted');
      renderContent();
    } catch (err) { toast(err.message, true); }
  }));
  document.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => {
    const it = rows.find(r => String(r.id) === b.dataset.edit);
    openConnectorModal(section, it);
  }));
}

function providerName(section, id) { return (PROVIDERS[section] || []).find(p => p.id === id)?.name || id; }
function providerIcon(section, id) {
  const p = (PROVIDERS[section] || []).find(p => p.id === id);
  if (!p) return '🔌';
  if (p.logo) return `<img src="${escape(p.logo)}" alt="${escape(p.name)}" style="max-width:32px;max-height:24px;display:block;object-fit:contain;">`;
  return p.icon || '🔌';
}
function maskToken(t) { if (!t) return ''; const s = String(t); if (s.length <= 8) return '••••'; return s.slice(0,4)+'••••'+s.slice(-4); }
function escape(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

// ── MODAL ────────────────────────────────────────────────────────────
let modalCtx = null;

function openConnectorModal(section, editing, providerOverride) {
  const providers = PROVIDERS[section] || [];
  const initialProvider = editing?.provider || providerOverride || providers[0]?.id;
  modalCtx = { section, editing, provider: initialProvider };
  // When the user opens the modal from the Connectors hub (or is editing an
  // existing row), the provider is already known — hide the provider grid and
  // jump straight to that provider's fields. Show the grid only on the legacy
  // "Add account" path from the per-category sub-page.
  const lockProvider = !!(providerOverride || editing);
  const providerInfo = providers.find(p => p.id === initialProvider) || {};
  $('modalTitle').textContent = editing
    ? ('Edit ' + (providerInfo.name || titleMap[section]?.[0] || 'connector'))
    : ('Connect ' + (providerInfo.name || titleMap[section]?.[0] || ''));
  $('modalBody').innerHTML = `
    ${lockProvider ? '' : `
    <div style="margin-bottom:14px;">
      <label class="form-label" style="display:block;margin-bottom:8px;">Provider</label>
      <div class="provider-grid" id="providerGrid">
        ${providers.map(p => `
          <div class="provider-chip ${initialProvider===p.id?'selected':''}" data-pid="${p.id}">
            <div class="ico" style="height:36px;display:flex;align-items:center;justify-content:center;">${p.logo
              ? `<img src="${escape(p.logo)}" alt="${escape(p.name)}" style="max-width:80px;max-height:32px;object-fit:contain;">`
              : (p.icon||'🔌')}</div>
            <div class="name">${p.name}</div>
          </div>`).join('')}
      </div>
    </div>`}
    <div id="providerFields"></div>
  `;
  if (!lockProvider) {
    document.querySelectorAll('#providerGrid .provider-chip').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('#providerGrid .provider-chip').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
        modalCtx.provider = el.dataset.pid;
        renderProviderFields();
      });
    });
  }
  renderProviderFields();
  $('modalBackdrop').classList.add('open');
}

function renderProviderFields() {
  const fields = PROVIDER_FIELDS[modalCtx.provider] || PROVIDER_FIELDS._default;
  const e = modalCtx.editing || {};
  const guide = PROVIDER_GUIDES[modalCtx.provider];
  // Strip any leading "1." / "1) " numbering inside the step content — the circle
  // already provides the number, so this avoids "1. 1. ..." double prefixes.
  const stripLeadingNum = (s) => String(s).replace(/^\s*\d+[.)]\s*/, '');
  const guideHtml = guide ? `
    <div class="guide-card">
      <div class="guide-title">
        <svg class="guide-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>${escape(guide.title)}</span>
      </div>
      ${guide.steps.map((s, i) => `
        <div class="guide-step">
          <div class="guide-step-num">${i + 1}</div>
          <div class="guide-step-text">${stripLeadingNum(s)}</div>
        </div>
      `).join('')}
      ${guide.note ? `<div class="guide-note"><strong>Note:</strong> ${escape(guide.note)}</div>` : ''}
    </div>` : '';
  $('providerFields').innerHTML = guideHtml + fields.map(f => {
    if (f._custom === 'fb-login') {
      const connected = e.meta && e.meta.fb_user_name;
      return `<div class="form-row" style="grid-template-columns:1fr;gap:8px;margin-bottom:18px;padding:14px;background:#F1F1F1;border-radius:10px;">
        <div style="font-size:13px;font-weight:600;">Recommended — connect with Facebook login</div>
        <div style="font-size:12px;color:#6D7175;line-height:1.5;">Opens Facebook in a popup, you log in, and we get a long-lived (~60 day) token automatically. No need to paste anything.</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <button type="button" class="btn btn-primary" id="btnFbLogin" style="background:#1877F2;border-color:#1877F2;display:inline-flex;align-items:center;gap:8px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.41 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.96.93-1.96 1.89v2.27h3.33l-.53 3.49h-2.8V24C19.61 23.1 24 18.1 24 12.07z"/></svg>
            Sign in with Facebook
          </button>
          ${connected ? `<span style="font-size:12px;color:#0E8345;font-weight:600;">✓ Connected as ${escape(e.meta.fb_user_name)}</span>` : ''}
          <span id="fbLoginStatus" style="font-size:12px;color:#6D7175;"></span>
        </div>
      </div>
      <div style="text-align:center;font-size:11px;color:#6D7175;margin-bottom:8px;letter-spacing:0.4px;">— OR PASTE A TOKEN MANUALLY —</div>`;
    }
    if (f._custom === 'verify-meta') {
      return `<div class="form-row" style="grid-template-columns:1fr;gap:6px;margin-bottom:14px;">
        <button type="button" class="btn" id="btnVerifyMeta">🔍 Verify token & list ad accounts</button>
        <div id="metaVerifyResult" style="font-size:12px;color:#6D7175;margin-top:4px;"></div>
      </div>`;
    }
    // Meta-stored fields (e.g. wp_username / wp_app_password) live under e.meta
    const val = escape((f.meta ? (e.meta?.[f.key]) : e[f.key]) ?? '');
    const inputType = f.secret ? 'password' : 'text';
    const inputEl = f.multiline
      ? `<textarea class="form-textarea" id="f_${f.key}" placeholder="${escape(f.placeholder||'')}">${val}</textarea>`
      : `<input class="form-input" id="f_${f.key}" type="${inputType}" placeholder="${escape(f.placeholder||'')}" value="${val}">`;
    const helpEl = f.help ? `<div class="form-help">${escape(f.help)}</div>` : '';
    return `<div class="form-row" style="grid-template-columns:1fr;gap:6px;margin-bottom:14px;">
      <label class="form-label">${f.label}${f.required?' <span style="color:#D72C0D;">*</span>':''}</label>
      ${inputEl}${helpEl}
    </div>`;
  }).join('');
  // Wire up verify button (Meta only)
  const btnV = $('btnVerifyMeta');
  if (btnV) btnV.addEventListener('click', verifyMetaToken);
  // Wire up Facebook Login button
  const btnFB = $('btnFbLogin');
  if (btnFB) btnFB.addEventListener('click', startFacebookLogin);
  // Inject the column-mapper section AFTER the standard fields. Lets the
  // user upload a sample sheet and tell the system which column is which —
  // so adding a new carrier or confirmation system doesn't need code
  // changes, just a mapping. Saved into connector.meta.column_map.
  // Confirmation systems (Zomeza / Wesell) get the same UI but with
  // CONFIRMED/CANCELED status fields + an employee column.
  if (modalCtx.section === 'shipping' || modalCtx.section === 'confirmation') {
    renderShippingMapper();
  }
}

// Lazy-load SheetJS (XLSX) once so settings.html stays light when no
// shipping carrier is being edited.
function loadSheetJs(){
  return new Promise((resolve, reject) => {
    if (window.XLSX) return resolve(window.XLSX);
    if (window._xlsxLoading) return window._xlsxLoading.then(resolve, reject);
    window._xlsxLoading = new Promise((ok, fail) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload = () => ok(window.XLSX);
      s.onerror = () => fail(new Error('Failed to load XLSX library'));
      document.head.appendChild(s);
    });
    window._xlsxLoading.then(resolve, reject);
  });
}

function renderShippingMapper(){
  // The mapper lives in a side panel below the standard provider fields.
  const e = modalCtx.editing || {};
  const existing = (e.meta && e.meta.column_map) || DEFAULT_COLUMN_MAPS[modalCtx.provider] || {};
  // Build the column-list dropdowns are pre-populated from. Order:
  //   1. Saved meta.column_list — headers persisted from a previous
  //      sample upload (so the user never has to re-upload to get options).
  //   2. KNOWN_CARRIER_COLUMNS for this provider (built-in fallback).
  //   3. Saved column_map values (so we never lose user picks).
  //   4. Anything the user adds this session by uploading a NEW sample.
  const baseCols = [];
  const savedList = (e.meta && Array.isArray(e.meta.column_list)) ? e.meta.column_list : [];
  savedList.forEach(c => { if (typeof c === 'string' && c && !baseCols.includes(c)) baseCols.push(c); });
  (KNOWN_CARRIER_COLUMNS[modalCtx.provider] || []).forEach(c => { if (!baseCols.includes(c)) baseCols.push(c); });
  Object.values(existing).forEach(v => {
    // Don't add free-text fields (delivered_values / returned_values) — they aren't column names.
    if (!v) return;
    if (typeof v !== 'string') return;
    if (!baseCols.includes(v) && v.length < 80 && !v.includes(',')) baseCols.push(v);
  });
  // Track all known headers (saved + built-in) so saveConnector() can
  // persist the live ones added by uploading a NEW sample. Only headers
  // are stored — not the row data — so the meta JSON stays small.
  modalCtx._discoveredColumns = baseCols.slice();
  // Custom dropdown — native <select> ellipsizes long column names in
  // both the collapsed value AND the open panel on some browsers. We
  // render a clickable trigger + a popup list where each row wraps to
  // show the FULL column name regardless of width.
  const ddHtml = (inputId, selected) => `
    <div class="cmap-dd" data-cmap-dd="1">
      <button type="button" class="cmap-dd-trigger" id="${inputId}_btn" title="${escape(selected || '')}">
        <span class="cmap-dd-val">${selected ? escape(selected) : '<span style="color:#9CA3AF;">— pick a column —</span>'}</span>
        <span class="cmap-dd-caret">▾</span>
      </button>
      <div class="cmap-dd-panel" id="${inputId}_panel" style="display:none;">
        <input type="text" class="cmap-dd-search" placeholder="Search columns…" id="${inputId}_search">
        <div class="cmap-dd-list" id="${inputId}_list">
          <div class="cmap-dd-row" data-val="">— pick a column —</div>
          ${baseCols.map(c => `<div class="cmap-dd-row${c === selected ? ' selected' : ''}" data-val="${escape(c)}" title="${escape(c)}">${escape(c)}</div>`).join('')}
        </div>
      </div>
      <input type="hidden" id="${inputId}" value="${escape(selected || '')}" data-cmap-col="1">
    </div>`;

  const fields = MAPPING_FIELDS_BY_SECTION[modalCtx.section] || MAPPING_FIELDS_BY_SECTION.shipping;
  const fieldsHtml = fields.map(f => {
    const v = (existing[f.key] != null ? existing[f.key] : '');
    const inputId = 'cmap_' + f.key;
    if (f.isText) {
      return `<div class="form-row" style="grid-template-columns:1fr;gap:6px;margin-bottom:12px;">
        <label class="form-label" style="font-size:12px;">${escape(f.label)}${f.required ? ' <span style="color:#D72C0D;">*</span>' : ''}</label>
        <input class="form-input" id="${inputId}" type="text" placeholder="${escape(f.placeholder||'')}" value="${escape(v)}">
        ${f.help ? `<div class="form-help">${escape(f.help)}</div>` : ''}
      </div>`;
    }
    return `<div class="form-row" style="grid-template-columns:1fr;gap:6px;margin-bottom:12px;">
      <label class="form-label" style="font-size:12px;">${escape(f.label)}${f.required ? ' <span style="color:#D72C0D;">*</span>' : ''}</label>
      ${ddHtml(inputId, v)}
      ${f.help ? `<div class="form-help">${escape(f.help)}</div>` : ''}
    </div>`;
  }).join('');

  const panel = `
    <div class="guide-card" id="shippingMapperPanel" style="margin-top:14px;">
      <div class="guide-title">
        <svg class="guide-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3z"/><path d="M3 9h18M9 3v18"/></svg>
        <span>Sheet column mapping</span>
      </div>
      <div style="font-size:12px;color:#6D7175;line-height:1.5;margin-bottom:14px;">
        Upload one carrier export to teach the system which column is which. Once mapped, every future upload from this carrier (and any new carrier you onboard) is parsed automatically — no code changes needed.
      </div>
      <div id="cmapDrop" style="border:2px dashed #DCDCDC;border-radius:10px;padding:18px;text-align:center;background:#FAFBFB;cursor:pointer;margin-bottom:16px;transition:border-color .15s,background .15s;">
        <div style="font-size:24px;margin-bottom:6px;">📊</div>
        <div style="font-size:13px;font-weight:600;color:#1A1A1A;">Upload sample sheet (XLSX / CSV)</div>
        <div style="font-size:11px;color:#6D7175;margin-top:4px;" id="cmapDropHint">First row is read for column headers and to suggest status values.</div>
        <input type="file" id="cmapFile" accept=".xlsx,.xls,.csv" style="display:none;">
      </div>
      <div id="cmapStatusValues" style="display:none;margin-bottom:14px;padding:10px 12px;background:#F1F1F1;border-radius:8px;">
        <div style="font-size:12px;font-weight:600;margin-bottom:6px;">Distinct status values found in this sheet:</div>
        <div id="cmapStatusList" style="font-size:12px;color:#1A1A1A;line-height:1.7;"></div>
        <div style="font-size:11px;color:#6D7175;margin-top:6px;">Tip: copy the right ones into the DELIVERED / RETURNED fields below.</div>
      </div>
      ${fieldsHtml}
    </div>`;
  $('providerFields').insertAdjacentHTML('beforeend', panel);
  ensureCmapCss();
  wireCmapDropdowns();

  // Wire upload area
  const drop = $('cmapDrop');
  const file = $('cmapFile');
  drop.addEventListener('click', () => file.click());
  file.addEventListener('change', e => onSampleFile(e.target.files[0]));
  ['dragover','dragenter'].forEach(ev => drop.addEventListener(ev, e => {
    e.preventDefault(); drop.style.borderColor = '#1A1A1A'; drop.style.background = '#F0F8FF';
  }));
  ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => {
    e.preventDefault(); drop.style.borderColor = '#DCDCDC'; drop.style.background = '#FAFBFB';
    if (ev === 'drop' && e.dataTransfer.files[0]) onSampleFile(e.dataTransfer.files[0]);
  }));
}
