/* ── DATE HELPERS ── */
function toYMD(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function formatDisplayDate(ymd){if(!ymd)return"";const d=new Date(ymd+"T00:00:00");const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return d.getDate()+" "+M[d.getMonth()]+" "+d.getFullYear();}
function parseDate(val){if(!val)return new Date(NaN);const s=String(val).trim();if(/^\d{4}-\d{2}-\d{2}/.test(s))return new Date(s);const dmy=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);if(dmy)return new Date(dmy[3]+"-"+dmy[2].padStart(2,"0")+"-"+dmy[1].padStart(2,"0"));return new Date(s);}
function toMs(d){return d instanceof Date?d.getTime():parseDate(String(d)).getTime();}
const PRESETS=["Maximum","Today","Yesterday","Last 7 days","Last 14 days","Last 28 days","Last 30 days","This week","Last week","This month","Last month","This quarter","Last quarter","This year","Last year","Custom"];
function getPresetRange(preset){const t=new Date();t.setHours(0,0,0,0);const ymd=d=>toYMD(d);const sub=n=>{const d=new Date(t);d.setDate(t.getDate()-n);return d;};switch(preset){case"Maximum":return{from:"2000-01-01",to:ymd(t)};case"Today":return{from:ymd(t),to:ymd(t)};case"Yesterday":{const y=sub(1);return{from:ymd(y),to:ymd(y)};}case"Last 7 days":return{from:ymd(sub(6)),to:ymd(t)};case"Last 14 days":return{from:ymd(sub(13)),to:ymd(t)};case"Last 28 days":return{from:ymd(sub(27)),to:ymd(t)};case"Last 30 days":return{from:ymd(sub(29)),to:ymd(t)};case"This week":{const d=new Date(t);d.setDate(t.getDate()-t.getDay());return{from:ymd(d),to:ymd(t)};}case"Last week":{const e=new Date(t);e.setDate(t.getDate()-t.getDay()-1);const s=new Date(e);s.setDate(e.getDate()-6);return{from:ymd(s),to:ymd(e)};}case"This month":{const s=new Date(t.getFullYear(),t.getMonth(),1);return{from:ymd(s),to:ymd(t)};}case"Last month":{const e=new Date(t.getFullYear(),t.getMonth(),0);const s=new Date(t.getFullYear(),t.getMonth()-1,1);return{from:ymd(s),to:ymd(e)};}case"This quarter":{const q=Math.floor(t.getMonth()/3);const s=new Date(t.getFullYear(),q*3,1);return{from:ymd(s),to:ymd(t)};}case"Last quarter":{const q=Math.floor(t.getMonth()/3);const e=new Date(t.getFullYear(),q*3,0);const lq=q===0?3:q-1;const ly=q===0?t.getFullYear()-1:t.getFullYear();const s=new Date(ly,lq*3,1);return{from:ymd(s),to:ymd(e)};}case"This year":return{from:t.getFullYear()+"-01-01",to:ymd(t)};case"Last year":{const y=t.getFullYear()-1;return{from:y+"-01-01",to:y+"-12-31"};}default:return null;}}

/* ── PERIOD HELPERS ── */
function getWeekKey(d){const sun=new Date(d);sun.setDate(d.getDate()-d.getDay());const sat=new Date(sun);sat.setDate(sun.getDate()+6);const fmt=dt=>dt.getDate()+"/"+(dt.getMonth()+1)+"/"+dt.getFullYear();return fmt(sun)+" - "+fmt(sat);}
function get2WeekKey(d){const base=new Date(d.getFullYear(),0,1);const pd=Math.floor((d.getTime()-base.getTime())/86400000);const p2=Math.floor(pd/14);const s=new Date(d.getFullYear(),0,1+p2*14);const e=new Date(s);e.setDate(s.getDate()+13);const fmt=dt=>dt.getDate()+"/"+(dt.getMonth()+1)+"/"+dt.getFullYear();return fmt(s)+" - "+fmt(e);}
function getPeriodKey(s,bd){const d=parseDate(s);if(isNaN(d))return s||"Unknown";if(bd==="Day")return d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear();if(bd==="Week")return getWeekKey(d);if(bd==="2Weeks")return get2WeekKey(d);return["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()]+" "+d.getFullYear();}
function getPeriodEndDate(dateStr,bd){const d=parseDate(dateStr);if(isNaN(d))return new Date(0);if(bd==="Week"){const sat=new Date(d);sat.setDate(d.getDate()-d.getDay()+6);return sat;}if(bd==="Month")return new Date(d.getFullYear(),d.getMonth()+1,0);if(bd==="2Weeks"){const base=new Date(d.getFullYear(),0,1);const pd=Math.floor((d.getTime()-base.getTime())/86400000);const p2=Math.floor(pd/14);return new Date(d.getFullYear(),0,1+p2*14+13);}return d;}
function getPeriodLabel(t){return t==="Day"?"Day":t==="Week"?"Week":t==="2Weeks"?"2 Weeks":t==="Month"?"Month":"Period";}

/* ── DATA PROCESSING ── */

function FunnelCard({totals}){

  const steps=[{label:"Sessions",value:sessions,pct:100},{label:"Added to cart",value:atc,pct:pct(atc)},{label:"Reached checkout",value:chi,pct:pct(chi)},{label:"Completed checkout",value:purchases,pct:pct(purchases)},{label:"Purchase",value:purchases,pct:pct(purchases)}];
  const overallCVR=sessions>0?(purchases/sessions)*100:0;
  return(<div style={{background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:16,padding:"24px 28px",boxShadow:"0 1px 6px rgba(0,0,0,0.05)",marginBottom:32}}>

}
function CPCFunnelCard({totals}){

    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",borderTop:"1px solid #E5E7EB",borderBottom:"1px solid #E5E7EB",marginBottom:24}}>{steps.map((step,i)=>(<div key={i} style={{padding:"14px 16px",borderLeft:i>0?"1px solid #E5E7EB":"none",background:i===0?"#F1F1F1":"transparent"}}><div style={{fontFamily:TH.ff,fontSize:11,fontWeight:600,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{step.label}</div><div style={{fontFamily:TH.ff,fontSize:18,fontWeight:700,color:"#111827",fontVariantNumeric:"tabular-nums",lineHeight:1.2}}>{step.pct.toFixed(1)}%</div><div style={{fontFamily:TH.ff,fontSize:12,color:"#9CA3AF",marginTop:3,fontVariantNumeric:"tabular-nums"}}>{fmtInt(step.value)}</div></div>))}</div>

/* ── ADS ANALYSIS PAGE ── */
function AdsAnalysis({normRows,from,to,platformFilter,setPlatformFilter,hasFB,hasTT,adsBy,setAdsBy,adsTime,setAdsTime,productFilter,setProductFilter}){
  const[filters,setFilters]=useState([]);
  const preProductFiltered=useMemo(()=>{let rows=normRows;if(from)rows=rows.filter(r=>parseDate(String(r.date))>=parseDate(from));if(to)rows=rows.filter(r=>parseDate(String(r.date))<=parseDate(to));if(platformFilter!=="all")rows=rows.filter(r=>r.platform===platformFilter);if(filters.length)rows=rows.filter(r=>filters.every(f=>String(r[f.field]||"").toLowerCase().includes(f.value.toLowerCase())));return rows;},[normRows,from,to,platformFilter,filters]);
  const availableProducts=useMemo(()=>{const s=new Set();preProductFiltered.filter(r=>(r.impressions||0)>0).forEach(r=>{const p=extractProduct(r.campaignName);if(p)s.add(p);});return[...s].sort();},[preProductFiltered]);
  const filtered=useMemo(()=>{if(productFilter==="all")return preProductFiltered;return preProductFiltered.filter(r=>extractProduct(r.campaignName)===productFilter);},[preProductFiltered,productFilter]);
  const totals=useMemo(()=>filtered.length?calcTotals(filtered):null,[filtered]);
  const searchQuery=filters.map(f=>f.value).join(" ");
  return(<div style={{background:TH.bgPage,minHeight:"100%"}}><div style={{padding:"24px 36px 80px",fontFamily:TH.ff}}>
    <div style={TOOLBAR_CARD}>
      <div style={TOOLBAR_ROW_BORDERED}><div style={{flex:1,minWidth:0}}><FilterSearchBar normRows={normRows} filters={filters} onAddFilter={f=>setFilters(p=>[...p,f])} placeholder="Search or filter by name, ID..."/></div></div>
      <div style={TOOLBAR_ROW_RIGHT}><ProductDropdown value={productFilter} onChange={setProductFilter} products={availableProducts}/><MetaBreakdownDropdown adsBy={adsBy} setAdsBy={setAdsBy} adsTime={adsTime} setAdsTime={setAdsTime} platformFilter={platformFilter} setPlatformFilter={setPlatformFilter} hasFB={hasFB} hasTT={hasTT}/></div>
    </div>
    <FilterChips filters={filters} onRemove={id=>setFilters(p=>p.filter(f=>f.id!==id))} onClearAll={()=>setFilters([])}/>
    {filtered.length>0?<MetaPivotTable normRows={filtered} adsBy={adsBy} adsTime={adsTime} totals={totals} searchQuery={searchQuery}/>:<div style={{textAlign:"center",padding:"80px 20px",background:TH.bgCard,borderRadius:T.radius,border:"1px dashed "+TH.borderOuter,boxShadow:T.shadow}}><div style={{fontSize:36,marginBottom:12,opacity:0.35}}>📂</div><div style={{fontFamily:TH.ff,fontSize:TH.fs,fontWeight:TH.fwHeader,color:TH.colorBody,marginBottom:6}}>No data matches your selection</div></div>}
  </div></div>);
}

function InsightsPage({normRows,from,to,platformFilter,setPlatformFilter,hasFB,hasTT,productFilter,setProductFilter,availableProducts}){
  const filtered=useMemo(()=>{let rows=normRows;if(from)rows=rows.filter(r=>parseDate(String(r.date))>=parseDate(from));if(to)rows=rows.filter(r=>parseDate(String(r.date))<=parseDate(to));if(platformFilter!=="all")rows=rows.filter(r=>r.platform===platformFilter);return rows;},[normRows,from,to,platformFilter]);
  const productInsights=useMemo(()=>{
    const productMap=new Map();
    filtered.forEach(row=>{const product=extractProduct(row.campaignName);if(!product)return;if(!productMap.has(product))productMap.set(product,new Map());const adMap=productMap.get(product);const adKey=row.adName||"(Unknown Ad)";if(!adMap.has(adKey))adMap.set(adKey,[]);adMap.get(adKey).push(row);});
    const results=[];
    productMap.forEach((adMap,product)=>{
      const adStats=[];
      adMap.forEach((rows,adName)=>{const spend=rows.reduce((s,r)=>s+(r.spend||0),0),revenue=rows.reduce((s,r)=>s+(r.revenue||0),0);if(spend===0)return;const roas=revenue/spend;const dates=rows.map(r=>parseDate(String(r.date))).filter(d=>!isNaN(d.getTime()));if(!dates.length)return;const times=dates.map(d=>d.getTime()),durationDays=(Math.max(...times)-Math.min(...times))/86400000;if(durationDays<7)return;const weeks=Math.floor(durationDays/7),remDays=Math.round(durationDays%7);adStats.push({adName,roas,spend,revenue,weeks,remDays});});
      if(!adStats.length)return;
      adStats.sort((a,b)=>b.roas-a.roas);
      const top=adStats.slice(0,3),worst=adStats.slice(-3).reverse();
      results.push({product,top,worst,total:adStats.length});
    });
    return results.sort((a,b)=>a.product.localeCompare(b.product));
  },[filtered]);
  const visible=useMemo(()=>productFilter==="all"?productInsights:productInsights.filter(p=>p.product===productFilter),[productInsights,productFilter]);
  return(<div style={{background:TH.bgPage,minHeight:"100%"}}><div style={{padding:"24px 36px 80px",fontFamily:TH.ff}}>
    <div style={TOOLBAR_CARD}><div style={TOOLBAR_ROW}>
      {hasFB&&hasTT&&(<div style={{display:"flex",alignItems:"center",height:34,borderRadius:6,border:"1px solid #DADDE1",background:"#FFFFFF",overflow:"hidden",flexShrink:0}}>{["all","facebook","tiktok"].map((val,i)=>{const labels={all:"All",facebook:"Facebook",tiktok:"TikTok"},active=platformFilter===val;return(<button key={val} onClick={()=>setPlatformFilter(val)} style={{height:34,padding:"0 11px",border:"none",borderLeft:i>0?"1px solid #DADDE1":"none",background:active?"#E7F3FF":"#FFFFFF",color:active?"#1877F2":"#606770",fontSize:12.5,fontWeight:active?600:400,fontFamily:META_FF,cursor:"pointer"}}>{labels[val]}</button>);})}</div>)}
      <div style={{flex:1}}/>
      <ProductDropdown value={productFilter} onChange={setProductFilter} products={availableProducts}/>
    </div></div>
    <div style={{display:"flex",alignItems:"center",gap:20,marginBottom:24,padding:"10px 16px",background:TH.bgCard,border:"1px solid "+TH.borderOuter,borderRadius:T.radiusSm,boxShadow:T.shadow,flexWrap:"wrap"}}>
      <span style={{fontFamily:TH.ff,fontSize:12,fontWeight:700,color:TH.colorMuted,textTransform:"uppercase",letterSpacing:"0.07em"}}>Legend</span>
      <div style={{width:1,height:16,background:TH.borderLight}}/>
      <span style={{fontFamily:TH.ff,fontSize:13,color:TH.colorSub}}>Only ads active <strong>more than 1 week</strong> are included</span>
      <div style={{width:1,height:16,background:TH.borderLight}}/>
      <span style={{display:"inline-flex",alignItems:"center",gap:5,fontFamily:TH.ff,fontSize:13,color:TH.colorSub}}><span style={{width:8,height:8,borderRadius:"50%",background:"#16A34A",display:"inline-block"}}/> Highest ROAS per product</span>
      <span style={{display:"inline-flex",alignItems:"center",gap:5,fontFamily:TH.ff,fontSize:13,color:TH.colorSub}}><span style={{width:8,height:8,borderRadius:"50%",background:"#DC2626",display:"inline-block"}}/> Lowest ROAS per product</span>
      <div style={{marginLeft:"auto",fontFamily:TH.ff,fontSize:13,color:TH.colorMuted}}>{visible.length} product{visible.length!==1?"s":""}</div>
    </div>
    {visible.length===0?(<div style={{textAlign:"center",padding:"80px 20px",background:TH.bgCard,borderRadius:T.radius,border:"1px dashed "+TH.borderOuter,boxShadow:T.shadow}}><div style={{fontSize:36,marginBottom:12,opacity:0.35}}>💡</div><div style={{fontFamily:TH.ff,fontSize:TH.fs,fontWeight:TH.fwHeader,color:TH.colorBody,marginBottom:4}}>No insights yet</div><div style={{fontFamily:TH.ff,fontSize:14,color:TH.colorMuted}}>Needs campaign data with product names and ads active for at least 7 days</div></div>):visible.map(item=>(<InsProductCard key={item.product} item={item}/>))}

async function apiCall(path) {
  const r = await fetch(API_BASE + path, { headers: { "Authorization": "Bearer " + API_TOKEN } });
  const t = await r.text();
  let d; try { d = JSON.parse(t); } catch { d = { raw: t }; }

      <div style={{padding:"10px 12px",background:"#F1F1F1",borderBottom:"1px solid #DCDCDC"}}>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#6D7175",pointerEvents:"none"}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search for an ad account" style={{width:"100%",boxSizing:"border-box",height:34,padding:"0 32px 0 32px",borderRadius:8,border:"1px solid #DCDCDC",background:"#FFFFFF",fontFamily:TH.ff,fontSize:13,color:"#1A1A1A",fontWeight:500,outline:"none"}}/>

        </div>
      </div>

            <span style={{flex:1,minWidth:0,fontWeight:700,fontSize:13,color:"#1A1A1A",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</span>
            <span style={{fontSize:11,color:"#6D7175",fontWeight:500,flexShrink:0}}>{a.currency||""} · {a.account_id}</span>

        </div>

    </div>)}
  </div>);
}

const ADS_SHEET_KEY="ads.sheetRows.v1";
function loadSheetRowsFromLS(){try{const s=localStorage.getItem(ADS_SHEET_KEY);if(!s)return[];const arr=JSON.parse(s);return Array.isArray(arr)?arr:[];}catch(e){return[];}}
function saveSheetRowsToLS(rows){try{localStorage.setItem(ADS_SHEET_KEY,JSON.stringify(rows));}catch(e){}}
function Dashboard(){
  const[sheetRows,setSheetRowsState]=useState(()=>loadSheetRowsFromLS());
  const setSheetRows=useCallback(updater=>{setSheetRowsState(prev=>{const next=typeof updater==="function"?updater(prev):updater;saveSheetRowsToLS(next);return next;});},[]);
  const[apiRows,setApiRows]=useState([]);
  const normRows=useMemo(()=>sheetRows.concat(apiRows),[sheetRows,apiRows]);
  const[activePage,setActivePage]=useState("performance");
  const[breakdown,setBd]=useState("Week");
  const[platformFilter,setPlatformFilter]=useState("all");
  // Date range comes from the global AppDatePicker (localStorage). Subscribe so
  // any change broadcasts here and across pages.
  const initial=(window.AppDatePicker?window.AppDatePicker.getRange():{from:"",to:""});
  const[from,setFrom]=useState(initial.from||"");
  const[to,setTo]=useState(initial.to||"");
  useEffect(()=>{
    if(!window.AppDatePicker)return;
    const unsub=window.AppDatePicker.subscribe(s=>{setFrom(s.from||"");setTo(s.to||"");});
    return()=>unsub();
  },[]);
  const[productFilter,setProductFilter]=useState("all");
  const[fileLoading,setFileLoading]=useState(false);
  const[modalOpen,setModalOpen]=useState(false);
  const[insLoading,setInsLoading]=useState(false);
  const[insReport,setInsReport]=useState(null);
  const[insError,setInsError]=useState(null);
  const[activeFilters,setActiveFilters]=useState([]);
  const[adsBy,setAdsBy]=useState([]);
  const[adsTime,setAdsTime]=useState("");
  // Meta-source state
  const[metaConnectors,setMetaConnectors]=useState([]);
  // adAccounts is the MERGED list across every saved Meta connector. Each
  // entry is annotated with `_connId` and `_connName` so we know which token
  // to use when fetching its insights.
  const[adAccounts,setAdAccounts]=useState([]);
  const[loadingAccounts,setLoadingAccounts]=useState(false);
  const[selectedAccountIds,setSelectedAccountIds]=useState([]);
  const[loadingData,setLoadingData]=useState(false);
  const[metaError,setMetaError]=useState(null);
  const fileRef=useRef();

  // Load Meta connectors on mount + reusable refresher (called after FB OAuth)
  const refreshMetaConnectors = useCallback(async ()=>{
    try { const data = await apiCall("/connectors.php?type=ads&provider=meta"); setMetaConnectors(data.rows || []); }
    catch (e) { console.warn("Failed to load Meta connectors:", e.message); }
  }, []);
  useEffect(()=>{ refreshMetaConnectors(); }, [refreshMetaConnectors]);
  // brandTick increments on every topbar brand switch; downstream effects
  // (the ad-accounts re-fetch + filter) depend on it so they re-run even
  // when the connector list itself didn't change — keeping the visible
  // accounts in sync with the new active brand without a page reload.
  const [brandTick,setBrandTick]=useState(0);
  useEffect(()=>{
    const h=()=>{ setSelectedAccountIds([]); setBrandTick(t=>t+1); refreshMetaConnectors(); };
    window.addEventListener('app:brandChanged', h);
    return ()=>window.removeEventListener('app:brandChanged', h);
  }, [refreshMetaConnectors]);
  // When the list of Meta connectors changes, fetch every connector's accounts in
  // parallel and merge them into a single list — no need for the user to pick a
  // connection first.
  useEffect(()=>{
    if(!metaConnectors.length){setAdAccounts([]);return;}
    let cancelled=false;
    (async()=>{
      setLoadingAccounts(true);setMetaError(null);
      try{
        const results=await Promise.all(metaConnectors.map(c=>
          apiCall("/meta.php?action=accounts&connector_id="+c.id)
            .then(d=>({ok:true,connector:c,rows:d.rows||[]}))
            .catch(e=>({ok:false,connector:c,error:e.message,rows:[]}))
        ));
        if(cancelled)return;
        const merged=[];
        const seen=new Set();
        results.forEach(r=>{
          r.rows.forEach(a=>{
            // Same account may appear under multiple tokens — keep the first occurrence.
            const key=a.account_id||a.id;
            if(seen.has(key))return;
            seen.add(key);
            merged.push(Object.assign({},a,{_connId:r.connector.id,_connName:r.connector.name}));
          });
        });
        // Brand-aware filter: if a brand is active in the topbar, restrict
        // the visible ad accounts to the ones linked in that brand's
        // meta.ad_account_ids. Admin/All-brands sees everything.
        let visible=merged;
        try{
          const ab=window.getActiveBrand?window.getActiveBrand():null;
          const allowed=ab&&ab.meta&&Array.isArray(ab.meta.ad_account_ids)?ab.meta.ad_account_ids:null;
          if(allowed&&allowed.length){
            const set=new Set(allowed.map(String));
            visible=merged.filter(a=>set.has(String(a.account_id||a.id)));
          }
        }catch(e){}
        setAdAccounts(visible);
        const failures=results.filter(r=>!r.ok);
        if(failures.length)setMetaError(failures.length+" connector"+(failures.length>1?"s":"")+" failed to list accounts: "+failures.map(f=>f.connector.name+' — '+f.error).join('; '));
      }catch(e){
        if(!cancelled){setMetaError(e.message);setAdAccounts([]);}
      }finally{if(!cancelled)setLoadingAccounts(false);}
    })();
    return()=>{cancelled=true;};
  },[metaConnectors,brandTick]);

  // Insights fetcher — groups selected account ids by their owning connector
  // so each account is queried with the correct token.
  const fetchInsights=useCallback(async(accounts,accountIds,fromVal,toVal,signal)=>{
    if(!accountIds||!accountIds.length||!fromVal||!toVal)return;
    setLoadingData(true);setMetaError(null);
    try{
      const promises=accountIds.map(accId=>{
        const meta=accounts.find(a=>a.id===accId)||{};
        const connId=meta._connId;
        if(!connId)return Promise.resolve({ok:false,error:"Account has no connector mapping",accId});
        const url="/meta.php?action=insights&connector_id="+connId+"&account_id="+encodeURIComponent(accId)+"&since="+fromVal+"&until="+toVal;
        return apiCall(url).then(d=>({ok:true,rows:d.rows||[],accId})).catch(e=>({ok:false,error:e.message,accId}));
      });
      const results=await Promise.all(promises);
      if(signal&&signal.aborted)return;
      const failures=results.filter(r=>!r.ok);
      const allRaw=[];results.forEach(r=>{if(r.ok)allRaw.push(...r.rows);});
      if(!allRaw.length){
        setMetaError(failures.length?("All "+failures.length+" account fetches failed: "+failures[0].error):"No data returned for the selected accounts and date range.");
        setApiRows([]);
        return;
      }
      if(failures.length)setMetaError(failures.length+" of "+accountIds.length+" accounts failed to load — showing partial data.");
      const processed=processFileRows(allRaw);
      setApiRows(processed);
    }catch(e){if(!(signal&&signal.aborted))setMetaError(e.message);}
    finally{if(!(signal&&signal.aborted))setLoadingData(false);}
  },[]);
  function loadFromMeta(){fetchInsights(adAccounts,selectedAccountIds,from,to);}

  // Auto-fetch on selection / date change.
  useEffect(()=>{
    if(!selectedAccountIds.length||!from||!to)return;
    const ctrl={aborted:false};
    const t=setTimeout(()=>{fetchInsights(adAccounts,selectedAccountIds,from,to,ctrl);},250);
    return()=>{ctrl.aborted=true;clearTimeout(t);};
  },[selectedAccountIds,from,to,adAccounts,fetchInsights]);

  const loadedPlatforms=useMemo(()=>{const s={};normRows.forEach(r=>{s[r.platform]=true;});return Object.keys(s);},[normRows]);
  const hasFB=loadedPlatforms.includes("facebook"),hasTT=loadedPlatforms.includes("tiktok");
  const badgeLabel=hasFB&&hasTT?"Multi-Platform":hasFB?"Facebook Ads":hasTT?"TikTok Ads":"";
  const badgeColor=hasFB&&hasTT?"#A78BFA":hasFB?"#3B82F6":"#2DD4BF";

  const handleFiles=useCallback(files=>{if(!files||!files.length)return;setFileLoading(true);const fa=Array.from(files);let pending=fa.length;const allNew=[];function onDone(rows){allNew.push(...rows);pending--;if(pending===0){setSheetRows(p=>p.concat(allNew));setFileLoading(false);}}fa.forEach(file=>{const ext=file.name.split(".").pop().toLowerCase();if(ext==="csv"){Papa.parse(file,{header:true,dynamicTyping:false,skipEmptyLines:true,complete:res=>onDone(processFileRows(res.data))});}else{const r=new FileReader();r.onload=e=>{const wb=XLSX.read(e.target.result,{type:"array"});onDone(processFileRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""})));};r.readAsArrayBuffer(file);}});},[setSheetRows]);

  const preProductFiltered=useMemo(()=>{let rows=normRows;rows=rows.filter(r=>{const d=parseDate(String(r.date));if(from&&d<parseDate(from))return false;if(to&&d>parseDate(to))return false;return true;});if(platformFilter!=="all")rows=rows.filter(r=>r.platform===platformFilter);if(activeFilters.length)rows=rows.filter(r=>activeFilters.every(f=>String(r[f.field]||r.date||"").toLowerCase().includes(f.value.toLowerCase())));return rows;},[normRows,from,to,platformFilter,activeFilters]);
  const availableProducts=useMemo(()=>{const s=new Set();preProductFiltered.filter(r=>(r.impressions||0)>0).forEach(r=>{const p=extractProduct(r.campaignName);if(p)s.add(p);});return[...s].sort();},[preProductFiltered]);
  useEffect(()=>{if(productFilter!=="all"&&availableProducts.length>0&&!availableProducts.includes(productFilter)){setProductFilter("all");}},[availableProducts,productFilter]);
  const filtered=useMemo(()=>{if(productFilter==="all")return preProductFiltered;return preProductFiltered.filter(r=>extractProduct(r.campaignName)===productFilter);},[preProductFiltered,productFilter]);
  const isPlatformBd=breakdown==="Platform";
  const agg=useMemo(()=>{if(!filtered.length)return[];if(isPlatformBd)return calcPlatformRows(filtered);return aggregate(filtered,breakdown);},[filtered,breakdown,isPlatformBd]);
  const totals=useMemo(()=>filtered.length?calcTotals(filtered):null,[filtered]);
  const prevTotals=useMemo(()=>{if(!filtered.length||!normRows.length)return null;const pf=platformFilter==="all"?normRows:normRows.filter(r=>r.platform===platformFilter);return calcPrevTotals(pf,filtered);},[normRows,filtered,platformFilter]);

  async function getInsights(){if(!agg.length||!totals)return;setModalOpen(true);setInsReport(null);setInsError(null);setInsLoading(true);try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,messages:[{role:"user",content:buildPrompt(agg,totals,breakdown,from,to,platformFilter)}]})});const data=await res.json();const raw=(data.content||[]).map(b=>b.text||"").join("");const match=raw.match(/\{[\s\S]*\}/);if(!match)throw new Error("No JSON");setInsReport(JSON.parse(match[0]));}catch(e){setInsError(e.message);}finally{setInsLoading(false);}}

  const dateRange=from&&to?from+" to "+to:from?"from "+from:to?"until "+to:"";
  // Daily-aggregated time series, oldest → newest, used for the per-card sparkline
  const kpiSparkData=useMemo(()=>filtered.length?aggregate(filtered,"Day").slice().reverse():[],[filtered]);
  const kpis=totals?[
    {label:"Spend",   val:fmtCur(totals.spend),                                    delta:getSpendDelta(totals,prevTotals),                  dataKey:"spend"},
    {label:"ROAS",    val:fmtRoas(totals.roas),                                    delta:getDelta(totals,prevTotals,"roas",true),           dataKey:"roas"},
    {label:"AOV",     val:fmtAOV(totals.aov),                                      delta:getDelta(totals,prevTotals,"aov",true),            dataKey:"aov"},
    {label:"CPS",     val:fmtCPS(totals.cps),                                      delta:getDelta(totals,prevTotals,"cps",false),           dataKey:"cps"},
    {label:"CVR %",   val:fmtPct(totals.cvr),                                      delta:getDelta(totals,prevTotals,"cvr",true),            dataKey:"cvr"},
    {label:"CPC",     val:fmtCost(totals.cpc),                                     delta:getDelta(totals,prevTotals,"cpc",false),           dataKey:"cpc"},
    {label:"Orders",  val:Math.round(totals.purchases).toLocaleString("en-US"),    delta:getDelta(totals,prevTotals,"purchases",true),      dataKey:"purchases"},
    {label:"Revenue", val:fmtCur(totals.revenue),                                  delta:getDelta(totals,prevTotals,"revenue",true),        dataKey:"revenue"}
  ]:[];

  const btnGhost={height:34,display:"flex",alignItems:"center",background:"#FFFFFF",border:"1px solid #DADDE1",borderRadius:6,padding:"0 12px",color:"#606770",fontFamily:TH.ff,fontSize:14,cursor:"pointer",fontWeight:400,whiteSpace:"nowrap",transition:"all 0.12s"};
  const btnDanger={height:34,display:"flex",alignItems:"center",background:"#FFF5F5",border:"1px solid #FECACA",borderRadius:6,padding:"0 12px",color:"#C53030",fontFamily:TH.ff,fontSize:14,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"};
  const btnAI={height:34,display:"flex",alignItems:"center",gap:7,background:"linear-gradient(135deg,#4F46E5,#7C3AED)",border:"none",borderRadius:6,padding:"0 14px",color:"#fff",fontFamily:TH.ff,fontSize:14,cursor:"pointer",fontWeight:700,boxShadow:"0 2px 12px rgba(79,70,229,0.28)",whiteSpace:"nowrap"};
  const btnDark={background:T.accent,border:"none",borderRadius:9,padding:"9px 20px",color:"#fff",fontFamily:TH.ff,fontSize:TH.fs,cursor:"pointer",fontWeight:600};

  const sourcePicker=(<MetaSourcePicker connectors={metaConnectors} accounts={adAccounts} loadingAccounts={loadingAccounts} selectedAccountIds={selectedAccountIds} onPickAccounts={setSelectedAccountIds} onLoad={loadFromMeta} loadingData={loadingData} from={from} to={to} error={metaError}/>);

  const emptyState=(<div>
    {sourcePicker}
    <div style={{border:"2px dashed "+T.border,borderRadius:18,padding:"60px 24px",textAlign:"center",cursor:"pointer",background:TH.bgCard,boxShadow:T.shadow}} onClick={()=>fileRef.current?.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleFiles(e.dataTransfer.files);}}>
      <div style={{fontSize:42,marginBottom:20,opacity:0.5}}>📊</div>
      <div style={{fontFamily:TH.ff,fontSize:19,color:TH.colorBody,fontWeight:700,marginBottom:8,letterSpacing:"-0.02em"}}>Or import a CSV / XLSX export</div>
      <div style={{fontFamily:TH.ff,fontSize:TH.fs,color:TH.colorSub,marginBottom:4}}>Facebook Ads Manager & TikTok Ads — upload one or both</div>
      <div style={{fontFamily:TH.ff,fontSize:14,color:TH.colorMuted,marginBottom:24}}>Platform is detected automatically from column headers</div>
      <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap",marginBottom:20}}>
        <button style={btnDark} onClick={e=>{e.stopPropagation();fileRef.current?.click();}}>Upload Files</button>
        <button style={{...btnDark,background:"transparent",border:"1px solid "+T.border,color:TH.colorBody}} onClick={e=>{e.stopPropagation();setSheetRows(processFileRows(genSample()));}}>Load Sample Data</button>
      </div>
    </div>
  </div>);

  return(
    <div style={{minHeight:"100vh",background:TH.bgPage,color:TH.colorBody,fontFamily:TH.ff,WebkitFontSmoothing:"antialiased"}}>
      <style>{SHARED_CSS}</style>
      <PageTabs
        active={activePage}
        onChange={setActivePage}
        from={from} to={to} setFrom={setFrom} setTo={setTo}
        hasData={normRows.length>0}
        onAddFile={()=>fileRef.current?.click()}
        onReset={()=>{setSheetRows([]);setApiRows([]);setSelectedAccountIds([]);try{localStorage.removeItem(ADS_SHEET_KEY);}catch(e){}setPlatformFilter("all");if(window.AppDatePicker)window.AppDatePicker.setRange("today");setBd("Week");setActiveFilters([]);setAdsBy([]);setAdsTime("");setProductFilter("all");}}
      />

      {activePage==="performance"&&(
        <div style={{padding:"20px 36px 80px"}}>
          {normRows.length===0?emptyState:(<>
            {sourcePicker}
            <PerfToolbar normRows={normRows} filters={activeFilters} onAddFilter={f=>setActiveFilters(p=>[...p,f])} breakdown={breakdown} onBreakdownChange={v=>setBd(v||"Week")} hasFB={hasFB} hasTT={hasTT} platformFilter={platformFilter} setPlatformFilter={setPlatformFilter} productFilter={productFilter} setProductFilter={setProductFilter} availableProducts={availableProducts}/>
            <FilterChips filters={activeFilters} onRemove={id=>setActiveFilters(p=>p.filter(f=>f.id!==id))} onClearAll={()=>setActiveFilters([])}/>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:12,marginBottom:44,marginTop:activeFilters.length?4:16}}>
              {kpis.map((k,i)=><KPICard key={i} label={k.label} val={k.val} delta={k.delta} dataKey={k.dataKey} chartData={kpiSparkData}/>)}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:28}}><div style={{flex:1,height:1,background:T.borderLight}}/><span style={{fontFamily:TH.ff,fontSize:11,fontWeight:TH.fwStrong,color:TH.colorMuted,textTransform:"uppercase",letterSpacing:"0.09em",whiteSpace:"nowrap"}}>Performance Tables</span><div style={{flex:1,height:1,background:T.borderLight}}/></div>
            {agg.length>0&&<p style={{fontFamily:TH.ff,fontSize:13,color:TH.colorMuted,margin:"-18px 0 18px 2px"}}>{agg.length} {isPlatformBd?"platform":breakdown.toLowerCase()+" period"}{agg.length!==1&&!isPlatformBd?"s":""}{dateRange&&<span style={{color:TH.colorSub}}> · {dateRange}</span>}{productFilter!=="all"&&<span style={{color:T.meta}}> · {productFilter}</span>}{activeFilters.length>0&&<span style={{color:T.meta}}> · {activeFilters.length} filter{activeFilters.length>1?"s":""} applied</span>}{prevTotals&&!isPlatformBd&&<span> · vs preceding period</span>}</p>}
            {agg.length>0?(<><GroupedTable title="Overall Performance" rows={agg} groups={TABLE1} totals={totals}/><GroupedTable title="Conversion Funnel Analysis" rows={agg} groups={TABLE2} totals={totals}/><GroupedTable title="Traffic, Creative & Delivery" rows={agg} groups={TABLE3} totals={totals}/></>):(<div style={{textAlign:"center",padding:"60px 20px",background:TH.bgCard,borderRadius:T.radius,border:"1px dashed "+TH.borderOuter}}><div style={{fontSize:32,marginBottom:16}}>🔍</div><div style={{fontFamily:TH.ff,fontSize:TH.fs,fontWeight:TH.fwHeader,color:TH.colorBody,marginBottom:6}}>No results match your filters</div><button onClick={()=>{setActiveFilters([]);setProductFilter("all");}} style={{...btnGhost,borderRadius:T.radiusSm,padding:"9px 22px"}}>Clear all filters</button></div>)}
          </>)}
        </div>
      )}

      {activePage==="ads"&&(normRows.length===0?<div style={{padding:"40px 36px"}}>{emptyState}</div>:<AdsAnalysis normRows={normRows} from={from} to={to} platformFilter={platformFilter} setPlatformFilter={setPlatformFilter} hasFB={hasFB} hasTT={hasTT} adsBy={adsBy} setAdsBy={setAdsBy} adsTime={adsTime} setAdsTime={setAdsTime} productFilter={productFilter} setProductFilter={setProductFilter}/>)}
      {activePage==="analytics"&&(normRows.length===0?<div style={{padding:"40px 36px"}}>{emptyState}</div>:<AnalyticsPage normRows={normRows} filtered={filtered} productFilter={productFilter} setProductFilter={setProductFilter} availableProducts={availableProducts}/>)}

      <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" multiple style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
      {fileLoading&&(<div style={{position:"fixed",inset:0,background:"rgba(249,250,251,0.88)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}><div style={{background:TH.bgCard,border:"1px solid "+TH.borderOuter,borderRadius:13,padding:"20px 36px",fontFamily:TH.ff,fontSize:TH.fs,fontWeight:TH.fwHeader,color:TH.colorBody,boxShadow:T.shadow}}>Processing files…</div></div>)}
    </div>
  );
}



createRoot(document.getElementById("root")).render(<Dashboard/>);
</script>
</body>
</html>
