<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Book Reviews</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100vh;background:#F1F1F1;font-family:'Inter','Almarai',system-ui,sans-serif;color:#1A1A1A;font-size:14px;}
  .app-shell{display:flex;min-height:100vh;}
  .app-sidebar{width:240px;min-width:240px;background:#EBEBEB;border-right:1px solid #DCDCDC;display:flex;flex-direction:column;height:calc(100vh - 48px);position:sticky;top:48px;font-family:'Inter',system-ui,sans-serif;}
  .app-sidebar-items{padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
  .app-sidebar-item{padding:7px 12px;border-radius:8px;font-size:13px;color:#303030;display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;font-weight:800;background:transparent;}
  .app-sidebar-item:hover{background:#E2E2E2;}
  .app-sidebar-item.active{background:#FFFFFF;font-weight:600;box-shadow:0 0 0 0.5px rgba(0,0,0,0.1),0 1px 1px rgba(0,0,0,0.05);}
  .app-sidebar-footer{padding:10px 8px;border-top:1px solid #DCDCDC;}
  .app-sidebar-divider{height:1px;background:#DCDCDC;margin:8px 4px;}
  .app-sidebar-group-header{padding:7px 12px;border-radius:8px;font-size:12px;color:#6D7175;font-weight:800;display:flex;align-items:center;gap:10px;user-select:none;background:transparent;text-transform:uppercase;letter-spacing:0.4px;}
  .app-sidebar-group-items{display:flex;flex-direction:column;gap:2px;padding:2px 0;}
  .app-main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .page{padding:24px 32px;max-width:none;width:100%;}
  .page-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.4fr);gap:24px;align-items:start;}
  .page-col-left{position:sticky;top:72px;}
  @media (max-width: 1100px){
    .page-grid{grid-template-columns:1fr;}
    .page-col-left{position:static;}
  }
  .page h1{font-size:22px;font-weight:700;letter-spacing:-0.3px;}
  .panel{background:#FFFFFF;border:1px solid #E1E3E5;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 0 rgba(0,0,0,0.05);}
  .panel-title{font-size:14px;font-weight:600;color:#1A1A1A;margin-bottom:4px;}
  .panel-desc{font-size:12px;color:#6D7175;margin-bottom:14px;line-height:1.6;}
  .free-badge{display:inline-block;background:#F0FDF4;color:#0E8345;border:1px solid #BBF7D0;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;margin-left:6px;}
  .field{margin-bottom:14px;}
  .field-label{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#1A1A1A;font-weight:500;margin-bottom:6px;}
  .field-input,.field-textarea{width:100%;padding:10px 12px;border:1px solid #DCDCDC;border-radius:8px;font-size:13px;font-family:inherit;color:#1A1A1A;background:#F1F1F1;line-height:1.55;}
  .field-input:focus,.field-textarea:focus{outline:none;border-color:#1A1A1A;box-shadow:0 0 0 1px #1A1A1A;background:#FFFFFF;}
  .field-textarea{min-height:160px;resize:vertical;direction:ltr;text-align:left;font-family:'Inter','Almarai',system-ui,sans-serif;font-size:12px;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:0 18px;height:38px;border-radius:8px;border:1px solid #1A1A1A;background:#1A1A1A;color:#FFFFFF;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .btn:hover:not(:disabled){background:#303030;}
  .btn:disabled{opacity:0.55;cursor:not-allowed;}
  .btn-ghost{background:#FFFFFF;color:#1A1A1A;border-color:#DCDCDC;}
  .btn-ghost:hover:not(:disabled){background:#F5F5F5;}
  .out-card{background:#FFFFFF;border:1px solid #E1E3E5;border-radius:12px;padding:20px;box-shadow:0 1px 0 rgba(0,0,0,0.05);min-height:220px;}
  .out-empty{text-align:center;padding:48px 20px;color:#8A8A8A;font-size:13px;}
  .out-empty .ic{width:56px;height:56px;border-radius:14px;background:#F1F1F1;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;color:#6D7175;}
  .progress-line{font-size:12px;color:#6D7175;margin-bottom:12px;}
  .err{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;border-radius:8px;padding:10px 12px;font-size:13px;margin-top:10px;line-height:1.55;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#FFFFFF;padding:10px 18px;border-radius:8px;font-size:13px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}
  .toast.error{background:#D72C0D;}
  /* Book card */
  .book-card{border:1px solid #E1E3E5;border-radius:12px;padding:18px;background:#FAFAFA;margin-bottom:20px;}
  .book-head{display:flex;gap:16px;align-items:flex-start;margin-bottom:14px;}
  .book-cover{width:96px;height:128px;flex-shrink:0;border:1px solid #E1E3E5;border-radius:8px;background:#FFFFFF;object-fit:cover;}
  .book-info{flex:1;min-width:0;}
  .book-title{font-size:18px;font-weight:700;color:#1A1A1A;line-height:1.35;margin-bottom:4px;}
  .book-author{font-size:13px;color:#1A1A1A;margin-bottom:8px;font-weight:600;}
  .book-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:#6D7175;}
  .book-meta strong{color:#1A1A1A;font-weight:700;}
  .book-summary{font-size:13px;line-height:1.8;color:#303030;white-space:pre-wrap;direction:rtl;text-align:right;font-family:'Almarai','Inter',system-ui,sans-serif;background:#FFFFFF;border:1px solid #E1E3E5;border-radius:8px;padding:14px 16px;}
  .section-title{font-size:13px;font-weight:700;color:#1A1A1A;margin:18px 0 8px;text-transform:uppercase;letter-spacing:0.4px;}
  .review-card{border:1px solid #E1E3E5;border-radius:8px;background:#FFFFFF;padding:12px 14px;margin-bottom:8px;}
  .review-card.no-text{background:#F8F8F8;}
  .rv-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:wrap;}
  .rv-author{font-size:12px;color:#1A1A1A;font-weight:700;}
  .rv-meta{font-size:11px;color:#6D7175;}
  .rv-stars{color:#F5A623;font-size:12px;letter-spacing:1px;}
  .rv-body{font-size:13px;color:#303030;line-height:1.7;white-space:pre-wrap;direction:rtl;text-align:right;font-family:'Almarai','Inter',system-ui,sans-serif;}
  .rv-empty{font-size:11px;color:#9AA0A6;font-style:italic;}
  .filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;color:#6D7175;}
  .filter-bar label{display:inline-flex;align-items:center;gap:5px;cursor:pointer;}
  .filter-bar input{margin:0;cursor:pointer;}
</style>
<script src="topbar.js?v=1779200000"></script>
<script src="sidebar-tools.js?v=1779100000"></script>
</head>
<body>
<div class="app-shell">
  <aside class="app-sidebar" data-render-sidebar></aside>
  <div class="app-main">
    <div class="page">
      <h1 style="margin-bottom:18px;">Book Reviews <span class="free-badge">Free — no Apify</span></h1>
      <div class="page-grid">
       <div class="page-col-left">
        <div class="panel">
          <div class="panel-title">Book URLs</div>
          <div class="panel-desc">
            Currently supports <strong>abjjad.com</strong> book pages. Paste one URL per line. The tool fetches the book metadata + summary + every available review by walking the site's pagination — no Apify, no per-call cost.
          </div>
          <div class="field">
            <textarea class="field-textarea" id="urlsInput" placeholder="https://www.abjjad.com/book/2770272266/أبي-الذي-اكره/2771320842
https://www.abjjad.com/book/123456/another-book/789"></textarea>
          </div>
          <div style="display:flex;justify-content:flex-end;align-items:center;gap:12px;flex-wrap:wrap;">
            <button class="btn" id="extractBtn" type="button">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
              <span id="extractLabel">Extract</span>
            </button>
          </div>
          <div class="err" id="errBox" style="display:none;"></div>
        </div>
       </div>
       <div class="page-col-right">
        <div class="out-card" id="outCard">
          <div class="out-empty" id="outEmpty">
            <div class="ic">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </div>
            <div>Paste a book URL on the left and click Extract.</div>
          </div>
          <div id="progressLine" class="progress-line" style="display:none;"></div>
          <div id="results"></div>
          <div id="resultsToolbar" style="display:none;margin-top:14px;">
            <button class="btn btn-ghost" id="copyAllBtn" type="button">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              <span>Copy all as text</span>
            </button>
            <button class="btn btn-ghost" id="copyReviewsOnlyBtn" type="button" style="margin-left:8px;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span>Copy text reviews only</span>
            </button>
            <button class="btn btn-ghost" id="downloadJsonBtn" type="button" style="margin-left:8px;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              <span>Download JSON</span>
            </button>
          </div>
        </div>
       </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);

const API_BASE  = 'https://indigo-dog-836598.hostingersite.com/github/api';
const API_TOKEN = 'tk_4d2b9f7a8c6e1530a4f2d9b7e8c6a1f5';
const SCRAPE_API = API_BASE + '/scrape-abjjad.php';

function detectSite(url) {
  try { return /(^|\.)abjjad\./i.test(new URL(url).hostname) ? 'abjjad' : 'other'; }
  catch (e) { return 'other'; }
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function starString(rating) {
  const n = Math.round(Number(rating || 0));
  if (n <= 0) return '';
  return '★'.repeat(Math.min(5, n)) + '☆'.repeat(Math.max(0, 5 - n));
}
function showToast(msg, isError) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast' + (isError ? ' error' : ''), 2400);
}
function showError(msg) {
  const e = $('errBox');
  if (msg) { e.textContent = msg; e.style.display = 'block'; }
  else { e.style.display = 'none'; e.textContent = ''; }
}

function renderBook(d) {
  const reviews = d.reviews || [];
  const withText = reviews.filter(r => r.body && r.body.trim());
  const meta = [];
  if (d.rating)       meta.push('<span><strong>Rating:</strong> ' + escapeHtml(d.rating) + ' ★</span>');
  if (d.ratingCount)  meta.push('<span><strong>Total ratings:</strong> ' + escapeHtml(d.ratingCount) + '</span>');
  if (d.reviewCount)  meta.push('<span><strong>Total reviews:</strong> ' + escapeHtml(d.reviewCount) + '</span>');
  if (d.pages)        meta.push('<span><strong>Pages:</strong> ' + escapeHtml(d.pages) + '</span>');
  if (d.isbn)         meta.push('<span><strong>ISBN:</strong> ' + escapeHtml(d.isbn) + '</span>');
  if (d.publisher)    meta.push('<span><strong>Publisher:</strong> ' + escapeHtml(d.publisher) + '</span>');
  if (d.datePublished) meta.push('<span><strong>Published:</strong> ' + escapeHtml(d.datePublished) + '</span>');
  const genreLine = (d.genre || []).length
    ? '<div style="font-size:11px;color:#6D7175;margin-top:6px;">' + (d.genre || []).map(escapeHtml).join(' › ') + '</div>'
    : '';
  const coverHtml = d.image
    ? '<img class="book-cover" src="' + escapeHtml(d.image) + '" alt="cover">'
    : '<div class="book-cover" style="display:flex;align-items:center;justify-content:center;color:#9AA0A6;font-size:11px;">no cover</div>';

  const reviewsHtml = reviews.map(r => {
    const hasText = r.body && r.body.trim();
    return '<div class="review-card' + (hasText ? '' : ' no-text') + '">'
      + '<div class="rv-head">'
        + '<span class="rv-author">' + escapeHtml(r.author || 'Anonymous') + '</span>'
        + '<span class="rv-stars" title="' + escapeHtml(String(r.rating || '')) + '">' + starString(r.rating) + '</span>'
      + '</div>'
      + (r.date ? '<div class="rv-meta">' + escapeHtml(r.date.replace('T', ' ').slice(0, 16)) + '</div>' : '')
      + (hasText
          ? '<div class="rv-body">' + escapeHtml(r.body) + '</div>'
          : '<div class="rv-empty">(rating only — no written review)</div>')
    + '</div>';
  }).join('');

  return ''
    + '<div class="book-card">'
    +   '<div class="book-head">'
    +     coverHtml
    +     '<div class="book-info">'
    +       '<a href="' + escapeHtml(d.url) + '" target="_blank" rel="noopener" style="font-size:11px;color:#6D7175;text-decoration:none;display:block;margin-bottom:6px;">' + escapeHtml(d.url) + '</a>'
    +       '<div class="book-title">' + escapeHtml(d.title || '(untitled)') + '</div>'
    +       (d.author ? '<div class="book-author">' + escapeHtml(d.author) + '</div>' : '')
    +       '<div class="book-meta">' + meta.join('') + '</div>'
    +       genreLine
    +     '</div>'
    +   '</div>'
    +   (d.summary
        ? '<div class="section-title">نبذة عن الكتاب</div><div class="book-summary">' + escapeHtml(d.summary) + '</div>'
        : '')
    +   '<div class="section-title">Reviews — ' + reviews.length + ' total, ' + withText.length + ' with text</div>'
    +   (reviews.length ? reviewsHtml : '<div style="font-size:12px;color:#6D7175;">No reviews returned.</div>')
    + '</div>';
}

function asPlainText(books) {
  return books.map(d => {
    const lines = [];
    lines.push(d.title || '(untitled)');
    if (d.author) lines.push('Author: ' + d.author);
    lines.push(d.url);
    if (d.rating)       lines.push('Rating: ' + d.rating + ' / 5');
    if (d.ratingCount)  lines.push('Total ratings: ' + d.ratingCount);
    if (d.pages)        lines.push('Pages: ' + d.pages);
    if (d.isbn)         lines.push('ISBN: ' + d.isbn);
    if (d.publisher)    lines.push('Publisher: ' + d.publisher);
    if ((d.genre || []).length) lines.push('Genre: ' + d.genre.join(' › '));
    lines.push('');
    if (d.summary) {
      lines.push('نبذة عن الكتاب');
      lines.push('───────────────');
      lines.push(d.summary);
      lines.push('');
    }
    lines.push('Reviews (' + (d.reviews || []).length + ')');
    lines.push('───────────────');
    (d.reviews || []).forEach(r => {
      const head = '— ' + (r.author || 'Anonymous')
                 + (r.rating ? ' • ' + r.rating + '★' : '')
                 + (r.date ? ' • ' + r.date.slice(0, 10) : '');
      lines.push(head);
      if (r.body && r.body.trim()) lines.push(r.body);
      else lines.push('(rating only)');
      lines.push('');
    });
    return lines.join('\n');
  }).join('\n\n' + '='.repeat(60) + '\n\n');
}

function asReviewsOnlyText(books) {
  return books.map(d => {
    const lines = [];
    lines.push('### ' + (d.title || '(untitled)') + (d.author ? ' — ' + d.author : ''));
    lines.push('');
    (d.reviews || []).filter(r => r.body && r.body.trim()).forEach(r => {
      lines.push('[' + (r.rating || '?') + '★] ' + (r.author || 'Anonymous') + (r.date ? ' • ' + r.date.slice(0, 10) : ''));
      lines.push(r.body.trim());
      lines.push('');
    });
    return lines.join('\n');
  }).join('\n' + '─'.repeat(60) + '\n\n');
}

let __busy = false;
let __lastBooks = [];

async function onExtract() {
  if (__busy) return;
  showError('');
  const text = $('urlsInput').value.trim();
  if (!text) { showError('Paste at least one book URL.'); return; }
  const urls = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  if (!urls.length) { showError('Paste at least one book URL.'); return; }

  // Validate sites
  const nonAbjjad = urls.filter(u => detectSite(u) !== 'abjjad');
  if (nonAbjjad.length) {
    showError('This tool currently supports abjjad.com only. The following URLs are unsupported:\n' + nonAbjjad.join('\n'));
    return;
  }

  const btn = $('extractBtn'), label = $('extractLabel');
  __busy = true; btn.disabled = true;
  label.innerHTML = '<span class="spinner"></span> Working…';
  $('progressLine').style.display = 'block';
  $('outEmpty').style.display = 'none';
  $('results').innerHTML = '';
  $('resultsToolbar').style.display = 'none';

  const books = [];
  for (let i = 0; i < urls.length; i++) {
    const url = urls[i];
    label.innerHTML = '<span class="spinner"></span> Book (' + (i + 1) + '/' + urls.length + ')…';
    $('progressLine').textContent = 'URL ' + (i + 1) + '/' + urls.length + ': fetching book page + walking review pagination…';
    try {
      const r = await fetch(SCRAPE_API + '?url=' + encodeURIComponent(url) + '&_t=' + Date.now(), {
        headers: { 'Authorization': 'Bearer ' + API_TOKEN }
      });
      const data = await r.json();
      if (!r.ok || !data.ok) throw new Error((data && data.error) || ('HTTP ' + r.status));
      books.push(data);
      $('results').insertAdjacentHTML('beforeend', renderBook(data));
      $('progressLine').textContent = 'URL ' + (i + 1) + '/' + urls.length + ': ' + (data.reviews || []).length + ' reviews captured.';
    } catch (e) {
      books.push({ url, title: '(failed)', error: e.message, reviews: [] });
      $('results').insertAdjacentHTML('beforeend',
        '<div class="book-card" style="background:#FEF2F2;border-color:#FECACA;">' +
          '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener" style="font-size:11px;color:#991B1B;">' + escapeHtml(url) + '</a>' +
          '<div class="book-title" style="color:#991B1B;">Failed: ' + escapeHtml(e.message) + '</div>' +
        '</div>');
    }
  }

  __lastBooks = books;
  const okCount = books.filter(b => b.ok).length;
  $('progressLine').textContent = 'Done — ' + okCount + ' of ' + books.length + ' extracted.';
  if (okCount) $('resultsToolbar').style.display = 'block';

  __busy = false; btn.disabled = false;
  label.textContent = 'Extract';
}

$('extractBtn').addEventListener('click', onExtract);
$('copyAllBtn').addEventListener('click', async () => {
  if (!__lastBooks.length) return;
  const txt = asPlainText(__lastBooks);
  try { await navigator.clipboard.writeText(txt); showToast('Copied ' + txt.length + ' characters'); }
  catch (e) { showToast('Copy failed: ' + e.message, true); }
});
$('copyReviewsOnlyBtn').addEventListener('click', async () => {
  if (!__lastBooks.length) return;
  const txt = asReviewsOnlyText(__lastBooks);
  try { await navigator.clipboard.writeText(txt); showToast('Copied text-reviews only: ' + txt.length + ' chars'); }
  catch (e) { showToast('Copy failed: ' + e.message, true); }
});
$('downloadJsonBtn').addEventListener('click', () => {
  if (!__lastBooks.length) return;
  const blob = new Blob([JSON.stringify(__lastBooks, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'book-reviews-' + Date.now() + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
});
</script>
</body>
</html>
