// ── Profit per brand ─────────────────────────────────────────────────
async function computeProfitForBrand(brand, from, to){
  const out = { brand, missList: [] };
  // ── Order source: uploaded sheets with smart per-brand fallback ───
  // Uploads OVERRIDE /orders.php for the brands they cover. But if the
  // uploaded rows for this brand all fall outside the requested date
  // range (e.g. user uploaded a May sheet then asked for April), we
  // SILENTLY fall back to /api/orders.php for this brand so the saved
  // DB data from Shipping Analytics still surfaces. This matches the
  // user's mental model: "if uploads can't answer for this period, try
  // the database."
  const uploadedRowsAll = (typeof rowsForBrandFromUploads === 'function')
    ? rowsForBrandFromUploads(brand.id)
    : [];
  let filteredUploads = uploadedRowsAll;
  if (uploadedRowsAll.length && (from || to)) {
    filteredUploads = uploadedRowsAll.filter(r => {
      if (!r.date) return true;
      const d = String(r.date).slice(0, 10);
      if (from && d < from) return false;
      if (to   && d > to)   return false;
      return true;
    });
  }
  const useUploads = filteredUploads.length > 0;
  out.usingUploadedData = useUploads;
  out.uploadedRowCount = filteredUploads.length;
  out.uploadedRowsTotal = uploadedRowsAll.length;
  out.fellBackToDb = uploadedRowsAll.length > 0 && filteredUploads.length === 0;
  console.log('[profit][' + brand.name + '] order source:',
              useUploads ? 'UPLOADS' :
                (out.fellBackToDb
                  ? 'DB (fallback — uploads had ' + uploadedRowsAll.length + ' rows but 0 in range)'
                  : 'DB'),
              '· upload_rows_for_brand=' + uploadedRowsAll.length,
              '· after_date_filter=' + filteredUploads.length);

  // 1. Fetch in parallel — skip /orders.php only when uploads cover this brand+range
  // When using DB: include `legacy=1` so rows that were uploaded BEFORE
  // brand attribution was strict (and got brand_id=NULL) still surface
  // for the active brand. Mirrors what Shipping Analytics shows by default.
  const ordersUrl = '/orders.php?limit=20000&brand_id=' + brand.id
    + '&legacy=1'
    + (from ? '&from=' + from : '')
    + (to   ? '&to='   + to   : '');
  const [ordersR, fmRes, productsR] = await Promise.all([
    useUploads
      ? Promise.resolve({ rows: filteredUploads })
      : api(ordersUrl).catch(e => { out.missList.push('orders fetch failed: ' + e.message); return { rows: [] }; }),
    loadCostsFromFM(brand),
    api('/products.php?brand_id=' + brand.id).catch(() => ({ rows: [] })),
  ]);
  let orders = (ordersR && ordersR.rows) || [];
  // Diagnostic for DB path: show row count + status breakdown so the
  // user can see whether DB has data at all, and if so why it might
  // have been skipped (e.g. all rows have status="In transit" which
  // isn't DELIVERED/RETURNED).
  if (!useUploads) {
    const statusCounts = {};
    orders.forEach(r => { const s = String(r.status || '(blank)').trim(); statusCounts[s] = (statusCounts[s] || 0) + 1; });
    console.log('[profit][' + brand.name + '] DB fetch:', ordersUrl,
                '→', orders.length, 'rows · status breakdown:', statusCounts);
  }
  // ── STRICT per-brand SKU-prefix gate ────────────────────────────────
  // Hard rule: every row in this brand's profit table MUST carry a
  // (prefix-mkt) marker matching one of brand.meta.sku_prefixes.
  // Anything else is dropped — including rows with no prefix at all.
  // Guarantees zero leakage between brands. Confirmation rows (no
  // marker) are dropped here; they aren't part of the profit calc
  // anyway (only DELIVERED + RETURNED count).
  const brandPrefixes = (brand.meta && Array.isArray(brand.meta.sku_prefixes))
    ? new Set(brand.meta.sku_prefixes.map(p => String(p).toLowerCase().trim()).filter(Boolean))
    : new Set();
  if (brandPrefixes.size > 0) {
    const sizeBefore = orders.length;
    let droppedNoPrefix = 0, droppedOtherBrand = 0;
    const droppedSamples = [];
    orders = orders.filter(r => {
      const m = String(r.product || '').match(/\(\s*([a-z0-9]{1,4})-([a-z0-9]{1,4})\s*\)/i);
      // Strict brand gate — same as the Shipping Analytics filter and
      // identical to how sheet uploads are filtered. A row only counts
      // toward this brand if its product carries an (prefix-mkt) marker
      // matching one of brand.meta.sku_prefixes. Marker-less rows are
      // skipped here; they only surface under "All brands".
      if (!m) { droppedNoPrefix++; return false; }
      const pref = m[1].toLowerCase();
      if (!brandPrefixes.has(pref)) {
        droppedOtherBrand++;
        if (droppedSamples.length < 3) droppedSamples.push('(' + pref + '-..) ' + r.product);
        return false;
      }
      return true;
    });
    console.log('[profit][' + brand.name + '] prefix gate (STRICT):',
                sizeBefore + ' → ' + orders.length + ' rows',
                '· brand prefixes=[' + Array.from(brandPrefixes).join(',') + ']',
                '· dropped: no-prefix=' + droppedNoPrefix + ' · other-brand=' + droppedOtherBrand);
    if (droppedSamples.length) {
      console.log('[profit][' + brand.name + '] sample dropped (other-brand prefix):', droppedSamples);
    }
  } else {
    console.warn('[profit][' + brand.name + '] no sku_prefixes configured — skipping prefix gate. Rows from other brands may leak. Set prefixes in Settings → Brand → Configure.');
  }
  // No client-side date filter needed anymore — uploads were pre-filtered
  // above, and /orders.php applies from/to server-side.
  let beforeFilter = orders.length, afterFilter = beforeFilter;
  if (false && useUploads && (from || to)) {
    orders = orders.filter(r => {
      if (!r.date) return true;
      const d = String(r.date).slice(0, 10);
      if (from && d < from) return false;
      if (to   && d > to)   return false;
      return true;
    });
    afterFilter = orders.length;
    console.log('[profit][' + brand.name + '] upload date-filter:',
                'range=' + (from||'(none)') + '..' + (to||'(none)'),
                '· before=' + beforeFilter, '· after=' + afterFilter,
                '· dropped=' + (beforeFilter - afterFilter));
  }
  const fmCosts = fmRes.map;
  if (fmRes.reason) out.fmWarn = fmRes.reason;
  const dbProducts = (productsR && productsR.rows) || [];
  // 2. Aggregate
  const productAgg = aggregateByProduct(orders);
  // Auto-detected exchange + refund counts (excluded from product agg).
  // User can override via inputs in the brand summary card; overrides
  // persist in localStorage per brand. Defaults to auto-detected.
  const lsKey = 'app.profit.notes.' + brand.id;
  let userOverrides = {};
  try { userOverrides = JSON.parse(localStorage.getItem(lsKey) || '{}'); } catch(e) {}
  out.userOverrides = userOverrides;
  out.exchangeCount = (userOverrides.exchanges != null) ? parseInt(userOverrides.exchanges, 10) : (productAgg.__exchangeCount || 0);
  out.refundCount   = (userOverrides.refunds   != null) ? parseInt(userOverrides.refunds,   10) : (productAgg.__refundCount   || 0);
  out.exchangeCountAuto = productAgg.__exchangeCount || 0;
  out.refundCountAuto   = productAgg.__refundCount   || 0;
  // ── Maximum mode: derive date range from the order data ─────────────
  // AppDatePicker's "Maximum" preset returns from='', to=''. /orders.php
  // returns ALL orders in that case (no SQL filter). But the Meta API
  // requires concrete since/until — empty would 400. Mirror what
  // automation-fm-update.html does: scan the order rows for the actual
  // earliest/latest dates and use those for the ads call so the user
  // gets ALL spend that matches the data span.
  let effFrom = from, effTo = to;
  if (!from || !to) {
    const dates = orders
      .map(r => String(r.date || '').slice(0, 10))
      .filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d))
      .sort();
    if (dates.length) {
      if (!from) effFrom = dates[0];
      if (!to)   effTo   = dates[dates.length - 1];
    } else {
      // No dated orders → fall back to last 365 days so the Meta call
      // doesn't 400 and Amount Spent gets a usable window.
      const today = new Date();
      const past  = new Date(today.getTime() - 365 * 86400000);
      const ymd = d => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      if (!from) effFrom = ymd(past);
      if (!to)   effTo   = ymd(today);
    }
    console.log('[profit][' + brand.name + '] Maximum mode → ads window:', effFrom, '→', effTo);
  }
  // ── Always compute ads, even when products are empty ───────────────
  // The user expects the ads spend in the brand summary to match Amount
  // Spent EXACTLY for the selected date range — independent of whether
  // any orders matched. Previously we early-returned on empty productAgg
  // which left ads at 0 even when Meta had real spend in that range.
  const keywords = dbProducts
    .map(p => p && p.meta && p.meta.campaign_name)
    .filter(k => k && String(k).trim());
  const adsRes = await computeProductROAS(brand, effFrom, effTo, keywords);
  const roasMap = adsRes.perProduct;
  const brandTotalSpend = adsRes.brandTotalSpend;
  out.brandTotalSpend = brandTotalSpend;
  // No products in this range → render an "ads only" card so the user
  // still sees the period's ad spend (matches Amount Spent for the range).
  if (!productAgg.size) {
    out.empty = true;
    out.totals = { revenue: 0, ads: brandTotalSpend, cogs: 0, overhead: 0, returns: 0,
                   profit: -brandTotalSpend, deliveredPieces: 0, deliveredOrders: 0, returnedOrders: 0 };
    out.uploadDateFilterStats = useUploads ? { before: beforeFilter, after: afterFilter } : null;
    return out;
  }
  // Track how much per-product ads we account for so we can show the
  // "unallocated" remainder (campaigns whose names don't contain any
  // product's campaign_name keyword).
  let allocatedSpend = 0;
  // 4. Build rows + totals
  const rows = [];
  const totals = { revenue: 0, ads: 0, cogs: 0, overhead: 0, returns: 0, profit: 0,
                   deliveredPieces: 0, deliveredOrders: 0, returnedOrders: 0, totalOrders: 0 };
  productAgg.forEach((slot, key) => {
    // Match → DB product (for campaign_name)
    const dbProd = dbProducts.find(p => nKey(p.name) === key)
                || fuzzyFind(slot.name, dbProducts);
    const camp = dbProd && dbProd.meta && dbProd.meta.campaign_name;
    const adSlot = camp ? (roasMap.get(camp) || null) : null;
    // Match → FM sheet row (cogs + overhead unit prices)
    let fmSlot = fmCosts.get(key);
    if (!fmSlot && dbProd) fmSlot = fmCosts.get(nKey(dbProd.name));
    if (!fmSlot && fmCosts.size) {
      // Fuzzy fallback against FM rows
      const fmCands = Array.from(fmCosts.values());
      const m = fuzzyFind(slot.name, fmCands);
      if (m) fmSlot = m;
    }
    const cogsUnit     = (fmSlot && fmSlot.cogs)     || 0;
    const overheadUnit = (fmSlot && fmSlot.overhead) || 0;
    // Display name: prefer DB live name, else sheet name, else order text.
    const displayName = (dbProd && dbProd.name) || (fmSlot && fmSlot.name) || slot.name;
    const revenue  = slot.deliveredNet;
    const ads      = adSlot ? adSlot.spend : 0;
    if (adSlot) allocatedSpend += adSlot.spend;
    // COGS = unit_cost × delivered_pieces. deliveredPieces was accumulated
    // from EACH item's actual qty (multi-product orders distribute correctly:
    // 1 piece of A + 1 piece of B → A gets +1 and B gets +1, not 0.5 each).
    const cogs     = cogsUnit * slot.deliveredPieces;
    // Overhead = unit × TOTAL ORDERS for this product (any status that
    // survived the brand's prefix gate — DELIVERED, RETURNED, IN TRANSIT,
    // DELIVERING, PICKED-UP). The 8 EGP overhead is paid the moment a
    // shipment leaves the door regardless of outcome. Per user request:
    // "اضرب الاوفر هيد كوست في إجمالي الاوردرات اللي هما 48 مش المسلم
    // ومرتجع بس". For a multi-product order each product still gets a
    // proportional share so brand total = unit × total_unique_orders.
    const totalOrdersForProduct = slot.totalOrders || 0;
    const overhead = overheadUnit * totalOrdersForProduct;
    const returns  = slot.returnedFees; // user choice: shipping fees of returned orders only
    const profit   = revenue - ads - cogs - overhead - returns;
    console.log('[profit][' + brand.name + '] ' + displayName,
                '· delivered=' + slot.deliveredPieces + 'pcs',
                '· total_orders=' + totalOrdersForProduct.toFixed(2),
                '· cogs_unit=' + cogsUnit, '→ cogs=' + Math.round(cogs),
                '· overhead_unit=' + overheadUnit, '→ overhead=' + Math.round(overhead),
                '· revenue=' + Math.round(revenue),
                '· ads=' + Math.round(ads),
                '· returns=' + Math.round(returns),
                '· profit=' + Math.round(profit));
    rows.push({
      name: displayName,
      campaign: camp || '',
      deliveredPieces: slot.deliveredPieces,
      totalOrders: totalOrdersForProduct,
      revenue, ads, cogs, overhead, returns, profit,
      hasFM: !!fmSlot, hasAds: !!adSlot
    });
    totals.revenue += revenue;
    totals.ads     += ads;
    totals.cogs    += cogs;
    totals.overhead += overhead;
    totals.returns += returns;
    totals.profit  += profit;
    totals.deliveredPieces += slot.deliveredPieces;
    totals.deliveredOrders += slot.deliveredOrders;
    totals.returnedOrders  += slot.returnedOrders;
    totals.totalOrders     += totalOrdersForProduct;
    if (!fmSlot) out.missList.push(displayName + ' — مفيش COGS/OVERHEAD في شيت FM');
    if (camp && !adSlot) out.missList.push(displayName + ' — مفيش ads data للـ campaign "' + camp + '"');
    if (!camp) out.missList.push(displayName + ' — مفيش campaign_name متعرّف على المنتج (Products page)');
  });
  rows.sort((a, b) => b.profit - a.profit);
  out.rows = rows;
  // OVERRIDE brand-level ads with the authoritative account_spend total —
  // matches the Amount Spent page exactly (includes deleted campaigns).
  // Per-product `ads` columns stay as the rescaled keyword-allocation.
  // If keyword-matching missed everything (no DB campaign_name set on
  // any product), this still shows the real spend so the brand profit
  // formula isn't artificially inflated by zero ads.
  if (brandTotalSpend > 0) {
    const sumPerProduct = totals.ads;
    if (Math.abs(sumPerProduct - brandTotalSpend) > 1) {
      // Adjust totals.profit to use brandTotalSpend instead of sumPerProduct
      const delta = brandTotalSpend - sumPerProduct;
      totals.ads = brandTotalSpend;
      totals.profit -= delta; // more ads → less profit
      out.adsAdjusted = { sumPerProduct, brandTotalSpend, delta };
    }
  }
  out.totals = totals;
  // Brand-level sanity log
  const totalShippedOrders = totals.deliveredOrders + totals.returnedOrders;
  console.log('[profit][' + brand.name + '] BRAND TOTALS',
              '· products=' + rows.length,
              '· shipped_orders(unique)=' + Math.round(totalShippedOrders),
              '· delivered_pieces=' + totals.deliveredPieces,
              '· revenue=' + Math.round(totals.revenue),
              '· ads(authoritative)=' + Math.round(totals.ads),
              '· ads(allocated to products)=' + Math.round(allocatedSpend),
              '· cogs=' + Math.round(totals.cogs),
              '· overhead=' + Math.round(totals.overhead),
              '· returns=' + Math.round(totals.returns),
              '· profit=' + Math.round(totals.profit));
  return out;
}

// ── Render ───────────────────────────────────────────────────────────
function renderBrandCard(card){
  if (card.errored) {
    return '<div class="brand-card">'
      + '<div class="brand-head">'
      +   '<span class="brand-name">' + escapeHtml(card.brand.name) + '</span>'
      +   '<span class="pill err">Error</span>'
      + '</div>'
      + '<div class="miss-list" style="background:#FEF2F2;border-color:#FECACA;color:#991B1B;">'
      +   '⚠ ' + escapeHtml(card.errorMsg || 'unknown error')
      + '</div></div>';
  }
  if (card.empty) {
    // No orders for this brand+range — don't render any stat boxes.
    // Just the brand header pill so the user knows the brand was
    // processed but had nothing in the requested period. Per user
    // request: "قبل ما اسحب الداتا ما تعرضش الخانات استنى لما اسحب".
    let sourceBadge = '';
    if (card.usingUploadedData) {
      sourceBadge = '<span class="pill" style="background:#E7F0FD;color:#0A4275;border:1px solid #B3D4FC;margin-left:8px;">📂 من الشيت المرفوع</span>';
    } else if (card.fellBackToDb) {
      sourceBadge = '<span class="pill" style="background:#FFF8E1;color:#7A5500;border:1px solid #FCE39A;margin-left:8px;">DB · uploads خارج الـ range</span>';
    } else {
      sourceBadge = '<span class="pill" style="background:#F1F1F1;color:#4A5568;border:1px solid #DCDCDC;margin-left:8px;">🗄️ من Shipping Analytics</span>';
    }
    return '<div class="brand-card">'
      + '<div class="brand-head">'
      +   '<span class="brand-name">' + escapeHtml(card.brand.name) + sourceBadge + '</span>'
      +   '<span class="pill warn">No orders in this range</span>'
      + '</div>'
      + '</div>';
  }
  if (!card.rows || !card.rows.length) {
    return '<div class="brand-card">'
      + '<div class="brand-head">'
      +   '<span class="brand-name">' + escapeHtml(card.brand.name) + '</span>'
      +   '<span class="pill err">No data</span>'
      + '</div></div>';
  }
  const t = card.totals;
  const delOrdersWhole = Math.round(t.deliveredOrders);
  const retOrdersWhole = Math.round(t.returnedOrders);
  const totalOrdersWhole = Math.round(t.totalOrders || 0);
  // Editable extras — saved per brand in localStorage. Pre-loaded into
  // card.userOverrides at compute time. Each row's input has a unique
  // data-key; the change handler persists + recomputes totals live.
  const ov = card.userOverrides || {};
  const num = k => (ov[k] != null ? Number(ov[k]) : 0);
  const exVal      = card.exchangeCount != null ? card.exchangeCount : 0;
  const refVal     = card.refundCount   != null ? card.refundCount   : 0;
  const exAuto     = card.exchangeCountAuto || 0;
  const refAuto    = card.refundCountAuto   || 0;
  const vCash      = num('vodafone_cash');
  const otherRev   = num('other_revenue');
  const refundExp  = num('refund_expense');
  const exchExp    = num('exchange_expense');
  const otherExp   = num('other_expense');
  // Base auto-computed values (for grand totals + reactive update)
  const baseRev    = t.revenue;
  const baseCogs   = t.cogs;
  const baseAds    = t.ads;
  const baseOver   = t.overhead;
  const baseRet    = t.returns;
  // Computed totals
  const totalRevenue  = baseRev + vCash + otherRev;
  const totalExpenses = baseCogs + baseRet + baseAds + baseOver + refundExp + exchExp + otherExp;
  const profit        = totalRevenue - totalExpenses;
  const profitClass   = profit >= 0 ? 'profit-pos' : 'profit-neg';
  const bid = card.brand.id;
  // Pack the base values as a JSON attribute so the input change handler
  // can recompute totals without re-rendering the whole card.
  const baseAttrs = ' data-brand-id="' + bid + '"'
    + ' data-base-revenue="' + baseRev + '"'
    + ' data-base-cogs="'    + baseCogs + '"'
    + ' data-base-ads="'     + baseAds + '"'
    + ' data-base-overhead="'+ baseOver + '"'
    + ' data-base-returns="' + baseRet + '"';
  const inputHtml = (key, val, autoLabel) => {
    const titleAttr = autoLabel != null
      ? ' title="مكتشف تلقائياً: ' + autoLabel + '. تقدر تعدّله."'
      : '';
    return '<input type="number" step="any" class="stat-input"'
      + ' data-brand-id="' + bid + '"'
      + ' data-key="' + key + '"'
      + titleAttr
      + ' value="' + val + '" />';
  };
  // 3 horizontal rows + a profit summary at the bottom. Each row uses
  // an auto-fit grid so stats wrap on narrow screens but stay one-line
  // on desktop. No section titles or colored backgrounds — clean look.
  const summary =
    '<div class="summary-card" ' + baseAttrs + '>'
    // Row 1: Orders
    + '<div class="summary-row">'
    +   '<div class="stat"><span class="stat-label">إجمالي الاوردرات</span><span class="stat-val">' + fmtNum(totalOrdersWhole) + '</span></div>'
    +   '<div class="stat"><span class="stat-label">أوردرات مسلمة</span><span class="stat-val">' + fmtNum(delOrdersWhole) + '</span></div>'
    +   '<div class="stat"><span class="stat-label">أوردرات مرتجعة</span><span class="stat-val">' + fmtNum(retOrdersWhole) + '</span></div>'
    +   '<div class="stat"><span class="stat-label">قطع مسلمة</span><span class="stat-val">' + fmtNum(t.deliveredPieces) + '</span></div>'
    +   '<div class="stat"><span class="stat-label" title="مكتشف تلقائياً: ' + refAuto + '. تقدر تعدّله.">عدد الاسترجاع</span>' + inputHtml('refunds', refVal, refAuto) + '</div>'
    +   '<div class="stat"><span class="stat-label" title="مكتشف تلقائياً: ' + exAuto + '. تقدر تعدّله.">عدد الاستبدال</span>' + inputHtml('exchanges', exVal, exAuto) + '</div>'
    + '</div>'
    // Row 2: Revenue
    + '<div class="summary-row with-divider">'
    +   '<div class="stat"><span class="stat-label">الإيرادات</span><span class="stat-val">' + fmtMoney(baseRev) + '</span></div>'
    +   '<div class="stat"><span class="stat-label">تحويلات فودافون كاش</span>' + inputHtml('vodafone_cash', vCash) + '</div>'
    +   '<div class="stat"><span class="stat-label">إيرادات أخرى</span>' + inputHtml('other_revenue', otherRev) + '</div>'
    +   '<div class="stat is-total"><span class="stat-label">إجمالي الإيرادات</span><span class="stat-val" data-total="revenue">' + fmtMoney(totalRevenue) + '</span></div>'
    + '</div>'
    // Row 3: Expenses
    + '<div class="summary-row with-divider">'
    +   '<div class="stat"><span class="stat-label">COGS</span><span class="stat-val">' + fmtMoney(baseCogs) + '</span></div>'
    +   '<div class="stat"><span class="stat-label">مصاريف مرتجعات</span><span class="stat-val">' + fmtMoney(baseRet) + '</span></div>'
    +   '<div class="stat"><span class="stat-label">الإعلانات</span><span class="stat-val">' + fmtMoney(baseAds) + '</span></div>'
    +   '<div class="stat"><span class="stat-label">Overhead</span><span class="stat-val">' + fmtMoney(baseOver) + '</span></div>'
    +   '<div class="stat"><span class="stat-label">مصاريف إسترجاع</span>' + inputHtml('refund_expense', refundExp) + '</div>'
    +   '<div class="stat"><span class="stat-label">مصاريف إستبدال</span>' + inputHtml('exchange_expense', exchExp) + '</div>'
    +   '<div class="stat"><span class="stat-label">مصروفات أخرى</span>' + inputHtml('other_expense', otherExp) + '</div>'
    +   '<div class="stat is-total"><span class="stat-label">إجمالي المصروفات</span><span class="stat-val" data-total="expenses">' + fmtMoney(totalExpenses) + '</span></div>'
    + '</div>'
    // Profit footer
    + '<div class="summary-profit">'
    +   '<span class="label">صافي الربح</span>'
    +   '<span class="val ' + profitClass + '" data-total="profit">' + fmtMoney(profit) + '</span>'
    + '</div>'
    + '</div>';
  const body = card.rows.map(r => {
    const pcls = r.profit >= 0 ? 'profit-pos' : 'profit-neg';
    return '<tr>'
      + '<td class="ar">' + escapeHtml(r.name) + '</td>'
      + '<td class="right">' + fmtNum(r.deliveredPieces) + '</td>'
      + '<td class="right">' + fmtMoney(r.revenue) + '</td>'
      + '<td class="right">' + (r.hasFM ? fmtMoney(r.cogs) : '<span style="color:#9CA3AF;">—</span>') + '</td>'
      + '<td class="right">' + (r.hasAds ? fmtMoney(r.ads) : '<span style="color:#9CA3AF;">—</span>') + '</td>'
      + '<td class="right">' + (r.hasFM ? fmtMoney(r.overhead) : '<span style="color:#9CA3AF;">—</span>') + '</td>'
      + '<td class="right">' + fmtMoney(r.returns) + '</td>'
      + '<td class="right ' + pcls + '">' + fmtMoney(r.profit) + '</td>'
      + '</tr>';
  }).join('');
  const tableHtml = '<div class="table-scroll"><table class="perf">'
    + '<thead><tr>'
    +   '<th>إسم المنتج</th>'
    +   '<th class="right">قطع مسلمة</th>'
    +   '<th class="right">الإيرادات</th>'
    +   '<th class="right">COGS</th>'
    +   '<th class="right">إعلانات</th>'
    +   '<th class="right">Overhead</th>'
    +   '<th class="right">مصاريف مرتجعات</th>'
    +   '<th class="right">صافي الربح</th>'
    + '</tr></thead>'
    + '<tbody>' + body + '</tbody>'
    + '<tfoot><tr class="totals-row">'
    +   '<td>Total</td>'
    +   '<td class="right">' + fmtNum(t.deliveredPieces) + '</td>'
    +   '<td class="right">' + fmtMoney(t.revenue) + '</td>'
    +   '<td class="right">' + fmtMoney(t.cogs) + '</td>'
    +   '<td class="right">' + fmtMoney(t.ads) + '</td>'
    +   '<td class="right">' + fmtMoney(t.overhead) + '</td>'
    +   '<td class="right">' + fmtMoney(t.returns) + '</td>'
    +   '<td class="right profit-cell ' + profitClass + '">' + fmtMoney(t.profit) + '</td>'
    + '</tr></tfoot>'
    + '</table></div>';
  let warnHtml = '';
  if (card.fmWarn) {
    warnHtml = '<div class="miss-list">⚠ ' + escapeHtml(card.fmWarn) + ' — أعمدة COGS / OVERHEAD مش هتتحسب لحد ما الشيت يتظبط.</div>';
  }
  let missHtml = '';
  if (card.missList && card.missList.length) {
    const items = card.missList.slice(0, 50).map(m => '<li>' + escapeHtml(m) + '</li>').join('');
    missHtml = '<div class="miss-list"><b>' + card.missList.length + '</b> منتج محتاج مراجعة:'
      + '<ul>' + items + (card.missList.length > 50 ? '<li>… +' + (card.missList.length - 50) + ' أكتر</li>' : '') + '</ul></div>';
  }
  // Badge that shows the data source for THIS brand:
  //   - 📂 Uploaded sheet (with row count)
  //   - 🗄️ DB (Shipping Analytics) — default when no upload
  //   - DB fallback — when uploads existed but were outside the range
  let sourceBadge = '';
  if (card.usingUploadedData) {
    sourceBadge = '<span class="pill" style="background:#E7F0FD;color:#0A4275;border:1px solid #B3D4FC;margin-left:8px;">📂 من الشيت المرفوع · ' + fmtNum(card.uploadedRowCount || 0) + ' صف</span>';
  } else if (card.fellBackToDb) {
    sourceBadge = '<span class="pill" style="background:#FFF8E1;color:#7A5500;border:1px solid #FCE39A;margin-left:8px;">DB · uploads خارج الـ range</span>';
  } else {
    sourceBadge = '<span class="pill" style="background:#F1F1F1;color:#4A5568;border:1px solid #DCDCDC;margin-left:8px;">🗄️ من Shipping Analytics</span>';
  }
  return '<div class="brand-card">'
    + '<div class="brand-head">'
    +   '<span class="brand-name">' + escapeHtml(card.brand.name) + sourceBadge + '</span>'
    +   '<span class="brand-meta">' + fmtNum(card.rows.length) + ' منتج · ' + fmtNum(t.deliveredPieces) + ' قطعة مسلمة · ' + fmtNum(Math.round(t.deliveredOrders + t.returnedOrders)) + ' أوردر إجمالي</span>'
    + '</div>'
    + summary
    + tableHtml
    + warnHtml
    + missHtml
    + '</div>';
}

function renderGrandTotal(allCards){
  const valid = allCards.filter(c => c.totals);
  if (valid.length < 2) return '';
  const t = { revenue: 0, ads: 0, cogs: 0, overhead: 0, returns: 0, profit: 0,
              deliveredPieces: 0 };
  valid.forEach(c => {
    t.revenue += c.totals.revenue;
    t.ads     += c.totals.ads;
    t.cogs    += c.totals.cogs;
    t.overhead += c.totals.overhead;
    t.returns += c.totals.returns;
    t.profit  += c.totals.profit;
    t.deliveredPieces += c.totals.deliveredPieces;
  });
  const pcls = t.profit >= 0 ? 'profit-pos' : 'profit-neg';
  return '<div class="brand-card">'
    + '<div class="brand-head" style="background:#0E8345;">'
    +   '<span class="brand-name">All Brands — Grand Total</span>'
    +   '<span class="brand-meta">' + fmtNum(valid.length) + ' براند · ' + fmtNum(t.deliveredPieces) + ' قطعة</span>'
    + '</div>'
    + '<div class="summary-card">'
    +   '<div class="stat"><span class="stat-label">الإيرادات</span><span class="stat-val">' + fmtMoney(t.revenue) + '</span></div>'
    +   '<div class="stat"><span class="stat-label">الإعلانات</span><span class="stat-val">' + fmtMoney(t.ads) + '</span></div>'
    +   '<div class="stat"><span class="stat-label">COGS</span><span class="stat-val">' + fmtMoney(t.cogs) + '</span></div>'
    +   '<div class="stat"><span class="stat-label">Overhead</span><span class="stat-val">' + fmtMoney(t.overhead) + '</span></div>'
    +   '<div class="stat"><span class="stat-label">مصاريف مرتجعات</span><span class="stat-val">' + fmtMoney(t.returns) + '</span></div>'
    +   '<div class="stat"><span class="stat-label">صافي الربح</span><span class="stat-val ' + pcls + '">' + fmtMoney(t.profit) + '</span></div>'
    + '</div></div>';
}

// ── Run ──────────────────────────────────────────────────────────────
async function runReport(){
  syncDateRange();
  showErr('');
  const fromVal = dateRange.from || '';
  const toVal   = dateRange.to   || '';
  $('runBtn').disabled = true;
  $('runBtn').innerHTML = '<span class="spinner"></span> Computing…';
  $('cards').innerHTML = '<div class="state"><span class="spinner"></span> بيحسب الربح للبراند ده…</div>';
  try {
    const activeId = window.getActiveBrandId ? window.getActiveBrandId() : 0;
    let brands = [];
    if (activeId === 0 && window.getAllBrandsAsync) {
      brands = await window.getAllBrandsAsync();
    } else if (window.getActiveBrandAsync) {
      const ab = await window.getActiveBrandAsync();
      if (ab && ab.id) brands = [ab];
    }
    if (!brands.length) {
      $('cards').innerHTML = '<div class="state">— مفيش براند نشط — اختار براند من الـ topbar أو فعل "All brands" —</div>';
      return;
    }
    // Sequential per brand — Meta API hates parallel from same connector.
    // Per-brand try/catch isolates failures: one brand without an FM sheet
    // or with a broken Meta connector won't break the rest of the run.
    // The page renders progressively so the user sees brands as they
    // complete (no need to wait for all to finish).
    const cards = [];
    for (let i = 0; i < brands.length; i++) {
      const b = brands[i];
      // Visible progress for "All brands" mode where many brands run
      const progressHtml = brands.length > 1
        ? '<div class="state" style="padding:14px 20px;text-align:right;border-radius:8px;background:#FFF;border:1px solid #E1E3E5;margin-bottom:12px;">'
          + '<span class="spinner"></span> ' + escapeHtml(b.name) + ' (' + (i + 1) + '/' + brands.length + ')…</div>'
        : '';
      $('cards').innerHTML = cards.map(renderBrandCard).join('')
        + progressHtml
        + renderGrandTotal(cards);
      let card;
      try {
        card = await computeProfitForBrand(b, fromVal, toVal);
      } catch (err) {
        console.error('[profit] Brand "' + b.name + '" failed:', err);
        card = { brand: b, errored: true, errorMsg: err.message || String(err), missList: [] };
      }
      cards.push(card);
      $('cards').innerHTML = cards.map(renderBrandCard).join('') + renderGrandTotal(cards);
    }
    console.log('[profit] DONE — processed', cards.length, 'brand(s):',
                cards.map(c => c.brand.name + (c.errored ? ' ❌' : c.empty ? ' ∅' : ' ✅')).join(', '));
  } catch (e) {
    showErr('Compute failed: ' + e.message);
    $('cards').innerHTML = '<div class="state">⚠ Failed.</div>';
  } finally {
    $('runBtn').disabled = false;
    $('runBtn').innerHTML = '↻ Compute';
  }
}

$('runBtn').addEventListener('click', runReport);

// Upload button → file picker. Multiple files supported. Carrier is
// auto-detected per file from the column headers (or matches a saved
// custom connector's column_map from Settings).
$('uploadBtn').addEventListener('click', () => $('fileInput').click());

// ── Carrier API picker (vanilla port of Shipping Analytics' CarrierDropdown)
// 1:1 visual match with shipping.html — trigger button, popover panel,
// account-grouping, indeterminate group checkboxes, Select all / Clear /
// Done footer, auto-pull on selection change.
let shippingConnectors = [];
let selectedConnIds   = [];
const carrierLoadingIds = new Set();
let carrierMenuOpen = false;
// Provider display info — same as SHIP_PROVIDERS in shipping.html. Used
// for the per-row label inside the dropdown ("J&T", "Bosta", …).
const PROFIT_SHIP_PROVIDERS = {
  jt:      { name: 'J&T',      logo: '../logos/jt.svg' },
  bosta:   { name: 'Bosta',    logo: '../logos/bosta.svg' },
  qp:      { name: 'QP',       logo: '../logos/qp.svg' },
  shipblu: { name: 'ShipBlu',  logo: '../logos/shipblu.svg' },
  turbo:   { name: 'Turbo',    logo: '../logos/turbo.svg' },
  flextock:{ name: 'Flextock' },
  hashtag: { name: 'Hashtag'  },
  mylerz:  { name: 'Mylerz'   },
  speedaf: { name: 'Speedaf'  }
};

async function loadShippingConnectors(){
  try {
    const r = await api('/connectors.php?type=shipping');
    shippingConnectors = (r && r.rows) || [];
  } catch (e) {
    console.warn('[profit] loadShippingConnectors:', e.message);
    shippingConnectors = [];
  }
  renderCarrierDropdown();
}
loadShippingConnectors();

function renderCarrierDropdown(){
  const host = $('carrierDropdown');
  if (!host) return;
  const hasLoading = Array.from(carrierLoadingIds).length > 0;
  const sel = new Set(selectedConnIds);
  let labelText;
  if (!shippingConnectors.length)        labelText = 'No carriers connected';
  else if (!selectedConnIds.length)      labelText = 'Select carrier account';
  else if (selectedConnIds.length === 1) {
    const c = shippingConnectors.find(x => x.id === selectedConnIds[0]);
    const p = c ? (PROFIT_SHIP_PROVIDERS[c.provider] || {}) : null;
    labelText = c ? (c.name + (p ? (' · ' + p.name) : '')) : '1 selected';
  } else labelText = selectedConnIds.length + ' accounts selected';

  // Group by account name (case-insensitive) — same as CarrierDropdown.
  const groups = {}; const nameOrder = [];
  shippingConnectors.forEach(c => {
    const key = String(c.name || '').trim().toLowerCase() || '(unnamed)';
    if (!groups[key]) { groups[key] = { display: c.name || '(unnamed)', items: [] }; nameOrder.push(key); }
    groups[key].items.push(c);
  });

  const truckSvg = '<svg viewBox="0 0 20 20" style="width:14px;height:14px;"><path d="M2 6.5C2 5.67 2.67 5 3.5 5H11.5C12.33 5 13 5.67 13 6.5V13.5H2V6.5Z" stroke="#1A1A1A" stroke-width="1.5" fill="none"></path><path d="M13 8H16L18 10.5V13.5H13V8Z" stroke="#1A1A1A" stroke-width="1.5" fill="none"></path></svg>';
  const caretSvg = '<svg viewBox="0 0 12 12" style="width:10px;height:10px;margin-left:2px;"><path d="M3 4.5l3 3 3-3" stroke="#1A1A1A" stroke-width="1.5" fill="none" stroke-linecap="round"></path></svg>';

  const triggerStyle = 'display:inline-flex;align-items:center;gap:8px;background:#FFFFFF;border:1px solid '
    + ((carrierMenuOpen || selectedConnIds.length) ? '#1A1A1A' : '#DCDCDC')
    + ';border-radius:8px;padding:0 14px;height:36px;cursor:'
    + (shippingConnectors.length ? 'pointer' : 'not-allowed')
    + ';font-size:13px;font-weight:600;color:#1A1A1A;box-shadow:0 1px 0 rgba(0,0,0,0.04);white-space:nowrap;opacity:'
    + (shippingConnectors.length ? '1' : '0.6')
    + ';outline:none;font-family:inherit;';

  let html = '<button type="button" id="carrierTriggerBtn"'
    + (shippingConnectors.length ? '' : ' disabled')
    + ' style="' + triggerStyle + '">'
    + truckSvg
    + '<span>' + escapeHtml(labelText) + '</span>'
    + (hasLoading ? '<span style="font-size:11px;color:#6D7175;font-weight:500;">· loading…</span>' : '')
    + ((selectedConnIds.length > 0 && !hasLoading) ? '<span style="background:#1A1A1A;color:#FFF;font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;">' + selectedConnIds.length + '</span>' : '')
    + caretSvg
    + '</button>';

  if (carrierMenuOpen) {
    html += '<div id="carrierPanel" style="position:absolute;top:calc(100% + 6px);right:0;z-index:300;min-width:340px;max-width:420px;background:#F1F1F1;border:1px solid #DCDCDC;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.16);overflow:hidden;font-family:inherit;">'
      + '<div style="padding:10px 14px;background:#EBEBEB;border-bottom:1px solid #DCDCDC;font-size:11px;font-weight:700;color:#6D7175;text-transform:uppercase;letter-spacing:0.06em;display:flex;align-items:center;justify-content:space-between;">'
      +   '<span>Carrier accounts</span>'
      +   '<span style="font-weight:500;text-transform:none;letter-spacing:0;">Date range applies automatically</span>'
      + '</div>'
      + '<div style="max-height:380px;overflow-y:auto;background:#F1F1F1;">';

    nameOrder.forEach(key => {
      const grp = groups[key];
      const groupIds = grp.items.map(c => c.id);
      const allSel  = groupIds.every(id => sel.has(id));
      const someSel = groupIds.some(id  => sel.has(id));
      html += '<div style="border-bottom:1px solid #E1E3E5;">'
        + '<label data-group="' + escapeHtml(key) + '" style="display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;background:#EBEBEB;user-select:none;">'
        +   '<input type="checkbox"' + (allSel ? ' checked' : '') + ' data-indet="' + (!allSel && someSel ? '1' : '0') + '" style="margin:0;accent-color:#1A1A1A;flex-shrink:0;width:14px;height:14px;">'
        +   '<span style="flex:1;min-width:0;font-size:13px;font-weight:800;color:#1A1A1A;">' + escapeHtml(grp.display) + '</span>'
        +   '<span style="font-size:11px;color:#6D7175;font-weight:500;flex-shrink:0;">' + grp.items.length + ' carrier' + (grp.items.length !== 1 ? 's' : '') + '</span>'
        + '</label>';
      grp.items.forEach(c => {
        const checked = sel.has(c.id);
        const loading = carrierLoadingIds.has(c.id);
        const p = PROFIT_SHIP_PROVIDERS[c.provider] || { name: c.provider, logo: '' };
        html += '<label data-cid="' + c.id + '" style="display:flex;align-items:center;gap:10px;padding:7px 14px 7px 36px;cursor:pointer;background:' + (checked ? '#FFFFFF' : 'transparent') + ';user-select:none;">'
          +   '<input type="checkbox"' + (checked ? ' checked' : '') + ' style="margin:0;accent-color:#1A1A1A;flex-shrink:0;width:14px;height:14px;">'
          +   '<div style="width:42px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
          +     (p.logo ? '<img src="' + escapeHtml(p.logo) + '" alt="' + escapeHtml(p.name) + '" style="max-width:42px;max-height:20px;object-fit:contain;">' : '')
          +   '</div>'
          +   '<span style="flex:1;min-width:0;font-size:13px;font-weight:600;color:#1A1A1A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(p.name) + '</span>'
          +   (loading ? '<span style="font-size:11px;color:#6D7175;font-weight:600;">Loading…</span>' : '')
          + '</label>';
      });
      html += '</div>';
    });

    html += '</div>'
      + '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#EBEBEB;border-top:1px solid #DCDCDC;">'
      +   '<button type="button" id="carrierSelectAll" style="height:28px;padding:0 12px;background:transparent;border:1px solid #DCDCDC;border-radius:6px;color:#1A1A1A;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Select all (' + shippingConnectors.length + ')</button>'
      +   '<div style="display:flex;gap:8px;">'
      +     '<button type="button" id="carrierClear"' + (selectedConnIds.length ? '' : ' disabled') + ' style="height:28px;padding:0 12px;background:transparent;border:1px solid #DCDCDC;border-radius:6px;color:#1A1A1A;font-size:12px;font-weight:700;cursor:' + (selectedConnIds.length ? 'pointer' : 'default') + ';opacity:' + (selectedConnIds.length ? '1' : '0.5') + ';font-family:inherit;">Clear</button>'
      +     '<button type="button" id="carrierDone" style="height:28px;padding:0 14px;background:#1A1A1A;color:#FFF;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Done</button>'
      +   '</div>'
      + '</div>'
      + '</div>';
  }

  host.innerHTML = html;
  // Wire up.
  const trig = $('carrierTriggerBtn');
  if (trig) trig.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!shippingConnectors.length) return;
    carrierMenuOpen = !carrierMenuOpen;
    renderCarrierDropdown();
  });
  if (carrierMenuOpen) {
    // Set indeterminate state on group checkboxes (can't be done via HTML attr)
    host.querySelectorAll('input[data-indet="1"]').forEach(el => { el.indeterminate = true; });
    host.querySelectorAll('label[data-group]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const key = el.getAttribute('data-group');
        const grp = groups[key];
        const ids = grp.items.map(c => c.id);
        const allSel = ids.every(id => sel.has(id));
        let next = selectedConnIds.filter(id => !ids.includes(id));
        if (!allSel) next = next.concat(ids);
        setSelectedConnIds(next);
      });
    });
    host.querySelectorAll('label[data-cid]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const id = parseInt(el.getAttribute('data-cid'), 10);
        const i  = selectedConnIds.indexOf(id);
        const next = selectedConnIds.slice();
        if (i >= 0) next.splice(i, 1); else next.push(id);
        setSelectedConnIds(next);
      });
    });
    $('carrierSelectAll').addEventListener('click', () => setSelectedConnIds(shippingConnectors.map(c => c.id)));
    $('carrierClear')   .addEventListener('click', () => setSelectedConnIds([]));
    $('carrierDone')    .addEventListener('click', () => { carrierMenuOpen = false; renderCarrierDropdown(); });
  }
}
document.addEventListener('click', (e) => {
  if (!carrierMenuOpen) return;
  const host = $('carrierDropdown');
  if (host && host.contains(e.target)) return;
  carrierMenuOpen = false;
  renderCarrierDropdown();
});

function setSelectedConnIds(next){
  const before = new Set(selectedConnIds);
  selectedConnIds = next.slice();
  renderCarrierDropdown();
  // Drop any uploads tied to connectors no longer selected.
  const stillSel = new Set(selectedConnIds);
  uploadedFiles = uploadedFiles.filter(f => f.__connectorId == null || stillSel.has(f.__connectorId));
  renderUploads();
  // Fetch newly added connectors only (debounced — matches Shipping Analytics).
  const added = selectedConnIds.filter(id => !before.has(id));
  if (added.length) scheduleCarrierPull(added);
}

let _pullTimer = null;
function scheduleCarrierPull(ids){
  clearTimeout(_pullTimer);
  _pullTimer = setTimeout(() => pullFromCarriers(ids), 200);
}

async function pullFromCarriers(ids){
  syncDateRange();
  const since = dateRange.from || '';
  const until = dateRange.to   || '';
  const prefixMap = await loadPrefixToBrand();
  const activeBrandId = window.getActiveBrandId ? (window.getActiveBrandId() || 0) : 0;
  showErr('');
  for (const id of ids) {
    const conn = shippingConnectors.find(c => c.id === id);
    if (!conn) continue;
    const label = (conn.name || '') + ' (' + (conn.provider || '').toUpperCase() + ')';
    carrierLoadingIds.add(id);
    renderCarrierDropdown();
    try {
      let qs = '?action=fetch&connector_id=' + id;
      if (since) qs += '&since=' + encodeURIComponent(since);
      if (until) qs += '&until=' + encodeURIComponent(until);
      const r = await api('/shipping.php' + qs);
      const rows = (r && r.rows) || [];
      const brandCounts = new Map();
      const apiRows = rows.map(row => {
        const m = String(row.product || '').match(/\(\s*([a-z0-9]{1,4})-([a-z0-9]{1,4})\s*\)/i);
        const pref = m ? m[1].toLowerCase() : '';
        const b = pref ? prefixMap.get(pref) : null;
        const bid = b ? b.id : (activeBrandId || null);
        const out = Object.assign({}, row, { __brand_id: bid });
        if (bid) brandCounts.set(bid, (brandCounts.get(bid) || 0) + 1);
        return out;
      });
      uploadedFiles = uploadedFiles.filter(f => f.__connectorId !== id);
      uploadedFiles.push({
        name: 'API · ' + label,
        carrier: (conn.provider || 'API').toUpperCase(),
        rowCount: apiRows.length,
        brandCounts,
        apiRows,
        __connectorId: id
      });
    } catch (e) {
      console.error('[profit] pull from', label, e);
      showErr('فشل السحب من ' + label + ': ' + e.message);
    } finally {
      carrierLoadingIds.delete(id);
      renderCarrierDropdown();
    }
  }
  renderUploads();
}

// Recompute brand-level totals (revenue / expenses / profit) live when
// any editable input in the summary card changes. Reads the base values
// from the .summary-card data-base-* attributes (set at render time)
// and adds the current input values on top — so the user sees totals
// update as they type without re-running the whole compute pipeline.
function recomputeCardTotals(card){
  if (!card) return;
  const baseRev  = parseFloat(card.getAttribute('data-base-revenue')) || 0;
  const baseCogs = parseFloat(card.getAttribute('data-base-cogs'))    || 0;
  const baseAds  = parseFloat(card.getAttribute('data-base-ads'))     || 0;
  const baseOver = parseFloat(card.getAttribute('data-base-overhead'))|| 0;
  const baseRet  = parseFloat(card.getAttribute('data-base-returns')) || 0;
  const inputs = card.querySelectorAll('.stat-input');
  const v = {};
  inputs.forEach(i => { v[i.getAttribute('data-key')] = parseFloat(i.value) || 0; });
  const totalRevenue  = baseRev + (v.vodafone_cash || 0) + (v.other_revenue || 0);
  const totalExpenses = baseCogs + baseRet + baseAds + baseOver
                      + (v.refund_expense || 0) + (v.exchange_expense || 0) + (v.other_expense || 0);
  const profit = totalRevenue - totalExpenses;
  // Inline number formatter — matches fmtMoney rounding behavior.
  const fmt = n => (n == null || isNaN(n)) ? '—' : Math.round(n).toLocaleString('en-US');
  const r = card.querySelector('[data-total="revenue"]');
  const ex = card.querySelector('[data-total="expenses"]');
  const p = card.querySelector('[data-total="profit"]');
  if (r) r.textContent = fmt(totalRevenue);
  if (ex) ex.textContent = fmt(totalExpenses);
  if (p) {
    p.textContent = fmt(profit);
    p.classList.toggle('profit-pos', profit >= 0);
    p.classList.toggle('profit-neg', profit < 0);
  }
}

// Persist editable inputs per brand. Uses event delegation so it
// survives re-renders. Saves to localStorage + triggers reactive
// recompute of the brand totals row.
$('cards').addEventListener('input', function(e){
  const el = e.target;
  if (!el || !el.classList || !el.classList.contains('stat-input')) return;
  const brandId = el.getAttribute('data-brand-id');
  const key     = el.getAttribute('data-key');
  if (!brandId || !key) return;
  const lsKey = 'app.profit.notes.' + brandId;
  let stored = {};
  try { stored = JSON.parse(localStorage.getItem(lsKey) || '{}'); } catch(_){}
  stored[key] = Number(el.value) || 0;
  try { localStorage.setItem(lsKey, JSON.stringify(stored)); } catch(_){}
  el.classList.add('dirty');
  clearTimeout(el.__dirtyT); el.__dirtyT = setTimeout(() => el.classList.remove('dirty'), 1200);
  // Find the parent summary-card and recompute its totals
  const card = el.closest('.summary-card');
  if (card) recomputeCardTotals(card);
});

// Auto-run on first load + brand change. ALWAYS runs even when no date
// range is set (Maximum mode) — the tool derives the range from order
// data so an empty from/to is a valid input.
window.addEventListener('app:brandChanged', () => runReport());
setTimeout(() => {
  syncDateRange();
  runReport();
}, 600);
