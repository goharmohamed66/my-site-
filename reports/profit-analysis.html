<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100vh;background:#F1F1F1;font-family:'Inter','Almarai',system-ui,sans-serif;color:#1A1A1A;font-size:14px;}
  .app-shell{display:flex;min-height:100vh;}
  .app-sidebar{width:240px;min-width:240px;background:#EBEBEB;border-right:1px solid #DCDCDC;display:flex;flex-direction:column;height:calc(100vh - 48px);position:sticky;top:48px;font-family:'Inter',system-ui,sans-serif;}

  .app-sidebar-item{padding:7px 12px;border-radius:8px;font-size:13px;color:#303030;display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;font-weight:800;background:transparent;}

  .page h1{font-size:22px;font-weight:700;letter-spacing:-0.3px;}

  .panel{background:#FFFFFF;border:1px solid #E1E3E5;border-radius:12px;box-shadow:0 1px 0 rgba(0,0,0,0.05);overflow:hidden;margin-bottom:14px;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:0 16px;height:36px;border-radius:8px;border:1px solid #1A1A1A;background:#1A1A1A;color:#FFFFFF;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}

  /* Brand card — one per brand. Header strip + table inside. */
  .brand-card{background:#FFFFFF;border:1px solid #E1E3E5;border-radius:12px;box-shadow:0 1px 0 rgba(0,0,0,0.05);margin-bottom:18px;overflow:hidden;}
  .brand-head{background:#1A1A1A;color:#FAF9F5;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .brand-head .brand-name{font-size:15px;font-weight:800;letter-spacing:0.2px;}

  .pill.ok{background:#E6F4EA;color:#1E7A38;border:1px solid #A8DDB7;}

  table.perf tbody tr:hover td{background:#FAFAFA;}
  table.perf tbody td.right{text-align:right;}

  table.perf tfoot .totals-row td:first-child{font-size:12px;text-transform:uppercase;letter-spacing:0.06em;}

  .err{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:14px;}
  /* Summary card = compact vertical stack of stat rows. All rows share

  .summary-card .stat-input:focus{border-color:#1A1A1A;box-shadow:0 0 0 2px rgba(26,26,26,0.08);}
  .summary-card .stat-input.dirty{border-color:#0E8345;background:#F0FDF4;}
  .summary-profit{margin-top:4px;padding-top:8px;border-top:2px solid #1A1A1A;display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .summary-profit .label{font-size:13px;font-weight:800;color:#1A1A1A;text-transform:uppercase;letter-spacing:0.04em;}
  .summary-profit .val{font-size:22px;font-weight:900;font-variant-numeric:tabular-nums;}
  .summary-profit .val.profit-pos{color:#0E8345;}
  .summary-profit .val.profit-neg{color:#D72C0D;}
  /* Mobile: collapse to 4, then 2 columns */
  @media (max-width: 900px){ .summary-row{grid-template-columns:repeat(4,minmax(0,1fr));} }
  @media (max-width: 540px){ .summary-row{grid-template-columns:repeat(2,minmax(0,1fr));} }

<script>
const $ = id => document.getElementById(id);
const API_BASE  = 'https://indigo-dog-836598.hostingersite.com/github/api';
const API_TOKEN = 'tk_4d2b9f7a8c6e1530a4f2d9b7e8c6a1f5';
async function api(path, opts){
  opts = opts || {};
  const headers = Object.assign({ 'Authorization': 'Bearer ' + API_TOKEN }, opts.headers || {});
  if (opts.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
  const r = await fetch(API_BASE + path, Object.assign({}, opts, { headers }));
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error((d && d.error) || ('HTTP ' + r.status));
  return d;
}
function escapeHtml(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function showErr(msg){ $('errBox').innerHTML = msg ? '<div class="err">⚠ ' + escapeHtml(msg) + '</div>' : ''; }
function fmtMoney(v){
  if (v == null || isNaN(v)) return '—';
  return Math.round(v).toLocaleString('en-US');
}
function fmtNum(v){
  if (v == null || isNaN(v)) return '—';
  return Math.round(v).toLocaleString('en-US');
}

// ── Arabic normalization (copied 1:1 from shipping.html / automation-fm-update.html) ──
function normalizeAr(s){return String(s||'').replace(/[ةه]/g,'ه').replace(/[أإآا]/g,'ا').replace(/ى/g,'ي').replace(/\s+/g,' ').toLowerCase().trim();}
function normalizeProd(name){
  let s = String(name||'').trim();
  s = s.replace(/\s*\([a-z0-9]{1,3}-[a-z0-9]{1,3}\)\s*$/i, '');
  return s.replace(/\s+/g,' ').trim();
}
function nKey(name){ return normalizeAr(normalizeProd(name)); }

// Fuzzy product matching (Word Overlap) — same as automation-fm-update.html
function tokenize(name){
  return normalizeAr(normalizeProd(name))
    .split(/[\s\-_,،×x]+/)
    .map(t => t.replace(/^(ال|ل|ب|ك|و|ف)/, ''))
    .filter(t => t.length >= 2);
}
function wordOverlap(a, b){
  const aw = tokenize(a), bw = tokenize(b);
  if (!aw.length || !bw.length) return 0;
  let score = 0;
  aw.forEach(at => {
    const hit = bw.some(bt => at === bt
      || (at.length >= 3 && bt.length >= 3 && (at.startsWith(bt) || bt.startsWith(at))));
    if (hit) score++;
  });
  return score;
}
function fuzzyFind(query, candidates, minOverlap){
  if (minOverlap === undefined) minOverlap = 2;
  let best = null, bestScore = 0;
  candidates.forEach(c => {
    const s = wordOverlap(query, c.name);
    if (s > bestScore) { bestScore = s; best = c; }
  });
  return bestScore >= minOverlap ? best : null;
}

// ── Multi-product splitting ──────────────────────────────────────────
// Order's `product` field can contain MULTIPLE products in one string.
// Two formats observed:
//   (A) Single product, qty suffix:    "جهاز قياس ضغط (ga-gm) x1"
//   (B) Multi-product, qty PREFIX + trailing dash separator:
//         "1X باور بانك (3n-ya)-  1X مصباح مكتبي (3n-ya)-"
//
// Detection: if the whole field starts with `\d+X ` it's format B (split
// on "-\s+\d+X" using lookahead so the qty stays glued to its product).
// Otherwise treat as a SINGLE product — this avoids accidentally
// shattering names like "حامل تجفيف الاطباق - الحجم الكبير" on the
// internal " - ".
//
// Pipe `|` is also accepted as an explicit multi-product separator in
// either format.
function splitProducts(productField){
  const raw = String(productField || '').trim();
  if (!raw) return [];
  // Split detection — find positions where a SEPARATOR (-, –, —, |) is
  // immediately followed by a QTY MARKER (1X, *2, ×3 …). This decouples
  // detection from "leading qty" because shipping.html's upload pipeline
  // strips the FIRST "1X" from Remarks before storing → DB rows look
  // like "ProductA (xx-yy) - 1X ProductB (xx-yy)" with NO leading qty.
  // Old code treated those as single-product (because the string didn't
  // start with a digit), which silently lost the first product.
  //
  // Supported qty notations:
  //   1X / 2X / 3X            (J&T standard)
  //   ×3                      (multiplication sign)
  //   *1 / *2 / *3            (user's other convention)
  //
  // Pipe `|` is also a generic multi-product separator on its own.
  const splitRe = /\s*[-–—]\s*(?=(?:\d+\s*[xX×]|\*\s*\d+))|\s*\|\s*/g;
  let parts = raw.split(splitRe).map(s => s.trim()).filter(Boolean);
  if (parts.length === 0) parts = [raw];
  return parts.map(part => {
    let qty = 1;
    let cleanName = part;
    // Leading qty: "1X ", "2X ", "3 × ", or "*1 ", "*2 ", "*3 "
    const leadStarM = cleanName.match(/^\*\s*(\d+)\s+/);
    if (leadStarM) {
      qty = parseInt(leadStarM[1], 10) || 1;
      cleanName = cleanName.slice(leadStarM[0].length);
    } else {
      const leadXM = cleanName.match(/^(\d+)\s*[xX×]\s+/);
      if (leadXM) {
        qty = parseInt(leadXM[1], 10) || 1;
        cleanName = cleanName.slice(leadXM[0].length);
      }
    }
    // Trailing qty: " x1", " × 3", " *2"
    const trailStarM = cleanName.match(/\s*\*\s*(\d+)\s*$/);
    if (trailStarM) {
      qty = parseInt(trailStarM[1], 10) || qty;
      cleanName = cleanName.slice(0, trailStarM.index);
    } else {
      const trailXM = cleanName.match(/\s*[xX×]\s*(\d+)\s*$/);
      if (trailXM) {
        qty = parseInt(trailXM[1], 10) || qty;
        cleanName = cleanName.slice(0, trailXM.index);
      }
    }
    // Extract (prefix-mkt) marker — first one in the segment.
    let prefix = '';
    const prefM = cleanName.match(/\(\s*([a-z0-9]{1,4})-([a-z0-9]{1,4})\s*\)/i);
    if (prefM) prefix = (prefM[1] + '-' + prefM[2]).toLowerCase();
    // Drop trailing dash FIRST, then the "(prefix-mkt)" marker. Order
    // matters: J&T appends "-" after the prefix on the last segment of
    // multi-product orders ("...(3n-ya)-"). Stripping prefix first leaves
    // the dash and our $ anchor never matches "(...) " with no dash.
    cleanName = cleanName
      .replace(/\s*[-–—]+\s*$/, '')
      .replace(/\s*\([a-z0-9]{1,4}-[a-z0-9]{1,4}\)\s*$/i, '')
      .trim();
    if (!cleanName) return null;
    return { name: cleanName, qty, prefix, key: nKey(cleanName) };
  }).filter(Boolean);
}

// ── Self-tests for splitProducts (run automatically on page load) ────
// Validates piece counting against real cases pulled from the Gohar
// April 2026 settlement file. Logs PASS/FAIL to console so the user can
// open DevTools → Console and verify splitting is correct BEFORE relying
// on the profit numbers. Each test specifies expected [name, qty] pairs.
function _runSplitTests(){
  const tests = [
    // Format: { in: "order text", expected: [[name, qty], ...] }
    // Single-product, leading qty marker:
    { in: "1X العلاقات الخطرة (sh-gm)-",
      expected: [["العلاقات الخطرة", 1]] },
    // Single-product, trailing qty marker:
    { in: "كرة قفز ألباندا (at-gm) x1",
      expected: [["كرة قفز ألباندا", 1]] },
    // Single-product, qty=2:
    { in: "جهاز قياس ضغط الدم على المعصم (ga-gm) x2",
      expected: [["جهاز قياس ضغط الدم على المعصم", 2]] },
    // Multi-product, qty=1 each:
    { in: "1X باور بانك متعدد الاستخدامات (3n-ya)-  1X مصباح مكتبي مع تكيف خفيف (3n-ya)-",
      expected: [["باور بانك متعدد الاستخدامات", 1], ["مصباح مكتبي مع تكيف خفيف", 1]] },
    // Multi-product mixed languages:
    { in: "1X Keyboard with Magnetic Stand-  1X مقوي جهاز الواي فاي-",
      expected: [["Keyboard with Magnetic Stand", 1], ["مقوي جهاز الواي فاي", 1]] },
    // Multi-product, mixed qty (2 of A, 1 of B):
    { in: "2X كتاب باور-  1X بازل-",
      expected: [["كتاب باور", 2], ["بازل", 1]] },
    // EDGE: single-product with internal " - " — must NOT be split:
    { in: "حامل تجفيف الاطباق - الحجم الكبير (ol-gm) x1",
      expected: [["حامل تجفيف الاطباق - الحجم الكبير", 1]] },
    // EDGE: multi-format leading "1X" but only one product (no trailing 1X):
    { in: "1X طائرة هولي فان-",
      expected: [["طائرة هولي فان", 1]] },
    // EDGE: multi-product, 3 items:
    { in: "1X كتاب أ-  1X كتاب ب-  1X كتاب ج-",
      expected: [["كتاب أ", 1], ["كتاب ب", 1], ["كتاب ج", 1]] },
    // CRITICAL: shipping.html upload pipeline strips the FIRST "1X" so
    // the DB row looks like this. Both products MUST count.
    { in: "بروجيكتور عدسات الفضاء (3n-ya) - 1X باور بانك متعدد الاستخدامات (3n-ya)",
      expected: [["بروجيكتور عدسات الفضاء", 1], ["باور بانك متعدد الاستخدامات", 1]] },
    // Asterisk qty notation:
    { in: "*1 منتج أ - *2 منتج ب",
      expected: [["منتج أ", 1], ["منتج ب", 2]] },
    // Asterisk-only single product:
    { in: "*3 لعبة كرة (at-gm)",
      expected: [["لعبة كرة", 3]] },
    // CRITICAL: multi-product with DIFFERENT qty per product (uploaded raw,
    // pipe-separated). Both qty markers must be respected.
    { in: "2X بروجيكتور عدسات الفضاء (3n-ya) | 3X باور بانك متعدد الاستخدامات (3n-ya)",
      expected: [["بروجيكتور عدسات الفضاء", 2], ["باور بانك متعدد الاستخدامات", 3]] },
    // Same with dash separator:
    { in: "2X بروجيكتور عدسات الفضاء (3n-ya) - 3X باور بانك متعدد الاستخدامات (3n-ya)",
      expected: [["بروجيكتور عدسات الفضاء", 2], ["باور بانك متعدد الاستخدامات", 3]] },
  ];
  let passed = 0, failed = 0;
  const failures = [];
  tests.forEach((t, i) => {
    const got = splitProducts(t.in);
    const gotPairs = got.map(g => [g.name, g.qty]);
    const ok = JSON.stringify(gotPairs) === JSON.stringify(t.expected);
    if (ok) passed++;
    else {
      failed++;
      failures.push({ idx: i + 1, in: t.in, expected: t.expected, got: gotPairs });
    }
  });
  if (failed === 0) {
    console.log('%c[profit] splitProducts self-tests: ' + passed + '/' + tests.length + ' PASSED ✅',
                'color:#0E8345;font-weight:bold;');
  } else {
    console.error('[profit] splitProducts self-tests: ' + failed + '/' + tests.length + ' FAILED ❌');
    failures.forEach(f => {
      console.error('  Test #' + f.idx + ':', f.in);
      console.error('    Expected:', JSON.stringify(f.expected));
      console.error('    Got:     ', JSON.stringify(f.got));
    });
  }
  return { passed, failed, total: tests.length };
}
// Expose so user can re-run in console: window.testProfitSplit()
window.testProfitSplit = _runSplitTests;
// Run once on page load

// ── Carrier-sheet parsers (copied 1:1 from shipping.html) ───────────
// Lets the user upload an xlsx export from any configured shipping
// company (J&T, QP, Bosta, Zomeza, Wesell, or any custom-mapped one)
// and compute profit on the parsed rows directly — no DB write needed.
// The parsers produce rows in the SHIPPING-FORMAT shape ({prod, st, cod,
// fees, net, date, source}); a small adapter at the bottom converts
// them to the API shape ({product, status, ...}) so aggregateByProduct
// can consume them unchanged.
var SHIP_DEL = 'DELIVERED', SHIP_RET = 'RETURNED', SHIP_CONF = 'CONFIRMED', SHIP_CANC = 'CANCELED';
var SHIP_COL = {
  WESELL_EMP1: 'القائم علي التاكيد', WESELL_EMP2: 'القائم على التاكيد',
  ZOM_STATUS:  'حالة الأوردر', ZOM_PROD: 'اسم المنتج', ZOM_CITY: 'المدينة',
  ZOM_DATE:    'تاريخ الإنشاء', ZOM_EMP: 'موظف التأكيد',
  WES_STATUS:  'الحالة', WES_PROD: 'اسم المنتج', WES_CITY: 'المدينة',
  WES_DATE:    'تاريخ الطلب', WES_ORDER: 'رقم الطلب',
  WES_CONF1: 'تم الإنشاء', WES_CONF2: 'تم التسليم',
  WES_CONF3: 'الإرجاع قيد المعالجة', WES_CONF4: 'تم الإرسال',
  WES_CANC1: 'ملغي من قبل العميل', WES_CANC2: 'ملغي من قبل الموظف'
};
var WES_CONF_SET = {}; WES_CONF_SET[SHIP_COL.WES_CONF1] = 1; WES_CONF_SET[SHIP_COL.WES_CONF2] = 1;
WES_CONF_SET[SHIP_COL.WES_CONF3] = 1; WES_CONF_SET[SHIP_COL.WES_CONF4] = 1; WES_CONF_SET['جاهز للتعبئة'] = 1;
var WES_CANC_SET = {}; WES_CANC_SET[SHIP_COL.WES_CANC1] = 1; WES_CANC_SET[SHIP_COL.WES_CANC2] = 1;
var ZOM_CONF_SET = {Confirmed:1,'Under processing':1,processing:1,'In shipping':1,Delivered:1,Failed:1};
function shipStripQty(s){ return String(s||'').replace(/\s*[xX×]\s*\d+\s*$/u, '').trim(); }
function shipCleanRemarks(s){ return shipStripQty(String(s||'').replace(/^\d+\s*[Xx]\s+/, '').replace(/\s*-+\s*$/, '').trim()); }
function shipCleanZomProd(s){ return shipStripQty(String(s||'').replace(/\s*-+\s*$/, '').replace(/^\d+\s*[xX]\s*/, '').trim()); }
function shipParseDate(val){
  if (!val) return null;
  if (val instanceof Date) { return isNaN(val.getTime()) ? null : new Date(val.getFullYear(), val.getMonth(), val.getDate()); }
  if (typeof val === 'number') {
    var d = new Date(Math.round((val - 25569) * 86400 * 1000));
    return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
  }
  var s = String(val).trim();
  var iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return new Date(+iso[1], +iso[2]-1, +iso[3]);
  var m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (m) {
    var y = +m[3]; if (y < 100) y += 2000;
    return new Date(y, +m[2]-1, +m[1]);
  }
  return null;
}
function detectCarrier(row){
  var keys = Object.keys(row).map(function(k){ return String(k).toLowerCase().trim(); });
  if (keys.indexOf(SHIP_COL.WESELL_EMP1.toLowerCase())>=0 || keys.indexOf(SHIP_COL.WESELL_EMP2.toLowerCase())>=0) return 'wesell';
  if (keys.indexOf(SHIP_COL.ZOM_STATUS.toLowerCase())>=0) return 'zomeza';
  if (keys.indexOf('waybill status')>=0) return 'jt';
  if (keys.indexOf('shipment contents')>=0 || keys.indexOf('full name')>=0
      || (keys.indexOf('serial')>=0 && keys.indexOf('city')>=0 && keys.indexOf('status')>=0)) return 'qp';
  return 'bosta';
}
function parseJTRow(row){
  var st = String(row['Waybill status']||'').trim();
  var isDel = st === 'Signed', isRet = (st === 'Returned' || st === 'Returning');
  var billable = isDel || isRet;
  // IMPORTANT: pass the RAW Remarks (not shipCleanRemarks) so splitProducts
  // can see the leading qty marker for multi-product orders. The legacy
  // cleaner stripped the FIRST "1X / 2X / 3X" which silently lost the
  // qty for the first product when the order had multiple products. Now
  // splitProducts handles trimming, qty extraction, prefix stripping
  // for each segment uniformly.
  var prod = String(row['Remarks']||'').trim() || '--';
  var rawFee = parseFloat(row['Reference delivery fees']||0);
  var cod    = parseFloat(row['COD amount']||0);
  var feesActual = billable ? rawFee : 0;
  // Set `net` to the gross COD amount — same shape shipping.html stores
  // in /orders.php. Revenue (COD − fees) is computed downstream in
  // aggregateByProduct so BOTH paths (uploaded sheet + DB rows from
  // Shipping Analytics) deduct fees uniformly. Earlier fix did the
  // subtraction here, which double-deducted when paired with the
  // aggregator's deduction; keeping `net = COD` is the consistent shape.
  return { prod:prod, city:String(row['Receiving province']||'').trim(),
           st: isDel?SHIP_DEL : isRet?SHIP_RET : st.toUpperCase(),
           cod: cod, fees: feesActual,
           net: cod, date: shipParseDate(row['collection time']),
           source: 'J&T' };
}
function parseQPRow(row){
  var st = String(row['status']||'').trim();
  var isDel = st === 'Delivered', isRet = st === 'Undelivered';
  var billable = isDel || isRet;
  var rawFee = parseFloat(row['total fees']||row['Total Fees']||0);
  return { prod: String(row['shipment contents']||row['Shipment Contents']||'').trim() || '--',
           city: String(row['city']||row['City']||'').trim(),
           st: isDel?SHIP_DEL : isRet?SHIP_RET : st.toUpperCase(),
           cod: parseFloat(row['total amount']||row['Total Amount']||0),
           fees: billable?rawFee:0, net: parseFloat(row['COD']||0),
           date: shipParseDate(row['order date']||row['Order Date']),
           source: 'QP' };
}
function parseBostaRow(row){
  var bFee = parseFloat(row['Total Fees']||row['TotalFees']||0);
  var fields = ['Package Description','PackageDescription','Product Name','ProductName','Product','product'];
  var prod = '--';
  for (var i = 0; i < fields.length; i++){ var v = String(row[fields[i]]||'').trim(); if (v) { prod = v; break; } }
  return { prod:prod, city: (row['Dropoff City']||row['DropoffCity']||'').trim(),
           st: (row['Order Status']||row['OrderStatus']||'').trim().toUpperCase(),
           cod: parseFloat(row['COD']||0), fees: bFee,
           net: parseFloat(row['Net Value']||row['NetValue']||0),
           date: shipParseDate(row['Completed At']), source: 'Bosta' };
}
function parseZomezaRow(row){
  var st = String(row[SHIP_COL.ZOM_STATUS]||'').trim();
  var isConf = !!ZOM_CONF_SET[st], isCanc = st === 'Canceled';
  var prod = shipCleanZomProd(row[SHIP_COL.ZOM_PROD]) || '--';
  return { prod:prod, city: String(row[SHIP_COL.ZOM_CITY]||'').trim(),
           st: isConf?SHIP_CONF : isCanc?SHIP_CANC : st.toUpperCase(),
           cod:0, fees:0, net:0, date: shipParseDate(row[SHIP_COL.ZOM_DATE]),
           employee: String(row[SHIP_COL.ZOM_EMP]||'').trim() || '--', source: 'Zomeza' };
}
function parseWesellRow(row){
  var st = String(row[SHIP_COL.WES_STATUS]||'').trim();
  if (!st) return null;
  var isConf = !!WES_CONF_SET[st], isCanc = !!WES_CANC_SET[st];
  return { prod: String(row[SHIP_COL.WES_PROD]||'').trim() || '--',
           city: String(row[SHIP_COL.WES_CITY]||'').trim(),
           st: isConf?SHIP_CONF : isCanc?SHIP_CANC : st.toUpperCase(),
           cod:0, fees:0, net:0, date: shipParseDate(row[SHIP_COL.WES_DATE]),
           employee: String(row[SHIP_COL.WESELL_EMP1]||row[SHIP_COL.WESELL_EMP2]||'').trim() || '--',
           orderId: String(row[SHIP_COL.WES_ORDER]||'').trim(), source: 'Wesell' };
}
// Generic confirmation parser — uses a saved column_map (from a connector
// in Settings → Connectors → Confirmation systems) to read any sheet.
function parseConfirmationGenericRow(row, map){
  if (!map || !map.product || !map.status) return null;
  var st = String(row[map.status]||'').trim();
  if (!st) return null;
  var toSet = function(csv){ var s = {}; String(csv||'').split(',').forEach(function(v){ var t = v.trim(); if (t) s[t] = 1; }); return s; };
  var confSet = toSet(map.confirmed_values);
  var cancSet = toSet(map.canceled_values);
  var isConf = !!confSet[st], isCanc = !!cancSet[st];
  if (!isConf && !isCanc) return null;
  var prod = shipCleanZomProd(String(row[map.product]||'').trim()) || '--';
  return { prod:prod, city: map.city ? String(row[map.city]||'').trim() : '',
           st: isConf?SHIP_CONF : SHIP_CANC,
           cod:0, fees:0, net:0,
           date: map.date ? shipParseDate(row[map.date]) : null,
           employee: map.employee ? (String(row[map.employee]||'').trim() || '--') : '--',
           source: 'Confirmation' };
}
function pickConfirmationMap(sampleRow, connectors){
  if (!sampleRow || !connectors || !connectors.length) return null;
  var keys = Object.keys(sampleRow);
  for (var i = 0; i < connectors.length; i++){
    var c = connectors[i];
    var meta = c && c.meta;
    if (typeof meta === 'string') { try { meta = JSON.parse(meta); } catch(e) { meta = null; } }
    var map = meta && meta.column_map;
    if (!map || !map.product || !map.status) continue;
    if (keys.indexOf(map.product) >= 0 && keys.indexOf(map.status) >= 0) return { connector: c, map: map };
  }
  return null;
}

// ── Brand attribution from SKU prefix ────────────────────────────────
// Builds a Map<prefix, brand_id> from each brand's meta.sku_prefixes.
// Used to assign uploaded sheet rows to the correct brand based on the
// "(prefix-mkt)" marker in the product name. NULL when prefix unknown.
let _prefixToBrandPromise = null;
function loadPrefixToBrand(){
  if (_prefixToBrandPromise) return _prefixToBrandPromise;
  _prefixToBrandPromise = (async function(){
    const map = new Map();
    try {
      const brands = window.getAllBrandsAsync ? (await window.getAllBrandsAsync()) : [];
      brands.forEach(b => {
        const pre = (b && b.meta && Array.isArray(b.meta.sku_prefixes)) ? b.meta.sku_prefixes : [];
        pre.forEach(p => {
          const k = String(p||'').trim().toLowerCase();
          if (k) map.set(k, { id: b.id, name: b.name });
        });
      });
    } catch (e) { console.warn('[profit] loadPrefixToBrand failed:', e.message); }
    return map;
  })();
  return _prefixToBrandPromise;
}

// Convert a parsed shipping-format row (from parseJT/QP/.../parseConfirmationGenericRow)
// to the API shape that aggregateByProduct expects. The shapes diverged
// slightly: shipping uses { prod, st, ... } while orders.php returns
// { product, status, ... }. Date is also formatted YYYY-MM-DD.
function shipRowToApiRow(r){
  let dateStr = null;
  if (r.date instanceof Date && !isNaN(r.date.getTime())) {
    dateStr = r.date.getFullYear() + '-'
      + String(r.date.getMonth() + 1).padStart(2, '0') + '-'
      + String(r.date.getDate()).padStart(2, '0');
  }
  return {
    product: r.prod || '',
    city: r.city || '',
    status: r.st || '',
    cod: r.cod || 0,
    fees: r.fees || 0,
    net: r.net || 0,
    date: dateStr,
    source: r.source || '',
    employee: r.employee || null,
    order_id: r.orderId || null,
    raw: null
  };
}

// ── Upload state ─────────────────────────────────────────────────────
// uploadedFiles[]: { name, carrier, rowCount, brandCounts: Map<brandId, count>, apiRows: [] }
// Aggregating apiRows from all uploads gives us the orders set we feed
// to computeProfitForBrand instead of /api/orders.php.
let uploadedFiles = [];
function rowsForBrandFromUploads(brandId){
  // Collect all api-shape rows from every uploaded file that match the
  // brand_id (resolved from the (prefix-mkt) marker per row at parse time).
  const out = [];
  uploadedFiles.forEach(f => {
    f.apiRows.forEach(row => {
      if (row.__brand_id === brandId) out.push(row);
    });
  });
  return out;
}

async function handleFiles(files){
  if (!files || !files.length) return;
  if (typeof XLSX === 'undefined') { showErr('SheetJS مش محمل — حدث الصفحة وحاول تاني.'); return; }
  // Load brand prefix map + confirmation connectors once for this batch.
  const [prefixMap, confConnsResp] = await Promise.all([
    loadPrefixToBrand(),
    api('/connectors.php?type=confirmation').catch(() => ({ rows: [] })),
  ]);
  const confConnectors = (confConnsResp && confConnsResp.rows) || [];
  for (const file of files) {
    try {
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rawData = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });
      if (!rawData.length) continue;
      // Carrier detection — first try saved confirmation column_map (custom
      // connectors from Settings), fall back to hardcoded carrier sniffer.
      const confPick = pickConfirmationMap(rawData[0], confConnectors);
      let carrier, parseFn;
      if (confPick) {
        const map = confPick.map;
        parseFn = function(r){ return parseConfirmationGenericRow(r, map); };
        carrier = (confPick.connector && confPick.connector.name) || 'Confirmation';
      } else {
        const c = detectCarrier(rawData[0]);
        carrier = c === 'qp' ? 'QP' : c === 'jt' ? 'J&T' : c === 'zomeza' ? 'Zomeza' : c === 'wesell' ? 'Wesell' : 'Bosta';
        parseFn = c === 'qp' ? parseQPRow : c === 'jt' ? parseJTRow : c === 'zomeza' ? parseZomezaRow : c === 'wesell' ? parseWesellRow : parseBostaRow;
      }
      const parsed = rawData.map(r => parseFn(r)).filter(Boolean);
      // Wesell dedupe by orderId — same as shipping.html upload
      let cleaned = parsed;
      if (carrier === 'Wesell') {
        const seen = {};
        cleaned = parsed.filter(r => { if (!r.orderId) return true; if (seen[r.orderId]) return false; seen[r.orderId] = true; return true; });
      }
      // Convert + brand-tag every row using the (prefix-mkt) marker
      const brandCounts = new Map();
      const apiRows = cleaned.map(r => {
        const apiRow = shipRowToApiRow(r);
        // Extract prefix → brand id
        const m = String(r.prod || '').match(/\(\s*([a-z0-9]{1,4})-([a-z0-9]{1,4})\s*\)/i);
        const prefix = m ? m[1].toLowerCase() : '';
        const brand = prefix ? prefixMap.get(prefix) : null;
        apiRow.__brand_id = brand ? brand.id : null;
        if (brand) brandCounts.set(brand.id, (brandCounts.get(brand.id) || 0) + 1);
        return apiRow;
      });
      uploadedFiles.push({
        name: file.name, carrier, rowCount: apiRows.length, brandCounts, apiRows
      });
    } catch (e) {
      console.error('[profit] failed to parse', file.name, e);
      showErr('فشل قراءة "' + file.name + '": ' + e.message);
    }
  }
  renderUploads();
}

function renderUploads(){
  const wrap = $('uploadsBar');
  const list = $('uploadsList');
  const count = $('uploadCount');
  const carriersHost = $('uploadCarriers');
  const clearBtn = $('clearUploadsBtn');
  const uploadBtnLabel = $('uploadBtnLabel');
  if (carriersHost) carriersHost.innerHTML = '';
  if (clearBtn) clearBtn.style.display = 'none';
  if (uploadBtnLabel) uploadBtnLabel.textContent = '📂 رفع شيتات';
  if (!uploadedFiles.length) {
    if (wrap) wrap.style.display = 'none';
    return;
  }
  if (wrap) wrap.style.display = '';
  if (count) count.textContent = uploadedFiles.length;
  // Show DISTINCT carriers next to the H1 — pretty pills, J&T-style.
  if (carriersHost) {
    const seen = new Set();
    const pills = [];
    uploadedFiles.forEach(f => {
      if (seen.has(f.carrier)) return;
      seen.add(f.carrier);
      pills.push('<span style="background:#1A1A1A;color:#FFFFFF;padding:3px 12px;border-radius:99px;font-size:12px;font-weight:700;letter-spacing:0.02em;">' + escapeHtml(f.carrier) + '</span>');
    });
    carriersHost.innerHTML = pills.join('');
  }
  if (clearBtn) clearBtn.style.display = '';
  if (uploadBtnLabel) uploadBtnLabel.textContent = '📂 ' + uploadedFiles.length + ' شيت مرفوع';
  if (list) list.innerHTML = '';
}

// ── Exchange / Refund note detection ────────────────────────────────
// Some "orders" in the shipping data are actually OPERATIONAL NOTES
// for the carrier — not real product orders. Examples:
//   "طرد مقابل طرد هنستلم منه طائره هولي فان ونسلمه طائره هولي فان"
//     → exchange (parcel-for-parcel) — keep count, don't COGS-charge
//   "استرجاع هنستلم منه جهاز التنظيف بالبخار وتحويل 1400"
//     → refund pickup — keep count, don't COGS-charge
//
// These rows skew product analytics (no real product moved, no revenue
// to attribute), so we EXCLUDE them from per-product aggregation but
// still report their counts in the brand summary card so the user
// can see them at a glance.
function isExchangeNote(productText){
  const s = String(productText || '');
  return /طرد\s*مقابل\s*طرد/.test(s) || /استبدال/.test(s);
}
function isRefundNote(productText){
  const s = String(productText || '');
  // "استرجاع" but NOT inside "استبدال". Also "هنستلم منه ... وتحويل" (refund + cash transfer).
  if (/استبدال/.test(s)) return false;
  return /استرجاع/.test(s) || (/هنستلم\s*منه/.test(s) && /وتحويل/.test(s));
}
// Follow-up delivery notes — carrier instructions like:
//   "توصيل سقف منظم دولاب"
//   "1X توصيل تلات أفلام بروجيكتور النجوم"
//   "توصيل جهاز التنظيف بالبخار / باقي اوردر"
//   "توصيل حامل رفع الأثقال"
//   "توصيل عوامة سباحه للاطفال"
// These are deliveries of a remainder/accessory of a previously-paid
// order — not new product orders. Excluded from the table and from
// COGS/revenue/overhead.
//
// IMPORTANT: don't use \b after "توصيل" — JavaScript regex \b only
// recognizes ASCII word chars [A-Za-z0-9_], so it never matches the
// boundary between Arabic letters and whitespace. Use whitespace /
// end-of-string / common separator anchors instead. The earlier \b
// version was silently broken for Arabic input.
function isDeliveryNote(productText){
  const s = String(productText || '').trim();
  return /^(\d+\s*[xX×]\s+)?توصيل(\s|$|\/|-)/.test(s);
}

// ── Status normalization ─────────────────────────────────────────────
// Verified from raw data: مسلم كيو بي has 3472 rows with "تم التوريد" AND
// 54 rows with "delivered" (English lowercase). Both must count as DELIVERED.
const DELIVERED_SET = new Set(['delivered','تم التوريد','signed']);
const RETURNED_SET  = new Set(['returned','المرتجعة','undelivered','returning']);
function normalizeStatus(raw){
  return String(raw || '').trim().toLowerCase();
}
function isDelivered(raw){
  const s = normalizeStatus(raw);
  return DELIVERED_SET.has(s) || s === 'delivered'.toLowerCase();
}
function isReturned(raw){
  const s = normalizeStatus(raw);
  return RETURNED_SET.has(s);
}

// ── Per-product aggregation ──────────────────────────────────────────
// Returns Map<productKey, {name, prefix, deliveredPieces, returnedPieces,
//   deliveredOrders, returnedOrders, deliveredNet, returnedFees}>.
//
// PIECE COUNTING — the foundation of COGS. Each order's `product` field
// gets parsed by splitProducts() into items[] with their actual quantities:
//   "جهاز ضغط (ga-gm) x2"            → 1 item  qty=2
//   "1X باور (3n-ya)- 1X مصباح-"     → 2 items qty=1 each
//   "2X كتاب- 1X بازل-"              → 2 items qty=2 + qty=1
// For each delivered order, the EXACT qty per product is added to that
// product's deliveredPieces. COGS later = unit_cost × deliveredPieces.
// So a 2-piece order of one product → that product gets +2 (not +1).
// A multi-product order with 1 each → each product gets +1 (not +0.5).
// This matches the accountant's manual 32-column matrix exactly.
//
// Net + fees are split PROPORTIONALLY across products by piece share so
// totals don't double-count. Single-product orders → 100% to that product.
function aggregateByProduct(rows){
  const out = new Map();
  let dbgDel = 0, dbgRet = 0, dbgRowsParsed = 0, dbgRowsSkipped = 0;
  let exchangeCount = 0, refundCount = 0;
  // Track orders with >1 piece OR >1 product so the user can verify
  // multi-piece detection. Logged at the end with up to 10 examples.
  const multiPieceExamples = [];
  const multiProductExamples = [];
  let totalMultiPiece = 0, totalMultiProduct = 0;
  rows.forEach(r => {
    // Filter out operational notes (exchanges + refund pickups). They
    // get counted into separate buckets and excluded from product-level
    // COGS / revenue / overhead — they aren't real product flow.
    if (isExchangeNote(r.product)) {
      const isDelN = isDelivered(r.status);
      const isRetN = isReturned(r.status);
      if (isDelN || isRetN) exchangeCount++;
      dbgRowsSkipped++;
      return;
    }
    if (isRefundNote(r.product)) {
      const isDelN = isDelivered(r.status);
      const isRetN = isReturned(r.status);
      if (isDelN || isRetN) refundCount++;
      dbgRowsSkipped++;
      return;
    }
    // Follow-up delivery notes (e.g. "توصيل ...") — silently exclude
    // from the products table per user request. Not counted as exchanges
    // or refunds, just dropped.
    if (isDeliveryNote(r.product)) {
      dbgRowsSkipped++;
      return;
    }
    const items = splitProducts(r.product || '');
    if (!items.length) { dbgRowsSkipped++; return; }
    const isDel = isDelivered(r.status);
    const isRet = isReturned(r.status);
    // First pass: ALWAYS count this row toward "total orders" per product
    // (even if it's IN TRANSIT / DELIVERING / PICKED-UP). The user wants
    // overhead computed on the FULL order count, not just the resolved
    // delivered+returned. The prefix gate above already ensured the row
    // belongs to this brand, so any status that survives is real.
    const totalPiecesPre = items.reduce((s, it) => s + it.qty, 0) || 1;
    items.forEach(it => {
      let slot = out.get(it.key);
      if (!slot) {
        slot = {
          name: it.name, prefix: it.prefix,
          deliveredPieces: 0, returnedPieces: 0,
          deliveredOrders: 0, returnedOrders: 0,
          deliveredNet: 0, returnedFees: 0,
          totalOrders: 0  // any status — used by overhead calc
        };
        out.set(it.key, slot);
      }
      slot.totalOrders += it.qty / totalPiecesPre;
    });
    if (!isDel && !isRet) { dbgRowsSkipped++; return; }
    dbgRowsParsed++;
    // Diagnostic: find orders where total pieces > 1 (either qty > 1 on
    // any single item, OR multiple items in one order).
    const orderTotalPieces = items.reduce((s, it) => s + it.qty, 0);
    if (orderTotalPieces > 1) {
      totalMultiPiece++;
      if (multiPieceExamples.length < 10) {
        multiPieceExamples.push({
          status: r.status, raw: r.product,
          parsed: items.map(i => i.name + ' ×' + i.qty),
          totalPieces: orderTotalPieces
        });
      }
    }
    if (items.length > 1) {
      totalMultiProduct++;
      if (multiProductExamples.length < 10) {
        multiProductExamples.push({
          status: r.status, raw: r.product,
          parsed: items.map(i => i.name + ' ×' + i.qty)
        });
      }
    }
    const totalPieces = items.reduce((s, it) => s + it.qty, 0) || 1;
    items.forEach(it => {
      let slot = out.get(it.key);
      if (!slot) {
        slot = {
          name: it.name, prefix: it.prefix,
          deliveredPieces: 0, returnedPieces: 0,
          deliveredOrders: 0, returnedOrders: 0,
          deliveredNet: 0, returnedFees: 0,
          totalOrders: 0
        };
        out.set(it.key, slot);
      }
      const share = it.qty / totalPieces;
      if (isDel) {
        slot.deliveredPieces += it.qty;       // EXACT qty, not share
        slot.deliveredOrders += share;
        // Revenue per delivered row = NET money credited to the merchant.
        // Carrier-aware: J&T stores `net` as the gross COD (the carrier
        // deducts the shipping fee separately), so we subtract `fees`
        // here. QP/Bosta store `net` as already post-fee, so use as-is.
        // Without this, J&T orders show inflated revenue (COD instead of
        // COD − delivery fees), which the user verified manually:
        // 5 × باور بانك at COD 2099 = 10,495 gross → 10,202.8 net.
        const grossNet = parseFloat(r.net) || 0;
        const fee      = parseFloat(r.fees) || 0;
        const src = String(r.source || '').toLowerCase();
        const isJT = src === 'j&t' || src === 'jt' || src.indexOf('j&t') !== -1 || src.indexOf('jt') === 0;
        const actualNet = isJT ? Math.max(0, grossNet - fee) : grossNet;
        slot.deliveredNet    += actualNet * share;
        dbgDel += it.qty;
      } else if (isRet) {
        slot.returnedPieces += it.qty;        // EXACT qty, not share
        slot.returnedOrders += share;
        slot.returnedFees   += (parseFloat(r.fees) || 0) * share;
        dbgRet += it.qty;
      }
    });
  });
  console.log('[profit] aggregated', rows.length, 'orders →',
              dbgRowsParsed, 'used,', dbgRowsSkipped, 'skipped |',
              'delivered pieces=', dbgDel, '· returned pieces=', dbgRet,
              '· unique products=', out.size,
              '· exchanges=', exchangeCount, '· refunds=', refundCount);
  console.log('[profit] MULTI-PIECE diagnostic:',
              'orders with >1 total pieces =', totalMultiPiece,
              '(of', dbgRowsParsed, 'product orders)',
              '· multi-product orders =', totalMultiProduct);
  if (multiPieceExamples.length) {
    console.log('[profit] First multi-piece examples:');
    multiPieceExamples.forEach((ex, i) => {
      console.log('  #' + (i+1) + ' [' + ex.status + '] ' + ex.totalPieces + 'pcs · raw="' + ex.raw + '" → ' + JSON.stringify(ex.parsed));
    });
  } else if (dbgRowsParsed > 0) {
    console.log('[profit] ⚠ NO multi-piece orders detected. Either every order is genuinely 1 piece, or splitProducts() is missing a format. Check sample r.product values:',
                rows.slice(0, 5).map(r => r.product));
  }
  // Stash the auto-detected counts on the map itself so the caller can
  // pass them to the brand card without changing the function signature.
  out.__exchangeCount = exchangeCount;
  out.__refundCount = refundCount;
  return out;
}

// ── FM sheet header detection (mirrors automation-fm-update.html) ─────
// Returns { headerRow, colName, colCogs, colOverhead } or null.
function detectFMLayout(rows){
  const max = Math.min(30, rows.length);
  for (let r = 0; r < max; r++){
    const row = rows[r] || [];
    let colReturn = -1, coltROAS = -1, colName = -1, colCogs = -1, colOverhead = -1;
    for (let c = 0; c < row.length; c++){
      const cell = String(row[c] || '').trim();
      if (cell === '') continue;
      if (colReturn < 0 && /return\s*%/i.test(cell) && /from\s*total/i.test(cell)) colReturn = c;
      else if (colReturn < 0 && /^return\s*%$/i.test(cell)) colReturn = c;
      if (coltROAS < 0 && /^t?roas$/i.test(cell)) coltROAS = c;
      if (colCogs < 0 && (/\bCOGS\b/i.test(cell) || /unit\s*cost/i.test(cell) || /تكلفة\s*المنتج/i.test(cell) || /^cost$/i.test(cell))) colCogs = c;
      // Tolerant overhead detection — anything containing "overhead" as a
      // standalone word (case-insensitive), with or without "cost" / spaces.
      // Catches: "OVERHEAD", "Overhead Cost", "OVERHEADCOST", "Overhead /Order",
      // "Overhead Per Order", "مصاريف نثرية".
      if (colOverhead < 0 && (/\boverhead/i.test(cell) || /overhead/i.test(cell) || /مصاريف\s*نثرية/i.test(cell))) colOverhead = c;
      if (colName < 0 && (/المنتج|product|name/i.test(cell))) colName = c;
    }
    // Need either an anchor (Return%/tROAS) OR a name+cost combo to lock on a row.
    const hasAnchor = colReturn >= 0 && coltROAS >= 0;
    const hasCostCombo = colName >= 0 && (colCogs >= 0 || colOverhead >= 0);
    if (hasAnchor || hasCostCombo) {
      if (colName < 0) colName = 0;
      return { headerRow: r, colName, colCogs, colOverhead };
    }
  }
  return null;
}

// ── Pull COGS + OVERHEADCOST from each brand's FM sheet ──────────────
// Returns Map<nKey(productName), { cogs, overhead }>.
async function loadCostsFromFM(brand){
  const linked = (brand.meta && brand.meta.linked_sheets) || [];
  const fm = linked.find(s => /Financial Modeling.*Monetization/i.test(s.name));
  if (!fm) return { map: new Map(), reason: 'no FM sheet linked' };
  const conns = await api('/connectors.php?type=storage&provider=google_drive');
  const conn = (conns && conns.rows && conns.rows[0]) || null;
  if (!conn) return { map: new Map(), reason: 'no Drive connector' };
  let rows = [];
  try {
    const r = await api('/sheets-write.php?action=read&connector_id=' + conn.id + '&file_id=' + encodeURIComponent(fm.id));
    rows = (r && r.rows) || [];
  } catch (e) {
    return { map: new Map(), reason: 'sheet read failed: ' + e.message };
  }
  if (!rows.length) return { map: new Map(), reason: 'sheet empty' };
  const layout = detectFMLayout(rows);
  if (!layout) return { map: new Map(), reason: 'header row not found in FM sheet' };
  // Always dump the detected header row so the user can verify which
  // column maps to which detector regex.
  const headerRow = rows[layout.headerRow] || [];
  const headers = headerRow.map((c, i) => i + ':' + String(c || '').trim()).filter(h => h.split(':')[1]).join(' | ');
  console.log('[profit] FM sheet header row #' + layout.headerRow + ':', headers);
  console.log('[profit] FM sheet detected →',
              { colName: layout.colName, colCogs: layout.colCogs, colOverhead: layout.colOverhead });
  if (layout.colCogs < 0 && layout.colOverhead < 0) {
    return { map: new Map(), reason: 'COGS / OVERHEADCOST columns not found in FM sheet (check header names — must contain "COGS" / "Overhead" / "تكلفة المنتج" / "مصاريف نثرية")' };
  }
  if (layout.colOverhead < 0) {
    console.warn('[profit] FM sheet — OVERHEAD column NOT detected. Header names tried: /overhead\\s*cost/, /^overhead$/, /مصاريف\\s*نثرية/. Check the actual header in the sheet.');
  }
  if (layout.colCogs < 0) {
    console.warn('[profit] FM sheet — COGS column NOT detected. Header names tried: /\\bCOGS\\b/, /unit\\s*cost/, /تكلفة\\s*المنتج/, /^cost$/.');
  }
  // Tolerant numeric parse — strips currency symbols, commas, Arabic
  // numerals, and trailing units like "جنيه" / "EGP". Returns 0 for blanks.
  function parseMoney(v){
    if (v == null) return 0;
    if (typeof v === 'number') return v;
    let s = String(v).trim();
    if (!s) return 0;
    // Convert Arabic-Indic digits → ASCII
    s = s.replace(/[٠-٩]/g, d => String.fromCharCode(d.charCodeAt(0) - 0x0660 + 48));
    // Strip thousands commas + currency tokens + non-numeric chars (keep . - and digits)
    s = s.replace(/[,\s]/g, '').replace(/[^\d.\-]/g, '');
    const n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }
  const map = new Map();
  let nWithCogs = 0, nWithOverhead = 0;
  for (let r = layout.headerRow + 1; r < rows.length; r++) {
    const row = rows[r] || [];
    const name = String(row[layout.colName] || '').trim();
    if (!name) continue;
    const cogs     = layout.colCogs     >= 0 ? parseMoney(row[layout.colCogs])     : 0;
    const overhead = layout.colOverhead >= 0 ? parseMoney(row[layout.colOverhead]) : 0;
    if (cogs === 0 && overhead === 0) continue; // skip empty rows
    if (cogs > 0)     nWithCogs++;
    if (overhead > 0) nWithOverhead++;
    map.set(nKey(name), { name, cogs, overhead });
  }
  console.log('[profit] FM sheet loaded — layout:',
              { headerRow: layout.headerRow, colName: layout.colName,
                colCogs: layout.colCogs, colOverhead: layout.colOverhead },
              '· products with cogs=' + nWithCogs,
              '· products with overhead=' + nWithOverhead,
              '· total mapped=' + map.size);
  return { map, reason: '' };
}

// ── Meta ROAS aggregation ──
// Two-step approach to get accurate spend AND per-product allocation:
//
// 1. PER-PRODUCT (keyword matching against insights) — gives us a relative
//    distribution: which products got more campaigns/spend than others.
//    BUT this OVER-COUNTS at the brand level because one campaign can
//    match multiple keywords (e.g. "PROSPECTING | RACK | CBO" matches
//    keywords "rack" AND "cbo" if both are products).
//
// 2. ACCOUNT TOTAL (account_spend action — same as Amount Spent page) —
//    the AUTHORITATIVE brand-total spend including DELETED campaigns.
//
// Final allocation: rescale each product's keyword-matched spend so the
// SUM equals the account total. Same proportional shape, exact brand sum.
//
// Returns { perProduct: Map<keyword, {spend, revenue, roas}>, brandTotalSpend }
async function computeProductROAS(brand, from, to, keywords){
  const result = new Map();
  const cleanKeys = (keywords || [])
    .map(k => String(k || '').trim())
    .filter(k => k.length >= 2);
  cleanKeys.forEach(k => result.set(k, { spend: 0, revenue: 0, roas: 0 }));
  let brandTotalSpend = 0;
  if (!from || !to) {
    return { perProduct: result, brandTotalSpend };
  }
  const conns = await api('/connectors.php?type=ads&provider=meta').catch(() => ({ rows: [] }));
  const list = (conns && conns.rows) || [];
  if (!list.length) return { perProduct: result, brandTotalSpend };
  // EXACT mirror of amount-spent.html brand filter (3 fallbacks):
  //   set.has(a.id) || set.has(strip_prefix(a.id)) || set.has('act_' + strip_prefix(a.id))
  // Without this match all 3 forms, brands storing ids with `act_` prefix
  // wouldn't filter and we'd pull from EVERY connected account → inflated spend.
  const allowed = (brand && brand.meta && Array.isArray(brand.meta.ad_account_ids))
    ? new Set(brand.meta.ad_account_ids.map(String))
    : null;
  const accountTasks = list.map(c =>
    api('/meta.php?action=accounts&connector_id=' + c.id)
      .then(r => ({ connId: c.id, accounts: (r && r.rows) || [] }))
      .catch(() => ({ connId: c.id, accounts: [] }))
  );
  const perConn = await Promise.all(accountTasks);
  const calls = [];
  let totalAccountsSeen = 0;
  let totalAccountsKept = 0;
  perConn.forEach(({ connId, accounts }) => {
    accounts.forEach(a => {
      totalAccountsSeen++;
      // Resolve raw id from either field; build numeric (no act_) variant.
      const rawId    = String(a.id || a.account_id || '');
      const numericId = rawId.replace(/^act_/, '');
      if (!numericId) return;
      // Brand filter: try all 3 storage forms (matches amount-spent.html)
      if (allowed && allowed.size > 0) {
        const matched = allowed.has(rawId)
                     || allowed.has(numericId)
                     || allowed.has('act_' + numericId);
        if (!matched) return;
      }
      totalAccountsKept++;
      calls.push({ connId, accId: 'act_' + numericId, rawId, numericId });
    });
  });
  console.log('[profit][' + brand.name + '] ad accounts filter:',
              'seen=' + totalAccountsSeen,
              '· kept=' + totalAccountsKept,
              '· brand_allowed=' + (allowed ? Array.from(allowed).join(',') : '(no filter)'),
              '· kept_ids=' + calls.map(c => c.accId).join(','));
  if (!calls.length) {
    console.warn('[profit][' + brand.name + '] no ad accounts matched the brand filter — ads spend will be 0. Check brand.meta.ad_account_ids in Settings → Brand → Configure.');
    return { perProduct: result, brandTotalSpend };
  }

  // STEP 1: account_spend per allowed account → authoritative total.
  // Same endpoint amount-spent.html uses; includes deleted campaigns.
  const spendTasks = calls.map(({ connId, accId }) =>
    api('/meta.php?action=account_spend&connector_id=' + connId
      + '&account_id=' + encodeURIComponent(accId)
      + '&since=' + encodeURIComponent(from)
      + '&until=' + encodeURIComponent(to))
      .then(r => parseFloat(r && r.spend) || 0)
      .catch(e => { console.warn('[profit] account_spend failed for', accId, e.message); return 0; })
  );
  const spends = await Promise.all(spendTasks);
  brandTotalSpend = spends.reduce((s, v) => s + v, 0);
  console.log('[profit][' + brand.name + '] brand TOTAL spend (authoritative, all-campaigns including deleted):',
              Math.round(brandTotalSpend), 'EGP across', calls.length, 'account(s)');

  if (!cleanKeys.length || brandTotalSpend === 0) {
    return { perProduct: result, brandTotalSpend };
  }

  // STEP 2: insights per campaign → per-keyword raw spend + revenue.
  // Used ONLY to determine relative distribution between products. The
  // actual numbers get rescaled below to match the authoritative total.
  const insightTasks = calls.map(({ connId, accId }) =>
    api('/meta.php?action=insights&connector_id=' + connId + '&account_id=' + encodeURIComponent(accId) + '&since=' + from + '&until=' + to)
      .then(r => (r && r.rows) || [])
      .catch(() => [])
  );
  const allRowsArrs = await Promise.all(insightTasks);
  const lowerKeys = cleanKeys.map(k => ({ orig: k, lc: k.toLowerCase() }));
  allRowsArrs.forEach(rows => {
    rows.forEach(row => {
      const cn = String(row['Campaign name'] || row.campaignName || row.campaign_name || '').toLowerCase();
      if (!cn) return;
      const spend   = parseFloat(row['Amount spent (EGP)'] || row.spend || 0) || 0;
      const revenue = parseFloat(row['Purchases conversion value'] || row.revenue || 0) || 0;
      lowerKeys.forEach(({ orig, lc }) => {
        if (cn.indexOf(lc) === -1) return;
        const slot = result.get(orig);
        slot.spend   += spend;
        slot.revenue += revenue;
      });
    });
  });

  // Per-product spend stays RAW — exactly what was spent on campaigns
  // whose name contained that product's campaign_name keyword. No
  // rescaling, no redistribution. Per user request: "ضيف الرقم بتاع
  // الإعلانات بتاع كل منتج زي ما هو بالظبط حسب الكامبينات بتاعته،
  // والإعلانات اللي ملهاش اسم منتج مش عايزها في الجدول."
  // Brand summary still shows the authoritative brandTotalSpend
  // (account_spend, matches Amount Spent). The difference between the
  // sum of per-product and brandTotalSpend = unattributed campaigns
  // (no matching campaign_name) — kept out of the table on purpose.
  result.forEach(v => { v.roas = v.spend > 0 ? v.revenue / v.spend : 0; });
  let rawSum = 0;
  result.forEach(v => { rawSum += v.spend; });
  console.log('[profit][' + brand.name + '] per-product spend (RAW, not rescaled):',
              'sum=' + Math.round(rawSum), '· brand authoritative=' + Math.round(brandTotalSpend),
              '· unattributed=' + Math.round(brandTotalSpend - rawSum));
  return { perProduct: result, brandTotalSpend };
}

// ── Date range (same AppDatePicker pattern as amount-spent.html) ─────

// Debounced auto-refresh handle so rapid date toggles don't fire
// multiple Computes back-to-back. Same pattern as amount-spent.html.
let _autoRefreshT = null;
function scheduleAutoRefresh(){
  clearTimeout(_autoRefreshT);
  _autoRefreshT = setTimeout(() => { runReport(); }, 250);

function tryAttachDatePicker(retriesLeft) {
