  html,body{min-height:100vh;background:#F1F1F1;font-family:'Inter',system-ui,sans-serif;color:#1A1A1A;font-size:14px;}
  .app-shell{display:flex;min-height:100vh;}
  .app-sidebar{width:240px;min-width:240px;background:#EBEBEB;border-right:1px solid #DCDCDC;display:flex;flex-direction:column;height:calc(100vh - 48px);position:sticky;top:48px;font-family:'Inter',system-ui,sans-serif;}
  .app-sidebar-items{padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
  .app-sidebar-item{padding:7px 12px;border-radius:8px;font-size:13px;color:#303030;display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;font-weight:800;background:transparent;}
  .app-sidebar-item:hover{background:#E2E2E2;}
  .app-sidebar-item.active{background:#FFFFFF;font-weight:600;box-shadow:0 0 0 0.5px rgba(0,0,0,0.1),0 1px 1px rgba(0,0,0,0.05);}
  .app-sidebar-footer{padding:10px 8px;border-top:1px solid #DCDCDC;}
  .app-sidebar-divider{height:1px;background:#DCDCDC;margin:8px 4px;}
  .app-sidebar-group-header{padding:7px 12px;border-radius:8px;font-size:13px;color:#1A1A1A;font-weight:800;display:flex;align-items:center;gap:10px;user-select:none;background:transparent;}
  .app-sidebar-group-items{display:flex;flex-direction:column;gap:2px;padding:2px 0;}
  .app-main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .page{padding:24px 32px;width:100%;max-width:none;}

  .page h1{font-size:22px;font-weight:700;letter-spacing:-0.3px;}
  .page-bread{font-size:12px;color:#6D7175;margin-bottom:6px;}
  .page-bread a{color:#6D7175;text-decoration:none;}
  .panel{background:#FFFFFF;border:1px solid #E1E3E5;border-radius:12px;box-shadow:0 1px 0 rgba(0,0,0,0.05);overflow:hidden;margin-bottom:14px;}
  .panel-pad{padding:14px 18px;}
  .filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:end;}
  .field-label{display:block;font-size:11px;font-weight:700;color:#6D7175;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
  .field-input{padding:9px 12px;border:1px solid #DCDCDC;border-radius:8px;font-size:13px;font-family:inherit;color:#1A1A1A;background:#FFFFFF;}
  .field-input:focus{outline:none;border-color:#1A1A1A;box-shadow:0 0 0 1px #1A1A1A;}

  .btn:disabled{opacity:0.55;cursor:not-allowed;}
  .btn-ghost{background:#FFFFFF;color:#1A1A1A;border-color:#DCDCDC;}
  /* Multi-select dropdown — sized + colored to match Ads Analysis exactly */
  .ms-wrap{position:relative;width:100%;}
  .ms-trigger{width:100%;height:38px;border:1px solid #C9CCCF;border-radius:8px;padding:0 14px;background:#FFFFFF;font-family:inherit;font-size:13px;color:#1A1A1A;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;text-align:left;outline:none;box-shadow:0 1px 2px rgba(0,0,0,0.05);}

  .ms-foot .ms-foot-left{flex:1;font-size:13px;color:#1A1A1A;font-weight:500;cursor:pointer;}

  .ms-foot button.primary{background:#1A1A1A;color:#FFFFFF;border-color:#1A1A1A;}
  .ms-foot button.primary:hover{background:#333333;}

  /* Table styled exactly like the Overall Performance card in Ads Analysis */
  .perf-card{background:#FFFFFF;border:1px solid #E1E3E5;border-radius:12px;overflow:hidden;margin-bottom:14px;}

<script>
const $ = id => document.getElementById(id);
const API_BASE  = 'https://indigo-dog-836598.hostingersite.com/github/api';
const API_TOKEN = 'tk_4d2b9f7a8c6e1530a4f2d9b7e8c6a1f5';
async function api(path, opts = {}) {
  const headers = Object.assign({ 'Authorization': 'Bearer ' + API_TOKEN }, opts.headers || {});
  if (opts.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
  const r = await fetch(API_BASE + path, { ...opts, headers });
  if (!r.ok) throw new Error('API ' + r.status);
  return r.json();
}

// ── DATE RANGE (uses the SAME AppDatePicker instance as Ads Analysis) ──
// Attach the picker to our in-page button so user gets the full calendar UX,
// + subscribe so we always know the current range when Refresh is clicked.
let dateRange = { from: '', to: '' };
function syncDateRange() {
  if (!window.AppDatePicker) return;
  const r = window.AppDatePicker.getRange();
  dateRange = { from: r.from || '', to: r.to || '' };
}
function tryAttachDatePicker(retriesLeft) {
  if (window.AppDatePicker && typeof window.AppDatePicker.attach === 'function') {
    AppDatePicker.attach(document.getElementById('dateTrigger'), {
      onChange: ({ from, to }) => {
        dateRange = { from: from || '', to: to || '' };
        // Auto-refresh when date changes — no manual Refresh click needed.
        if (selectedSet.size && dateRange.from && dateRange.to) {
          clearTimeout(_refreshT);
          _refreshT = setTimeout(runReport, 250);
        }
      }
    });
    syncDateRange();
    return;
  }
  if (retriesLeft > 0) setTimeout(() => tryAttachDatePicker(retriesLeft - 1), 120);
}
tryAttachDatePicker(20);

// ── LOAD AVAILABLE AD ACCOUNTS ───────────────────────────────────────
let allAccounts = [];     // [{ id: 'act_X', name, currency, connector_id }]
let selectedSet = new Set();
let acctSearchTerm = '';

let loadDiagnostics = { connectors: 0, accounts: 0, errors: [] };

async function loadAccounts() {
  $('acctLabel').textContent = 'Loading connectors…';
  let data;
  try {
    data = await api('/connectors.php?type=ads&provider=meta');
  } catch (e) {
    showErr('Could not reach /connectors.php — ' + e.message);
    $('acctLabel').textContent = 'No ad accounts';
    return;
  }
  // Tolerate either shape: { rows: [...] } or [...]
  const conns = Array.isArray(data) ? data : (data.rows || data.connectors || []);
  loadDiagnostics = { connectors: conns.length, accounts: 0, errors: [] };
  allAccounts = [];
  if (!conns.length) {
    showErr('No Meta connectors are linked. Open Connectors → Meta and connect an ad account first.');
    $('acctLabel').textContent = 'No ad accounts';
    renderAccounts();
    return;
  }
  $('acctLabel').textContent = 'Loading accounts from ' + conns.length + ' connector' + (conns.length > 1 ? 's' : '') + '…';
  await Promise.all(conns.map(async c => {
    try {
      const r = await api('/meta.php?action=accounts&connector_id=' + c.id);
      const rows = Array.isArray(r) ? r : (r.rows || r.accounts || []);
      rows.forEach(a => allAccounts.push({
        id: a.id, name: a.name || a.id, currency: a.currency || '', connector_id: c.id,
      }));
    } catch (e) {
      loadDiagnostics.errors.push((c.label || c.name || ('connector ' + c.id)) + ': ' + e.message);
    }
  }));
  loadDiagnostics.accounts = allAccounts.length;
  // Brand-aware filter — restrict to the active brand's ad accounts.
  try {
    const ab = window.getActiveBrand ? window.getActiveBrand() : null;
    const allowed = ab && ab.meta && Array.isArray(ab.meta.ad_account_ids) ? ab.meta.ad_account_ids : null;
    if (allowed && allowed.length) {
      const set = new Set(allowed.map(String));
      // Account ids may come as 'act_1234' or '1234' — normalize.
      const normalize = v => String(v).replace(/^act_/, '');
      allAccounts = allAccounts.filter(a => set.has(String(a.id)) || set.has(normalize(a.id)) || set.has('act_' + normalize(a.id)));
    }
  } catch (e) {}
  // Restore selection from localStorage if available, but drop stale ids
  const validIds = new Set(allAccounts.map(a => a.id));
  const savedSel = JSON.parse(localStorage.getItem('app.report.spend.sel') || '[]')
    .filter(id => validIds.has(id));
  selectedSet = new Set(savedSel.length ? savedSel : allAccounts.map(a => a.id));
  // Surface any per-connector errors inline so they aren't silent
  if (loadDiagnostics.errors.length) {
    showErr('Loaded ' + loadDiagnostics.accounts + ' account(s) from '
      + (loadDiagnostics.connectors - loadDiagnostics.errors.length) + '/' + loadDiagnostics.connectors
      + ' connectors. Errors: ' + loadDiagnostics.errors.join(' · '));
  } else if (!allAccounts.length) {
    showErr('Connectors returned 0 ad accounts. Re-authorize Meta in Connectors and confirm the user has ad-account access.');
  } else {
    showErr('');
  }
  renderAccounts();
}
function updateAcctTrigger() {
  const total = allAccounts.length;
  const sel   = selectedSet.size;
  const label = $('acctLabel');
  const pill  = $('acctPill');
  if (!total) {
    label.textContent = 'No ad accounts';
    pill.style.display = 'none';
    return;
  }
  if (sel === 0)         label.textContent = '— ' + total + ' accounts available — select to load';
  else if (sel === total) label.textContent = 'All ad accounts';
  else if (sel === 1)    {
    const acct = allAccounts.find(a => selectedSet.has(a.id));
    label.textContent = acct ? acct.name : '1 account';
  }
  else label.textContent = sel + ' of ' + total + ' accounts';
  pill.textContent = sel;
  pill.style.display = sel > 0 ? '' : 'none';
}

function renderAccounts() {
  updateAcctTrigger();
  const term = acctSearchTerm.toLowerCase();
  const filtered = allAccounts
    .filter(a => !term || a.name.toLowerCase().includes(term) || (a.id || '').includes(term))
    .sort((a, b) => a.name.localeCompare(b.name));
  // Group head + count
  const total = allAccounts.length;
  $('acctTotal').textContent = total;
  $('acctGroupCount').textContent = total + ' ad account' + (total !== 1 ? 's' : '');
  const allChecked = total > 0 && selectedSet.size === total;
  const someChecked = selectedSet.size > 0 && selectedSet.size < total;
  const grpCb = $('acctGroupCheck');
  grpCb.checked = allChecked;
  grpCb.indeterminate = someChecked;
  // Account rows — each shows: checkbox · name · "EGP · <full account_id digits>"
  $('acctList').innerHTML = filtered.length
    ? filtered.map(a => {
        const numericId = (a.id || '').replace(/^act_/, '');
        const meta = (a.currency || '') + (numericId ? ' · ' + numericId : '');
        return `<label class="ms-row">
          <input type="checkbox" data-id="${a.id}" ${selectedSet.has(a.id) ? 'checked' : ''}>
          <span class="ms-acc-name">${escapeHtml(a.name)}</span>
          <span class="ms-acc-meta">${escapeHtml(meta)}</span>
        </label>`;
      }).join('')
    : '<div style="padding:18px;color:#6D7175;font-size:13px;text-align:center;">No matches.</div>';
  $('acctList').querySelectorAll('input').forEach(cb => cb.addEventListener('change', () => {
    if (cb.checked) selectedSet.add(cb.dataset.id); else selectedSet.delete(cb.dataset.id);
    persistAndRefresh();
  }));
}

// Save selection + auto-refresh report (debounced) so user never has to
// click "Refresh" after toggling an account on/off.
let _refreshT;
function persistAndRefresh() {
  localStorage.setItem('app.report.spend.sel', JSON.stringify([...selectedSet]));
  updateAcctTrigger();
  $('acctGroupCheck').checked = allAccounts.length > 0 && selectedSet.size === allAccounts.length;
  $('acctGroupCheck').indeterminate = selectedSet.size > 0 && selectedSet.size < allAccounts.length;
  clearTimeout(_refreshT);
  _refreshT = setTimeout(() => { if (selectedSet.size && dateRange.from && dateRange.to) runReport(); }, 250);
}

// Dropdown open/close + outside-click + search
$('acctTrigger').addEventListener('click', (e) => {
  e.stopPropagation();
  $('acctWrap').classList.toggle('open');
  if ($('acctWrap').classList.contains('open')) setTimeout(() => $('acctSearch').focus(), 50);
});
document.addEventListener('click', (e) => {
  if (!$('acctWrap').contains(e.target)) $('acctWrap').classList.remove('open');
});
$('acctSearch').addEventListener('input', (e) => { acctSearchTerm = e.target.value; renderAccounts(); });
// Group "Personal accounts" checkbox toggles ALL
$('acctGroupCheck').addEventListener('change', (e) => {
  e.stopPropagation();
  selectedSet = e.target.checked ? new Set(allAccounts.map(a => a.id)) : new Set();
  renderAccounts();
  persistAndRefresh();
});
$('selectAll').addEventListener('click', () => {
  selectedSet = new Set(allAccounts.map(a => a.id));
  renderAccounts();
  persistAndRefresh();
});
$('selectNone').addEventListener('click', () => {
  selectedSet = new Set();
  renderAccounts();
  persistAndRefresh();
});
$('acctDone').addEventListener('click', () => {
  $('acctWrap').classList.remove('open');
});
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ── RUN REPORT ───────────────────────────────────────────────────────
$('runBtn').addEventListener('click', runReport);

async function runReport() {
  syncDateRange();
  const since = dateRange.from;
  const until = dateRange.to;
  if (!since || !until) { showErr('Pick a date range from the calendar button in the topbar.'); return; }
  if (!selectedSet.size) { showErr('Pick at least one ad account.'); return; }
  showErr('');
  $('runBtn').disabled = true;
  $('runBtn').innerHTML = '<span class="spinner"></span> Loading…';
  $('tbody').innerHTML = '<tr><td colspan="2" class="state"><span class="spinner"></span> Fetching spend per account…</td></tr>';
  $('tfoot').innerHTML = '';

  const targets = allAccounts.filter(a => selectedSet.has(a.id));
  const results = [];
  let done = 0;
  await Promise.all(targets.map(async a => {
    try {
      const r = await api(
        '/meta.php?action=account_spend&connector_id=' + a.connector_id
        + '&account_id=' + encodeURIComponent(a.id)
        + '&since=' + encodeURIComponent(since)
        + '&until=' + encodeURIComponent(until)
      );
      results.push({ ...a, spend: parseFloat(r.spend) || 0, currency: r.currency || a.currency || '' });
    } catch (e) {
      results.push({ ...a, spend: 0, error: e.message });
    } finally {
      done++;
    }
  }));

  // Sort by spend desc
  results.sort((a, b) => b.spend - a.spend);
  // Sum total per currency (in case of mixed currencies)
  const totalsByCcy = {};
  results.forEach(r => {
    const c = r.currency || '—';
    totalsByCcy[c] = (totalsByCcy[c] || 0) + r.spend;
  });
  const grandTotal = results.reduce((s, r) => s + r.spend, 0);

  $('tbody').innerHTML = results.map(r => `
    <tr>
      <td>${escapeHtml(r.name)} ${r.error ? `<span style="color:#D72C0D;font-size:11px;">⚠ ${escapeHtml(r.error)}</span>` : ''}</td>
      <td class="right">${r.spend.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ${escapeHtml(r.currency || '')}</td>
    </tr>`).join('');

  const totalLabel = Object.keys(totalsByCcy).length === 1
    ? grandTotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ' + Object.keys(totalsByCcy)[0]
    : Object.entries(totalsByCcy).map(([c, v]) => v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' ' + c).join(' · ');

  $('tfoot').innerHTML = `
    <tr class="totals-row">
      <td>Totals</td>
      <td class="right">${totalLabel}</td>
    </tr>`;
  $('runBtn').disabled = false;
  $('runBtn').innerHTML = '↻ Refresh';
}

function showErr(msg) {
  if (!msg) { $('errBox').innerHTML = ''; return; }
  $('errBox').innerHTML = '<div class="err">⚠ ' + escapeHtml(msg) + '</div>';
}

// ── INIT ─────────────────────────────────────────────────────────────
// Auto-load accounts AND auto-run report on page open (no need to click
// Refresh — the table is always populated when the user lands here).
(async () => {
  try {
    await loadAccounts();
  } catch (err) {
    showErr('Failed to load ad accounts: ' + err.message);
    return;
  }
  // Wait briefly for AppDatePicker to settle, then sync + run
  setTimeout(() => {
    syncDateRange();
    if (selectedSet.size && dateRange.from && dateRange.to) runReport();
  }, 400);
})();

// Re-load accounts + re-run when the user switches brand from the topbar.
window.addEventListener('app:brandChanged', async () => {
  try { localStorage.removeItem('app.report.spend.sel'); } catch(_){}
  await loadAccounts();
  if (selectedSet.size && dateRange.from && dateRange.to) runReport();
});
</script>
