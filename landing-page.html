<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Landing page content</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100vh;background:#F1F1F1;font-family:'Inter','Almarai',system-ui,sans-serif;color:#1A1A1A;font-size:14px;}
  .app-shell{display:flex;min-height:100vh;}
  .app-sidebar{width:240px;min-width:240px;background:#EBEBEB;border-right:1px solid #DCDCDC;display:flex;flex-direction:column;height:calc(100vh - 48px);position:sticky;top:48px;font-family:'Inter',system-ui,sans-serif;}
  .app-sidebar-items{padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
  .app-sidebar-item{padding:7px 12px;border-radius:8px;font-size:13px;color:#303030;display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;font-weight:800;background:transparent;}
  .app-sidebar-item:hover{background:#E2E2E2;}
  .app-sidebar-item.active{background:#FFFFFF;font-weight:600;box-shadow:0 0 0 0.5px rgba(0,0,0,0.1),0 1px 1px rgba(0,0,0,0.05);}
  .app-sidebar-footer{padding:10px 8px;border-top:1px solid #DCDCDC;}
  .app-sidebar-divider{height:1px;background:#DCDCDC;margin:8px 4px;}
  .app-sidebar-group-header{padding:7px 12px;border-radius:8px;font-size:12px;color:#6D7175;font-weight:800;display:flex;align-items:center;gap:10px;user-select:none;background:transparent;text-transform:uppercase;letter-spacing:0.4px;}
  .app-sidebar-group-items{display:flex;flex-direction:column;gap:2px;padding:2px 0;}
  .app-main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .page{padding:24px 32px;max-width:none;width:100%;}
  .page-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:24px;align-items:start;}
  .page-col-left{position:sticky;top:72px;}
  @media (max-width: 1100px){
    .page-grid{grid-template-columns:1fr;}
    .page-col-left{position:static;}
  }
  .page h1{font-size:22px;font-weight:700;letter-spacing:-0.3px;margin-bottom:18px;}
  .panel{background:#FFFFFF;border:1px solid #E1E3E5;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 0 rgba(0,0,0,0.05);}
  .field{margin-bottom:14px;}
  .field-label{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#1A1A1A;font-weight:500;margin-bottom:6px;}
  .field-hint{font-size:11px;color:#8A8A8A;font-weight:400;}
  .field-input,.field-textarea{width:100%;padding:10px 12px;border:1px solid #DCDCDC;border-radius:8px;font-size:13px;font-family:inherit;color:#1A1A1A;background:#FFFFFF;line-height:1.55;}
  .field-input:focus,.field-textarea:focus{outline:none;border-color:#1A1A1A;box-shadow:0 0 0 1px #1A1A1A;}
  .field-textarea{min-height:110px;resize:vertical;direction:rtl;text-align:right;font-family:'Almarai','Inter',system-ui,sans-serif;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:0 18px;height:38px;border-radius:8px;border:1px solid #1A1A1A;background:#1A1A1A;color:#FFFFFF;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .btn:hover:not(:disabled){background:#303030;}
  .btn:disabled{opacity:0.55;cursor:not-allowed;}
  .btn-ghost{background:#FFFFFF;color:#1A1A1A;border-color:#DCDCDC;}
  .btn-ghost:hover:not(:disabled){background:#F5F5F5;}
  .out-card{background:#FFFFFF;border:1px solid #E1E3E5;border-radius:12px;padding:24px;box-shadow:0 1px 0 rgba(0,0,0,0.05);min-height:220px;}
  .out-empty{text-align:center;padding:40px 20px;color:#8A8A8A;font-size:13px;}
  .out-empty .ic{width:56px;height:56px;border-radius:14px;background:#F1F1F1;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;color:#6D7175;}
  .out-text{white-space:pre-wrap;line-height:1.85;font-size:15px;color:#1A1A1A;direction:rtl;text-align:right;font-family:'Almarai','Inter',system-ui,sans-serif;}
  .out-toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px;}
  .err{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;border-radius:8px;padding:10px 12px;font-size:13px;margin-top:10px;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#FFFFFF;padding:10px 18px;border-radius:8px;font-size:13px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}
  .toast.error{background:#D72C0D;}
  .key-row{display:flex;align-items:center;gap:8px;}
  .key-row input{flex:1;}
</style>
<script src="topbar.js?v=1777784143"></script>
<script src="sidebar-tools.js?v=1779200000"></script>
<script src="ai-keys.js?v=1779100000"></script>
<script src="google-picker.js?v=1777784143"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
</head>
<body>
<div class="app-shell">
  <aside class="app-sidebar" data-render-sidebar></aside>
  <div class="app-main">
    <div class="page">
      <h1 style="margin-bottom:18px;">Landing page content</h1>
      <div class="page-grid">
       <div class="page-col-left">
      <div class="panel">
        <div class="field">
          <div class="field-label" style="justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
            <span>Product details &amp; customer reviews <span style="color:#D72C0D;">*</span></span>
            <span style="display:inline-flex;gap:6px;flex-wrap:wrap;">
              <label for="folderInput" style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid #DCDCDC;border-radius:6px;background:#FFFFFF;cursor:pointer;font-size:11px;font-weight:600;color:#1A1A1A;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                Upload from device
              </label>
              <input id="folderInput" type="file" webkitdirectory directory multiple style="display:none;">
              <button type="button" id="driveFolderBtn" style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid #DCDCDC;border-radius:6px;background:#FFFFFF;cursor:pointer;font-size:11px;font-weight:600;color:#1A1A1A;font-family:inherit;">
                <img src="logos/google-drive.svg" width="14" height="14" alt="" style="display:block;">
                Upload from Drive
              </button>
            </span>
          </div>
          <textarea class="field-textarea" id="productInput" placeholder="Example: Educational game for kids ages 5-12. Develops thinking, memory and problem-solving. Price 350 EGP. Reviews: 'my son plays it every day', 'better than any tablet game', 'his teacher noticed the difference'..."></textarea>
          <div id="folderSummary" style="display:none;margin-top:8px;padding:8px 12px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:6px;font-size:11px;color:#0F5132;line-height:1.5;"></div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:8px;">
            <label for="modelSelect" style="font-size:13px;color:#1A1A1A;font-weight:500;">Model:</label>
            <select class="field-input" id="modelSelect" style="width:auto;min-width:200px;padding:8px 12px;">
              <option value="claude">Claude (Anthropic)</option>
              <option value="chatgpt">ChatGPT (OpenAI)</option>
            </select>
          </div>
          <button class="btn" id="generateBtn" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            <span id="generateLabel">Generate landing page</span>
          </button>
        </div>
        <div class="err" id="errBox" style="display:none;"></div>
      </div>
       </div>
       <div class="page-col-right">
      <div class="out-toolbar" id="outToolbar" style="display:none;">
        <button class="btn btn-ghost" id="copyBtn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span>Copy</span>
        </button>
        <button class="btn btn-ghost" id="regenBtn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          <span>Regenerate</span>
        </button>
        <button class="btn" id="saveAutoBtn" type="button" style="background:#0E8345;border-color:#0E8345;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span>Send to Automation</span>
        </button>
      </div>

      <div class="out-card" id="outCard">
        <div class="out-empty" id="outEmpty">
          <div class="ic">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          </div>
          <div>The generated landing page will appear here after you click Generate.</div>
        </div>
        <div class="out-text" id="outText" style="display:none;"></div>
      </div>
       </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>
</div>

<script>

const $ = id => document.getElementById(id);
const PROVIDER_LS = 'app.aiProvider';
const ANTHROPIC_KEY_LS = 'app.anthropicApiKey';
const OPENAI_KEY_LS = 'app.openaiApiKey';

// ── System prompt source — fetched fresh from the central System Prompts
//    store (api/skills.php) on every run, so edits there apply right away.
//    This task is wired to the "Landing Page Conversion Copy Builder" prompt.
const SKILLS_API   = 'https://indigo-dog-836598.hostingersite.com/github/api/skills.php';
const SKILLS_TOKEN = 'tk_4d2b9f7a8c6e1530a4f2d9b7e8c6a1f5';
const TASK_PROMPT_SLUG = 'egyptian-landing-page';
async function loadPrompt() {
  const r = await fetch(SKILLS_API + '?slug=' + encodeURIComponent(TASK_PROMPT_SLUG) + '&_t=' + Date.now(), {
    headers: { 'Authorization': 'Bearer ' + SKILLS_TOKEN }
  });
  if (!r.ok) throw new Error('تعذّر تحميل البرومبت (HTTP ' + r.status + ').');
  const d = await r.json();
  const instr = ((d && d.instructions) || '').trim();
  if (!instr) throw new Error('برومبت التاسك فاضي — ضيفه من System Prompts في الإعدادات.');
  return instr;
}

const savedProvider = localStorage.getItem(PROVIDER_LS);
if (savedProvider) $('modelSelect').value = savedProvider;
$('modelSelect').addEventListener('change', () => {
  localStorage.setItem(PROVIDER_LS, $('modelSelect').value);
});

function showToast(msg, isError) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast' + (isError ? ' error' : ''), 2400);
}
function showError(msg) {
  const e = $('errBox');
  if (msg) { e.textContent = msg; e.style.display = 'block'; }
  else { e.style.display = 'none'; e.textContent = ''; }
}

async function callClaude(systemPrompt, userMessage, maxTokens) {
  if (window.aiKeysReady) { try { await window.aiKeysReady; } catch (e) {} }
  const apiKey = localStorage.getItem(ANTHROPIC_KEY_LS) || '';
  if (!apiKey) throw new Error('No Claude API key. Settings → Connect AI Tools → Claude.');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-7',
      max_tokens: maxTokens || 4000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userMessage }]
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error((data && data.error && data.error.message) || ('HTTP ' + res.status));
  const text = (data.content || []).map(b => b.text || '').join('').trim();
  if (!text) throw new Error('Empty response');
  return text;
}

async function callChatGPT(systemPrompt, userMessage, maxTokens) {
  if (window.aiKeysReady) { try { await window.aiKeysReady; } catch (e) {} }
  const apiKey = localStorage.getItem(OPENAI_KEY_LS) || '';
  if (!apiKey) throw new Error('No ChatGPT API key. Settings → Connect AI Tools → ChatGPT.');
  const res = await fetch('https://api.openai.com/v1/responses', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey
    },
    body: JSON.stringify({
      model: 'gpt-5.5-pro',
      instructions: systemPrompt,
      input: userMessage,
      max_output_tokens: (maxTokens || 4000) + 6000
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error((data && data.error && data.error.message) || ('HTTP ' + res.status));
  let text = '';
  (data.output || []).forEach(item => {
    if (item.type === 'message' && Array.isArray(item.content)) {
      item.content.forEach(c => { if (c.type === 'output_text') text += (c.text || ''); });
    }
  });
  text = text.trim();
  if (!text) throw new Error('Empty response (status: ' + (data.status || '?') + ')');
  return text;
}

async function generate() {
  showError('');
  const input = $('productInput').value.trim();
  const provider = $('modelSelect').value;

  if (!input) { showToast('Enter product details first', true); return; }

  const userMessage = `INPUT DATA
${input}`;

  const btn = $('generateBtn');
  const label = $('generateLabel');
  btn.disabled = true;
  label.innerHTML = '<span class="spinner"></span> Generating…';

  try {
    const sysPrompt = await loadPrompt();
    const text = provider === 'chatgpt'
              ? await callChatGPT(sysPrompt, userMessage, 4000)
              : await callClaude(sysPrompt, userMessage, 4000);

    $('outEmpty').style.display = 'none';
    const out = $('outText');
    out.style.display = 'block';
    renderSections(out, text);
    $('outToolbar').style.display = 'flex';
  } catch (err) {
    showError('Failed: ' + err.message);
  } finally {
    btn.disabled = false;
    label.textContent = 'Generate landing page';
  }
}

$('generateBtn').addEventListener('click', generate);
$('regenBtn').addEventListener('click', generate);

async function copyText(txt) {
  try {
    await navigator.clipboard.writeText(txt);
    showToast('Copied');
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Copied');
  }
}

// Cache the full raw output so the toolbar "Copy" button still copies everything
let __lastFullText = '';
$('copyBtn').addEventListener('click', () => copyText(__lastFullText));

// Build a small "Copy" button matching the headlines-page style.
function makeCopyBtn(getText, opts) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'btn btn-ghost';
  const small = opts && opts.small;
  btn.style.cssText = 'height:' + (small ? '28' : '30') + 'px;padding:0 10px;font-size:11px;font-weight:600;direction:ltr;flex-shrink:0;';
  const iconSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  const checkSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  btn.innerHTML = iconSvg + '<span style="margin-inline-start:4px;">Copy</span>';
  btn.addEventListener('click', async () => {
    const t = getText();
    try { await navigator.clipboard.writeText(t); }
    catch (e) {
      const ta = document.createElement('textarea');
      ta.value = t; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    const orig = btn.innerHTML;
    btn.style.background = '#0E8345';
    btn.style.color = '#FFFFFF';
    btn.style.borderColor = '#0E8345';
    btn.innerHTML = checkSvg + '<span style="margin-inline-start:4px;">Copied</span>';
    setTimeout(() => {
      btn.style.background = '';
      btn.style.color = '';
      btn.style.borderColor = '';
      btn.innerHTML = orig;
    }, 1400);
  });
  return btn;
}

// Split a section body into items based on the section number.
// 4 (benefits) → one per line · 5/6/7 (headlines/faq/reviews) → paragraph blocks.
// For benefits we also strip leading bullets / numbering / markdown asterisks
// so each row shows a clean line of text.
function splitSectionItems(sectionNum, body) {
  if (!body) return [];
  if (sectionNum === 4) {
    return body
      .split(/\r?\n/)
      .map(l => l.trim())
      .map(l => l.replace(/^[\s\-•·✅✓★◆▪▫\*]+/, '').replace(/^\d+\s*[-.):]\s*/, '').trim())
      .map(l => l.replace(/^\*+|\*+$/g, '').trim())
      .filter(Boolean);
  }
  if (sectionNum === 5 || sectionNum === 6 || sectionNum === 7) {
    return body.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
  }
  return [];
}

// Render the AI output as a stack of per-section cards. List-style sections
// (benefits, headlines, faq, reviews) get a Copy button on every item.
//
// Section headers from the model arrive in several shapes:
//   Section 4 (Emotional Benefits)
//   **Section 4 (Emotional Benefits)**
//   ## Section 4: Emotional Benefits
//   - Section 4 —
// so the split regex tolerates leading markdown punctuation (* # > - whitespace)
// before the literal word "Section".
function renderSections(container, text) {
  __lastFullText = text;
  container.innerHTML = '';
  const sectionStart = /^[\s>*#\-]*\**\s*Section\s+\d+/im;
  // Use a capturing lookbehind via split with a sticky regex — JS supports
  // lookahead so split with (?=...) works and keeps the header on the next
  // chunk.
  const splitRe = /(?=^[\s>*#\-]*\**\s*Section\s+\d+)/m;
  const parts = text.split(splitRe).map(p => p.trim()).filter(Boolean);
  if (parts.length <= 1 || !sectionStart.test(text)) {
    container.textContent = text;
    return;
  }
  parts.forEach(part => {
    const nl = part.indexOf('\n');
    const headerLineRaw = nl === -1 ? part : part.slice(0, nl).trim();
    // Strip markdown asterisks/hashes from the displayed header.
    const headerLine = headerLineRaw.replace(/^[\s>*#\-]+|[\s*]+$/g, '').trim();
    const body = nl === -1 ? '' : part.slice(nl + 1).trim();
    const numMatch = headerLine.match(/Section\s+(\d+)/i);
    const sectionNum = numMatch ? +numMatch[1] : 0;

    const card = document.createElement('div');
    card.style.cssText = 'position:relative;margin-bottom:14px;padding:12px 14px;border:1px solid #E1E3E5;border-radius:10px;background:#FAFAFA;';

    const head = document.createElement('div');
    head.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;direction:ltr;';
    const title = document.createElement('div');
    title.style.cssText = 'font-size:12px;font-weight:700;color:#6D7175;text-transform:uppercase;letter-spacing:0.4px;';
    title.textContent = headerLine;
    head.appendChild(title);
    head.appendChild(makeCopyBtn(() => body || part));
    card.appendChild(head);

    const items = splitSectionItems(sectionNum, body);
    if (items.length > 1) {
      const list = document.createElement('div');
      list.style.cssText = 'display:flex;flex-direction:column;gap:8px;';
      items.forEach(item => {
        const row = document.createElement('div');
        row.style.cssText = 'display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;padding:10px 12px;border:1px solid #E1E3E5;border-radius:8px;background:#FFFFFF;';
        const itemText = document.createElement('div');
        itemText.style.cssText = 'white-space:pre-wrap;line-height:1.7;font-size:14px;';
        itemText.textContent = item;
        row.appendChild(itemText);
        row.appendChild(makeCopyBtn(() => item, { small: true }));
        list.appendChild(row);
      });
      card.appendChild(list);
    } else {
      const pre = document.createElement('div');
      pre.style.cssText = 'white-space:pre-wrap;line-height:1.85;font-size:15px;';
      pre.textContent = body;
      card.appendChild(pre);
    }
    container.appendChild(card);
  });
}

// ── Parse the AI landing output into structured sections ─────────────
function parseLandingSections(text) {
  const out = { title:'', hook:'', pain:'', benefits:[], headlines:[], subheadlines:[], faq:[], reviews:[] };
  if (!text) return out;
  const lines = text.split(/\r?\n/);
  let cur = null;
  let buf = [];
  function flush() {
    if (!cur) return;
    const body = buf.join('\n').trim();
    if (cur === 'title') out.title = body;
    else if (cur === 'hook') out.hook = body;
    else if (cur === 'pain') out.pain = body;
    else if (cur === 'benefits') {
      out.benefits = body.split(/\r?\n/).map(s => s.replace(/^[✅•\-\d.)\s]+/, '').trim()).filter(Boolean);
    } else if (cur === 'headlines') {
      // Pairs of "Headline N:" + "Subheadline N:"
      const blocks = body.split(/\n\s*\n/);
      blocks.forEach(blk => {
        const hMatch = blk.match(/Headline[^:]*:\s*([\s\S]+?)(?:\n|$)/i);
        const sMatch = blk.match(/Subheadline[^:]*:\s*([\s\S]+?)(?:\n|$)/i);
        if (hMatch) out.headlines.push(hMatch[1].trim());
        if (sMatch) out.subheadlines.push(sMatch[1].trim());
      });
    } else if (cur === 'faq') {
      // Q/A pairs
      const blocks = body.split(/\n\s*\n/);
      blocks.forEach(blk => {
        const qm = blk.match(/^س[:\s]+([\s\S]+?)(?:\nج[:\s]+([\s\S]+))?$/m);
        if (qm) out.faq.push({ q: qm[1].trim(), a: (qm[2] || '').trim() });
      });
    } else if (cur === 'reviews') {
      out.reviews = body.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
    }
    buf = [];
  }
  for (const line of lines) {
    const m = line.match(/^Section\s+(\d+)/i);
    if (m) {
      flush();
      const n = +m[1];
      cur = ['', 'title', 'hook', 'pain', 'benefits', 'headlines', 'faq', 'reviews'][n] || null;
      continue;
    }
    if (cur) buf.push(line);
  }
  flush();
  return out;
}

// ── Send to Automation (saves the build to landing-auto.html queue) ──
const STORE_LIST = ['Rehla', 'Gahiz', '3andak', 'oldhomeco'];
// Suffix appended to every WooCommerce product name. Matches the template
// product naming convention (e.g. "TEMPLATE (re-gm)").
const PRODUCT_SUFFIX = ' (re-gm)';

// ── Product folder upload ───────────────────────────────────────────
// Reads a Drive-style folder and auto-fills:
//  • product name (from folder name)
//  • the AI input (from "Reviews & Details 2" docx/txt inside)
//  • images (from "صور مضغوطة" subfolder)
window.__productFolder = { name: '', images: [], reviewsTextLen: 0 };

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

async function extractTextFromFile(file) {
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  if (ext === 'txt' || ext === 'md' || ext === 'csv') return await file.text();
  if (ext === 'docx') {
    if (!window.mammoth) throw new Error('mammoth.js not loaded');
    const buf = await file.arrayBuffer();
    const res = await window.mammoth.extractRawText({ arrayBuffer: buf });
    return res.value || '';
  }
  return '';
}

async function handleFolderUpload(fileList) {
  const files = Array.from(fileList || []);
  if (!files.length) return;
  // Folder name = first segment of any webkitRelativePath
  const firstPath = files[0].webkitRelativePath || files[0].name;
  const folderName = firstPath.split('/')[0] || '';

  // Find Reviews & Details 2 file (docx/txt)
  const reviewsFile = files.find(f => /reviews.*details/i.test(f.name)) || files.find(f => /\.(txt|md|csv|docx)$/i.test(f.name));
  let reviewsText = '';
  if (reviewsFile) {
    try { reviewsText = await extractTextFromFile(reviewsFile); }
    catch (e) { console.warn('Reviews extract failed:', e.message); }
  }

  // Find images, prefer "صور مضغوطة" subfolder if present
  const allImages = files.filter(f => /\.(jpe?g|png|webp|gif)$/i.test(f.name));
  const compressed = allImages.filter(f =>
    (f.webkitRelativePath || '').includes('صور مضغوطة')
  );
  const imageFiles = compressed.length ? compressed : allImages;
  const images = [];
  for (const f of imageFiles.slice(0, 30)) {
    try {
      const dataUrl = await fileToDataUrl(f);
      images.push({ name: f.name, dataUrl, selected: false });
    } catch (e) { /* skip */ }
  }

  window.__productFolder = { name: folderName, images, reviewsTextLen: reviewsText.length };

  // Auto-fill the AI input (only if empty so we don't blow away typed text)
  const input = $('productInput');
  if (reviewsText && !input.value.trim()) {
    input.value = reviewsText;
  }

  // Show green summary
  const sum = $('folderSummary');
  sum.style.display = 'block';
  sum.innerHTML = `
    <strong>✓ ${escape(folderName)}</strong> —
    ${reviewsText ? reviewsText.length.toLocaleString() + ' chars from Reviews & Details 2' : 'no reviews file found'}
    · ${images.length} image${images.length === 1 ? '' : 's'} loaded
  `;
}

// HTML escape for the summary line
function escape(s) {
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

$('folderInput').addEventListener('change', (e) => handleFolderUpload(e.target.files));

// "Upload from Drive" — opens Google Picker, downloads the picked folder,
// then funnels File[] into the same handleFolderUpload as the device flow.
$('driveFolderBtn').addEventListener('click', () => {
  const btn = $('driveFolderBtn');
  const orig = btn.innerHTML;
  btn.disabled = true; btn.innerHTML = 'Loading…';
  pickGoogleDriveFolder(
    (files) => { btn.disabled = false; btn.innerHTML = orig; handleFolderUpload(files); },
    {
      onProgress: (p) => {
        if (p.phase === 'listing') btn.innerHTML = 'Listing folder…';
        else if (p.phase === 'downloading') btn.innerHTML = 'Downloading ' + p.current + '/' + p.total;
      },
      onError: (e) => { btn.disabled = false; btn.innerHTML = orig; alert('Drive: ' + e.message); }
    }
  );
});

function openSendToAutoModal() {
  const text = $('outText').textContent;
  if (!text) { showToast('Nothing to save — generate a landing first', true); return; }
  const sections = parseLandingSections(text);
  const guessTitle = sections.title || (text.split(/\n/).find(l => l.trim()) || '').slice(0, 60);
  const slugSuggest = (guessTitle || 'landing').toLowerCase()
    .replace(/[^؀-ۿ\w\s-]/g, '').trim().replace(/\s+/g, '-').slice(0, 60);
  // Auto product name = uploaded folder name (user can edit before saving)
  const folderName = (window.__productFolder && window.__productFolder.name) || '';
  const folderImages = (window.__productFolder && window.__productFolder.images) || [];

  const back = document.createElement('div');
  back.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:30px 20px;overflow-y:auto;';
  back.innerHTML = `
    <div style="background:#FFFFFF;border-radius:14px;width:100%;max-width:560px;font-family:'Inter',system-ui,sans-serif;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #F1F1F1;">
        <div style="font-size:16px;font-weight:700;">Send to Automation</div>
        <button id="sendCloseBtn" style="background:none;border:none;cursor:pointer;font-size:18px;color:#6D7175;padding:4px 8px;border-radius:6px;">✕</button>
      </div>
      <div style="padding:18px 20px;">
        <div style="background:#FFF8E1;border:1px solid #F5E6A6;border-radius:8px;padding:10px 12px;font-size:12px;color:#7A5500;margin-bottom:14px;line-height:1.6;">
          <strong>Before you Send:</strong> go to WooCommerce and prepare the product —
          <ol style="margin:6px 0 0 18px;padding:0;">
            <li>Duplicate <code>TEMPLATE (re-gm)</code></li>
            <li>Rename to <strong>"&lt;name&gt; (re-gm)"</strong> — same name you'll type below</li>
            <li>Set the price (e.g. 999) — sale price + regular price (~2×)</li>
            <li>Upload product images (1, 2, 3…) — image 1 is primary</li>
            <li>Save as Draft → come back here and click <strong>Save to Automation</strong></li>
          </ol>
        </div>
        <div style="margin-bottom:6px;">
          <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">Product name</label>
          <input id="sa_pname" style="width:100%;padding:9px 12px;border:1px solid #DCDCDC;border-radius:8px;font-size:13px;background:#F1F1F1;font-family:inherit;" placeholder="مثال: لعبة اطفال" value="${escape(folderName)}">
        </div>
        <div id="sa_finalName" style="font-size:11px;color:#6D7175;margin-bottom:14px;padding:6px 10px;background:#F1F1F1;border-radius:6px;">
          Final product name: <strong id="sa_finalNameText">— (re-gm)</strong>
        </div>
        <div style="margin-bottom:12px;">
          <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">Store</label>
          <select id="sa_store" style="width:100%;padding:9px 12px;border:1px solid #DCDCDC;border-radius:8px;font-size:13px;background:#F1F1F1;font-family:inherit;">
            ${STORE_LIST.map(s => `<option value="${s}">${s}</option>`).join('')}
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
          <div>
            <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">Slug</label>
            <input id="sa_slug" style="width:100%;padding:9px 12px;border:1px solid #DCDCDC;border-radius:8px;font-size:13px;background:#F1F1F1;font-family:inherit;" value="${slugSuggest}">
          </div>
          <div>
            <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">Price (EGP)</label>
            <input id="sa_price" style="width:100%;padding:9px 12px;border:1px solid #DCDCDC;border-radius:8px;font-size:13px;background:#F1F1F1;font-family:inherit;" value="999">
          </div>
        </div>
        <div id="sa_priceHint" style="font-size:11px;color:#6D7175;margin-top:-6px;margin-bottom:10px;padding:6px 10px;background:#F1F1F1;border-radius:6px;">
          Original (struck-through) price will be: <strong id="sa_origPrice">2000 ج.م</strong>
        </div>
        <div style="font-size:11px;color:#6D7175;margin-top:6px;">
          Detected: ${sections.benefits.length} benefits · ${sections.headlines.length} headlines · ${sections.faq.length} FAQ items · ${sections.reviews.length} reviews · ${folderImages.length} images from folder
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid #F1F1F1;background:#FAFAFA;">
        <button id="sendCancelBtn" style="padding:0 14px;height:34px;border-radius:7px;border:1px solid #DCDCDC;background:#FFFFFF;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;">Cancel</button>
        <button id="sendOkBtn" style="padding:0 14px;height:34px;border-radius:7px;border:none;background:#0E8345;color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;">Save to Automation</button>
      </div>
    </div>
  `;
  document.body.appendChild(back);
  function close() { document.body.removeChild(back); }
  back.querySelector('#sendCloseBtn').addEventListener('click', close);
  back.querySelector('#sendCancelBtn').addEventListener('click', close);

  // Live preview of "<name> (re-gm)"
  const pnameInput = back.querySelector('#sa_pname');
  const finalText = back.querySelector('#sa_finalNameText');
  function updateFinalName() {
    const v = pnameInput.value.trim();
    finalText.textContent = (v || '—') + PRODUCT_SUFFIX;
  }
  pnameInput.addEventListener('input', updateFinalName);
  updateFinalName();

  // Live preview of the auto-calculated original price (rounded up to nearest 50)
  const priceInput = back.querySelector('#sa_price');
  const origPriceEl = back.querySelector('#sa_origPrice');
  function updateOrigPrice() {
    const p = parseFloat(priceInput.value) || 0;
    const orig = p > 0 ? Math.ceil(p * 2 / 50) * 50 : 0;
    origPriceEl.textContent = (orig || '—') + ' ج.م';
  }
  priceInput.addEventListener('input', updateOrigPrice);
  updateOrigPrice();

  back.querySelector('#sendOkBtn').addEventListener('click', () => {
    const baseName = (pnameInput.value.trim() || guessTitle.slice(0, 80) || 'Untitled');
    // Avoid double-suffixing if the user typed "(re-gm)" themselves.
    const finalName = baseName.endsWith(PRODUCT_SUFFIX.trim()) ? baseName : baseName + PRODUCT_SUFFIX;
    const build = {
      id: 'b_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
      product_name: finalName,
      product_base_name: baseName,
      store: back.querySelector('#sa_store').value,
      slug: back.querySelector('#sa_slug').value.trim() || slugSuggest,
      price: back.querySelector('#sa_price').value.trim() || '999',
      sections,
      raw_text: text,
      images: folderImages.map(im => ({ name: im.name, dataUrl: im.dataUrl, selected: true })),
      status: 'draft',
      created_at: Date.now(),
      updated_at: Date.now(),
    };
    try {
      const list = JSON.parse(localStorage.getItem('app.landingAutoBuilds.v1') || '[]');
      list.unshift(build);
      localStorage.setItem('app.landingAutoBuilds.v1', JSON.stringify(list));
      showToast('Saved to Automation');
      close();
      setTimeout(() => { window.location.href = 'landing-auto.html'; }, 600);
    } catch (e) {
      showToast('Failed to save: ' + e.message, true);
    }
  });
}
$('saveAutoBtn').addEventListener('click', openSendToAutoModal);
</script>
