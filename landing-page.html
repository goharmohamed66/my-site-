<script>
// ── SKILLS LOADER (Settings → Brain → Skills) ──────────────────────────
const __SKILLS_API   = 'https://indigo-dog-836598.hostingersite.com/api/skills.php';
const __SKILLS_TOKEN = 'tk_4d2b9f7a8c6e1530a4f2d9b7e8c6a1f5';
const __skillCache = {};
async function loadSkill(slug) {
  // cache disabled — always fetch fresh so updated skills apply immediately
  try {
    const r = await fetch(__SKILLS_API + '?slug=' + encodeURIComponent(slug) + '&_t=' + Date.now(), {
      headers: { 'Authorization': 'Bearer ' + __SKILLS_TOKEN }
    });
    if (!r.ok) { __skillCache[slug] = null; return null; }
    const d = await r.json();
    __skillCache[slug] = d.instructions || null;
    return __skillCache[slug];
  } catch (e) { __skillCache[slug] = null; return null; }
}
async function buildSkillBlock(slugs) {
  const parts = await Promise.all(slugs.map(slug => loadSkill(slug).then(text => ({ slug, text }))));
  const out = [];
  for (const p of parts) {
    if (!p.text) continue;
    if (p.slug === 'egyptian-writing-voice') {
      // Voice skill = STYLE EXAMPLES, not instructions. Frame it that way so
      // the model imitates the rhythm/wording instead of just listing rules.
      out.push(
        '## STYLE REFERENCE — How to write (Egyptian voice)\n' +
        'Below are real examples of the exact tone, rhythm, word choice, sentence length and emotional pull the user wants. Study them carefully. When you write, match this voice as closely as a human copywriter would imitate a mentor — same rhythm, same colloquialisms, same punch. Do NOT copy any line verbatim; mirror the STYLE.\n\n' +
        '──────── EXAMPLES START ────────\n' +
        p.text + '\n' +
        '──────── EXAMPLES END ────────'
      );
    } else if (p.slug === 'about-gohar') {
      out.push('## USER PROFILE — Who you are writing for\n' + p.text);
    } else {
      // Per-task skill (copywriter / landing / headlines): treat as instructions
      out.push('## TASK INSTRUCTIONS\n' + p.text);
    }
  }
  return out.join('\n\n---\n\n');
}

let __allSkillsCache = null;
async function loadAllSkills() {
  if (__allSkillsCache) return __allSkillsCache;
  try {
    const r = await fetch(__SKILLS_API, { headers: { 'Authorization': 'Bearer ' + __SKILLS_TOKEN } });
    if (!r.ok) { __allSkillsCache = []; return []; }
    const d = await r.json();
    const rows = (d.rows || []).filter(s => s.instructions && s.instructions.trim());
    rows.sort((a, b) => {
      const aBase = /voice|tone|base/i.test(a.slug) ? -1 : 0;
      const bBase = /voice|tone|base/i.test(b.slug) ? -1 : 0;
      return aBase - bBase;
    });
    __allSkillsCache = rows;
    return rows;
  } catch (e) { __allSkillsCache = []; return []; }
}
async function buildAllSkillsBlock() {
  const rows = await loadAllSkills();
  if (!rows.length) return '';
  return rows.map(s =>
    '## Skill: ' + (s.name || s.slug) + ' (/' + s.slug + ')\n' +
    (s.description ? s.description + '\n\n' : '') +
    s.instructions
  ).join('\n\n---\n\n');
}

// ── TECH OP AGENT (Media Buyer Persona) ──────────────────────────────
const AGENT_PERSONA = `أنت "Tech Op Agent" — ميديا باير محترف في السوق المصري وكوبي رايتر مباشر-الاستجابة، خبرتك أكثر من 8 سنين في الـ DTC على فيسبوك وإنستجرام وتيك توك.

## شخصيتك:
- شُفت آلاف الكامبينز وعارف اللي بيكنفرت واللي بيموت.
- بتفكر دايماً كـ Hook → Pain → Promise → Proof → CTA.
- بتعرف نفسية المستهلك المصري: اللغة، التريبت، الأسعار، الـ trust signals.
- مهووس بـ scroll-stop وكل كلمة بتحاسبها على الـ ROI.

## قواعد العمل:

async function callAgent(systemPrompt, userMessage, maxTokens) {
  if (window.aiKeysReady) { try { await window.aiKeysReady; } catch (e) {} }
  const hasClaude  = !!localStorage.getItem(ANTHROPIC_KEY_LS);
  const hasGPT     = !!localStorage.getItem(OPENAI_KEY_LS);
  const hasOR      = !!localStorage.getItem(OPENROUTER_KEY_LS);
  if (!hasClaude && !hasGPT && !hasOR) {
    throw new Error('Agent needs at least one AI key (Settings → Connectors → Claude / ChatGPT / OpenRouter).');
  }
  const label = $('generateLabel');
  const setLabel = (txt) => { if (label) label.innerHTML = '<span class="spinner"></span> ' + txt; };
  const agentPrompt = AGENT_PERSONA + '\n\n---\n\n' + systemPrompt;
  if (!(hasClaude && hasGPT)) {
    const sub = hasClaude ? 'claude' : (hasGPT ? 'chatgpt' : 'openrouter');
    setLabel('Drafting…');
    const draft = await __agentSinglePass(sub, agentPrompt, userMessage, maxTokens);
    setLabel('Refining…');
    const refined = await __agentSinglePass(
      sub,
      AGENT_PERSONA + '\n\n---\n\n' + AGENT_REFINE_PROMPT,
      'الطلب الأصلي:\n' + userMessage + '\n\n---\n\nالمسودة المطلوب تحسينها:\n' + draft,
      maxTokens
    );
    return refined || draft;
  }
  setLabel('Drafting (Claude + ChatGPT in parallel)…');
  const [draftClaude, draftGPT] = await Promise.all([
    callClaude(agentPrompt, userMessage, maxTokens).catch(e => '[Claude draft failed: ' + e.message + ']'),
    callChatGPT(agentPrompt, userMessage, maxTokens).catch(e => '[ChatGPT draft failed: ' + e.message + ']'),
  ]);
  setLabel('Cross-reviewing…');
  const crossPrompt = (lbl) =>
    'إنت بتراجع مسودة كتبها موديل تاني (' + lbl + '). شغلتك:\n' +
    '1. اقرأها بعقلية مستهلك مصري حقيقي بيعدّي على فيسبوك.\n' +
    '2. قارنها بالـ STYLE REFERENCE فوق — هل الـ rhythm صح؟ الكلام طبيعي؟ بيـ match الأمثلة؟\n' +
    '3. شطب أي كلام مُستهلك أو AI-sounding أو حشو.\n' +
    '4. لو الموديل التاني فاته شيء من المطلوب — كمّله.\n' +
    '5. ارجع النسخة المُحسّنة فقط، من غير شرح ولا "النسخة المحسنة:".';
  const [refinedByGPT, refinedByClaude] = await Promise.all([
    callChatGPT(
      AGENT_PERSONA + '\n\n---\n\n' + crossPrompt('Claude'),
      'الطلب الأصلي:\n' + userMessage + '\n\n---\n\nمسودة Claude:\n' + draftClaude,
      maxTokens
    ).catch(() => draftClaude),
    callClaude(
      AGENT_PERSONA + '\n\n---\n\n' + crossPrompt('ChatGPT'),
      'الطلب الأصلي:\n' + userMessage + '\n\n---\n\nمسودة ChatGPT:\n' + draftGPT,
      maxTokens
    ).catch(() => draftGPT),
  ]);
  setLabel('Final synthesis…');
  const synthPrompt = AGENT_PERSONA + '\n\n---\n\n' +
    'بين إيدك نسختين كتبهم Claude و ChatGPT بعد ما راجع كل واحد فيهم على التاني. ' +
    'مهمتك: تطلع نسخة واحدة نهائية تكون أحسن من الاتنين. اشتغل بالخطوات دي:\n\n' +
    '1. قارن النسختين سطر سطر. اختار أقوى hook، أصدق pain، أوضح benefit، أحسن CTA.\n' +
    '2. تأكد إن الـ TONE والـ rhythm matching الـ STYLE REFERENCE اللي فوق.\n' +
    '3. تأكد عدد الكلمات قريب من الأمثلة (مش أطول، مش أقصر بشكل ملحوظ).\n' +
    '4. شيل أي تكرار بين المصدرين، اخلطهم بذكاء.\n' +
    '5. ارجع النسخة النهائية فقط — نص نضيف، من غير "النسخة النهائية:" ولا أي كلام مقدمة.';
  try {
    const final = await callClaude(
      synthPrompt,
      'الطلب الأصلي:\n' + userMessage + '\n\n---\n\nنسخة 1 (Claude refined by GPT):\n' + refinedByGPT +
      '\n\n---\n\nنسخة 2 (GPT refined by Claude):\n' + refinedByClaude,
      maxTokens
    );
    return final || refinedByClaude || refinedByGPT;
  } catch (e) {
    return refinedByClaude || refinedByGPT;
  }
}

// ── Parse the AI landing output into structured sections ─────────────
function parseLandingSections(text) {
  const out = { title:'', hook:'', pain:'', benefits:[], headlines:[], subheadlines:[], faq:[], reviews:[] };
  if (!text) return out;
  const lines = text.split(/\r?\n/);
  let cur = null;
  let buf = [];
  function flush() {
    if (!cur) return;
    const body = buf.join('\n').trim();
    if (cur === 'title') out.title = body;
    else if (cur === 'hook') out.hook = body;
    else if (cur === 'pain') out.pain = body;
    else if (cur === 'benefits') {
      out.benefits = body.split(/\r?\n/).map(s => s.replace(/^[✅•\-\d.)\s]+/, '').trim()).filter(Boolean);
    } else if (cur === 'headlines') {
      // Pairs of "Headline N:" + "Subheadline N:"
      const blocks = body.split(/\n\s*\n/);
      blocks.forEach(blk => {
        const hMatch = blk.match(/Headline[^:]*:\s*([\s\S]+?)(?:\n|$)/i);
        const sMatch = blk.match(/Subheadline[^:]*:\s*([\s\S]+?)(?:\n|$)/i);
        if (hMatch) out.headlines.push(hMatch[1].trim());
        if (sMatch) out.subheadlines.push(sMatch[1].trim());
      });
    } else if (cur === 'faq') {
      // Q/A pairs
      const blocks = body.split(/\n\s*\n/);
      blocks.forEach(blk => {
        const qm = blk.match(/^س[:\s]+([\s\S]+?)(?:\nج[:\s]+([\s\S]+))?$/m);
        if (qm) out.faq.push({ q: qm[1].trim(), a: (qm[2] || '').trim() });
      });
    } else if (cur === 'reviews') {
      out.reviews = body.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
    }
    buf = [];
  }
  for (const line of lines) {
    const m = line.match(/^Section\s+(\d+)/i);
    if (m) {
      flush();
      const n = +m[1];
      cur = ['', 'title', 'hook', 'pain', 'benefits', 'headlines', 'faq', 'reviews'][n] || null;
      continue;
    }
    if (cur) buf.push(line);
  }
  flush();
  return out;
}

const STORE_LIST = ['Rehla', 'Gahiz', '3andak', 'oldhomeco'];
// Suffix appended to every WooCommerce product name. Matches the template
// product naming convention (e.g. "TEMPLATE (re-gm)").
const PRODUCT_SUFFIX = ' (re-gm)';

// ── Product folder upload ───────────────────────────────────────────
// Reads a Drive-style folder and auto-fills:
//  • product name (from folder name)
//  • the AI input (from "Reviews & Details 2" docx/txt inside)
//  • images (from "صور مضغوطة" subfolder)
window.__productFolder = { name: '', images: [], reviewsTextLen: 0 };

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

async function extractTextFromFile(file) {
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  if (ext === 'txt' || ext === 'md' || ext === 'csv') return await file.text();
  if (ext === 'docx') {
    if (!window.mammoth) throw new Error('mammoth.js not loaded');
    const buf = await file.arrayBuffer();
    const res = await window.mammoth.extractRawText({ arrayBuffer: buf });
    return res.value || '';
  }
  return '';
}

async function handleFolderUpload(fileList) {
  const files = Array.from(fileList || []);
  if (!files.length) return;
  // Folder name = first segment of any webkitRelativePath
  const firstPath = files[0].webkitRelativePath || files[0].name;
  const folderName = firstPath.split('/')[0] || '';

  // Find Reviews & Details 2 file (docx/txt)
  const reviewsFile = files.find(f => /reviews.*details/i.test(f.name)) || files.find(f => /\.(txt|md|csv|docx)$/i.test(f.name));
  let reviewsText = '';
  if (reviewsFile) {
    try { reviewsText = await extractTextFromFile(reviewsFile); }
    catch (e) { console.warn('Reviews extract failed:', e.message); }
  }

  // Find images, prefer "صور مضغوطة" subfolder if present
  const allImages = files.filter(f => /\.(jpe?g|png|webp|gif)$/i.test(f.name));
  const compressed = allImages.filter(f =>
    (f.webkitRelativePath || '').includes('صور مضغوطة')
  );
  const imageFiles = compressed.length ? compressed : allImages;
  const images = [];
  for (const f of imageFiles.slice(0, 30)) {
    try {
      const dataUrl = await fileToDataUrl(f);
      images.push({ name: f.name, dataUrl, selected: false });
    } catch (e) { /* skip */ }
  }

  window.__productFolder = { name: folderName, images, reviewsTextLen: reviewsText.length };

  // Auto-fill the AI input (only if empty so we don't blow away typed text)
  const input = $('productInput');
  if (reviewsText && !input.value.trim()) {
    input.value = reviewsText;
  }

  // Show green summary
  const sum = $('folderSummary');
  sum.style.display = 'block';
  sum.innerHTML = `
    <strong>✓ ${escape(folderName)}</strong> —
    ${reviewsText ? reviewsText.length.toLocaleString() + ' chars from Reviews & Details 2' : 'no reviews file found'}
    · ${images.length} image${images.length === 1 ? '' : 's'} loaded
  `;
}

// HTML escape for the summary line
function escape(s) {
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

$('folderInput').addEventListener('change', (e) => handleFolderUpload(e.target.files));

// "Upload from Drive" — opens Google Picker, downloads the picked folder,
// then funnels File[] into the same handleFolderUpload as the device flow.
$('driveFolderBtn').addEventListener('click', () => {
  const btn = $('driveFolderBtn');
  const orig = btn.innerHTML;
  btn.disabled = true; btn.innerHTML = 'Loading…';
  pickGoogleDriveFolder(
    (files) => { btn.disabled = false; btn.innerHTML = orig; handleFolderUpload(files); },
    {
      onProgress: (p) => {
        if (p.phase === 'listing') btn.innerHTML = 'Listing folder…';
        else if (p.phase === 'downloading') btn.innerHTML = 'Downloading ' + p.current + '/' + p.total;
      },
      onError: (e) => { btn.disabled = false; btn.innerHTML = orig; alert('Drive: ' + e.message); }
    }
  );
});
