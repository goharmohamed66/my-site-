// Generic confirmation parser — uses a saved column_map (from a connector
// in Settings → Connectors → Confirmation systems) to read any sheet.
// Pulls product / status / city / date / employee from the columns the
// user mapped, normalizes status to CONF / CANC by exact-match against
// the comma-separated lists (confirmed_values / canceled_values).
function parseConfirmationGeneric(row, map){
  if (!map || !map.product || !map.status) return null;
  var st = String(row[map.status] || '').trim();
  if (!st) return null;
  var toSet = function(csv){
    var s = {};
    String(csv || '').split(',').forEach(function(v){ var t = v.trim(); if (t) s[t] = 1; });
    return s;
  };
  var confSet = toSet(map.confirmed_values);
  var cancSet = toSet(map.canceled_values);
  var isConf = !!confSet[st];
  var isCanc = !!cancSet[st];
  // Skip rows whose status doesn't fit either bucket — keeps the
  // confirmation rate honest (no "in transit" rows polluting totals).
  if (!isConf && !isCanc) return null;
  var prodRaw = map.product ? String(row[map.product] || '').trim() : '';
  var prod = cleanZomProd(prodRaw) || '--';
  return {
    prod: prod,
    city: map.city ? String(row[map.city] || '').trim() : '',
    st:   isConf ? CONF : CANC,
    cod: 0, fees: 0, net: 0,
    date: map.date ? parseDate(row[map.date]) : null,
    employee: map.employee ? (String(row[map.employee] || '').trim() || '--') : '--',
    source: 'Confirmation',
  };
}
// Try every saved confirmation connector's column_map against the sheet's
// headers. Pick the one whose `product` AND `status` columns both exist
// in the sheet. Returns { connector, map } or null.
function pickConfirmationMap(sampleRow, connectors){
  if (!sampleRow || !connectors || !connectors.length) return null;
  var keys = Object.keys(sampleRow);
  for (var i = 0; i < connectors.length; i++){
    var c = connectors[i];
    var meta = c && c.meta;
    if (typeof meta === 'string') { try { meta = JSON.parse(meta); } catch(e) { meta = null; } }
    var map = meta && meta.column_map;
    if (!map || !map.product || !map.status) continue;
    if (keys.indexOf(map.product) >= 0 && keys.indexOf(map.status) >= 0) {
      return { connector: c, map: map };
    }
  }
  return null;
}

// Trailing-quantity stripper. Carrier exports often suffix the product
// name with "x1", "x 2", "× 3" — same product, just different piece
// counts. We strip these so identical products with different qty merge
// into ONE row in Product Performance / Confirmation Staff tables.
// Examples (all collapse to the same key):
//   "حامل تجفيف الاطباق (ol-gm) x1"
//   "حامل تجفيف الاطباق (ol-gm) x 2"
//   "حامل تجفيف الاطباق (ol-gm) × 3"
function stripQty(s){return String(s||"").replace(/\s*[xX×]\s*\d+\s*$/u,"").trim();}
// Preserves leading qty markers (1X / 2X / 3X) — Profit Analysis needs
// them to count pieces for multi-product orders. Earlier version stripped

function normalizeAr(s){return s.replace(/[ةه]/g,"ه").replace(/[أإآا]/g,"ا").replace(/ى/g,"ي").replace(/\s+/g," ").toLowerCase().trim();}
function normalizeProd(name){
  var codeMatch=name.match(/\s*(\([^)]+\))\s*$/);
  var code=codeMatch?codeMatch[1]:"";
  var base=codeMatch?name.slice(0,name.length-codeMatch[0].length):name;
  var s=base.replace(/^\d+\s*[Xx]\s+/,"").replace(/\s*[xX]\s*\d+\s*$/,"").replace(/\s*-+\s*$/,"").trim();
  return(s||base)+(code?" "+code:"");
}
var _pc={};

function parseDate(val){
  if(!val)return null;
  if(val instanceof Date){
    if(isNaN(val.getTime()))return null;
    return new Date(val.getFullYear(),val.getMonth(),val.getDate());
  }
  if(typeof val==="number"){
    var d=new Date(Math.round((val-25569)*86400*1000));
    return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate());
  }
  var s=String(val).trim();
  var iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso)return new Date(parseInt(iso[1]),parseInt(iso[2])-1,parseInt(iso[3]));
  var dmy=s.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})/);
  if(dmy)return new Date(parseInt(dmy[3]),parseInt(dmy[2])-1,parseInt(dmy[1]));
  var d2=new Date(s);
  if(!isNaN(d2.getTime()))return new Date(d2.getFullYear(),d2.getMonth(),d2.getDate());
  return null;
}
function fmtDay(dt){return dt.getDate()+"/"+(dt.getMonth()+1)+"/"+dt.getFullYear();}
// Heatmap optimized for #EBEBEB background — darker, higher-contrast colors
// so percentages POP off the page. Each tier has a matching solid border.
// Bolder, weightier heat tones — same hues (green/amber/red) but darker
// for higher contrast on the alternating row theme.
function heat(r){
  if(r>=70)return{text:"#15803D",bdr:"#15803D"};   // deep green
  if(r>=50)return{text:"#16A34A",bdr:"#16A34A"};   // green
  if(r>=35)return{text:"#CA8A04",bdr:"#CA8A04"};   // dark amber
  if(r>=20)return{text:"#DC2626",bdr:"#DC2626"};   // red
  return{text:"#991B1B",bdr:"#991B1B"};            // deep red
}
function heatRel(r,mn,mx){if(mn===mx)return heat(r);var n=(r-mn)/(mx-mn);if(n>=0.67)return{text:"#15803D",bdr:"#15803D"};if(n>=0.33)return{text:"#D97706",bdr:"#D97706"};return{text:"#DC2626",bdr:"#DC2626"};}

function getRange(p){

  if(p==="last14")return{from:new Date(today-13*86400000),to:eod};
  if(p==="last28")return{from:new Date(today-27*86400000),to:eod};

function chPct(c,p){if(!p)return null;var d=c-p,pv=(d/p)*100;return{diff:d,pct:+pv.toFixed(1),up:d>=0};}
function useStats(rows){

    var del=0,ret=0,cod=0,net=0,fees=0,bc=0;
    rows.forEach(function(r){if(r.st===DEL){del++;cod+=r.cod;}else if(r.st===RET)ret++;net+=r.net;fees+=r.fees;if(r.fees>0)bc++;});
    var t=rows.length;
    return{t:t,del:del,ret:ret,cod:cod,net:net,fees:fees,dr:drPct(del,ret),rr:pct(ret,t),delSC:del?Math.round(fees/del):0,avgSC:bc?Math.round(fees/bc):0};

// Pure function (no React hooks) — same math as useProds. Exposed on
// window so other pages (Automation Tools → Financial Modeling Updater)
// can run the exact same delivery-rate aggregation without dragging
// React along. Input rows shape: same as the rows held in `allRows`
// (already converted via apiRowToRow).
function computeProdRates(rows){

function useTrend(rows,mode){

      else{var mon=getWeekMon(d),sun=new Date(mon);sun.setDate(mon.getDate()+6);k=mon.getFullYear()+"-"+String(mon.getMonth()+1).padStart(2,"0")+"-"+String(mon.getDate()).padStart(2,"0");lbl=fmtDay(mon)+" - "+fmtDay(sun);}
      if(!m[k])m[k]={p:k,label:lbl,del:0,ret:0,t:0,fees:0,bc:0};m[k].t++;if(r.st===DEL)m[k].del++;else if(r.st===RET)m[k].ret++;m[k].fees+=r.fees||0;if(r.fees>0)m[k].bc++;
